<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:18px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.04; pointer-events:none;}
  
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#e3b863" stroke-width="1.2">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
    <path d="M-20,680 C80,640 150,720 240,680 330,640 380,700 440,670"/>
  </g>
</svg>
<div class="card">

<div style="display:flex;flex-direction:column;gap:10px">
  <div class="kicker">Spline Sans Mono · instruments</div>
  <div style="display:flex;gap:18px;align-items:baseline">
    <span class="day-tag">DAY 4 · MORNING</span>
    <span class="lab">CASH</span>
    <span class="lab">REPUTE</span>
    <span class="lab">ENERGY</span>
  </div>
  <div style="display:flex;gap:18px;align-items:baseline;font-family:var(--font-mono);font-weight:600;font-size:17px">
    <span style="color:var(--gold)">€1240</span>
    <span style="color:var(--sage)">68</span>
    <span style="color:var(--sea)">82</span>
  </div>
  <div class="goal">Goal — reach <b>€1500</b> &amp; <b>70 reputation</b> · gear <b style="color:var(--olive)">92%</b></div>
</div>
</div>
</body></html>
