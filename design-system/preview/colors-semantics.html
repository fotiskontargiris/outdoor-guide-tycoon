<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:18px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.04; pointer-events:none;}
  
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#e3b863" stroke-width="1.2">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
    <path d="M-20,680 C80,640 150,720 240,680 330,640 380,700 440,670"/>
  </g>
</svg>
<div class="card">

<div style="display:flex;flex-direction:column;gap:14px">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)">Route difficulty</div>
  <div style="display:flex;gap:18px;align-items:baseline">
    <span class="d1" style="font-family:var(--font-display);font-size:18px;font-weight:600">d1 · Polylimnio</span>
    <span class="d2" style="font-family:var(--font-display);font-size:18px;font-weight:600">d2 · Neda Gorge</span>
    <span class="d3" style="font-family:var(--font-display);font-size:18px;font-weight:600">d3 · Taygetos</span>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px">Stat deltas</div>
  <div style="display:flex;gap:18px;font-family:var(--font-mono);font-size:14px;font-weight:600">
    <span class="up">▴ +5 rep</span>
    <span class="gold">+€85 fee</span>
    <span class="down">▾ −€60</span>
    <span class="neu">·  no change</span>
  </div>
</div>
</div>
</body></html>
