<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:18px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.04; pointer-events:none;}
  
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#e3b863" stroke-width="1.2">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
    <path d="M-20,680 C80,640 150,720 240,680 330,640 380,700 440,670"/>
  </g>
</svg>
<div class="card">

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div>
    <div style="height:88px;background:var(--panel);border:1px solid var(--edge);border-radius:14px;backdrop-filter:blur(6px);box-shadow:0 18px 40px -28px rgba(0,0,0,.9);display:flex;align-items:center;padding:0 16px">
      <span style="font-family:var(--font-display);color:var(--ink)">.scene · card</span>
    </div>
    <div class="lab" style="margin-top:8px">--shadow-card · 0 18px 40px -28px rgba(0,0,0,.9)</div>
  </div>
  <div>
    <div style="height:54px;background:linear-gradient(180deg,#e88a5c,#d2754a);border-radius:13px;display:flex;align-items:center;justify-content:center;color:#1a2b22;font-family:var(--font-display);font-weight:600;font-size:17px;box-shadow:0 10px 26px -12px #d2754a;margin-top:34px">Begin the day</div>
    <div class="lab" style="margin-top:8px">--shadow-go · 0 10px 26px -12px var(--terra)</div>
  </div>
</div>
</div>
</body></html>
