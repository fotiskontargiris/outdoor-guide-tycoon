<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:20px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.07; pointer-events:none;}

  .panel{position:relative; border-radius:16px; overflow:hidden; isolation:isolate;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.28), transparent 55%),
      linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1px solid rgba(255,212,160,.36);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 10px 26px -14px rgba(0,0,0,.7);
    padding:18px 18px 20px;}
  .panel::after{content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);
    border-radius:inherit;}
  .panel > *{position:relative; z-index:2;}

  .kicker-warm{font-family:var(--font-mono); font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:#ffb86b; font-weight:600; margin-bottom:14px;}
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#ffb86b" stroke-width="1.4">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
  </g>
</svg>
<div class="card">
<div class="panel">
  <div class="kicker-warm">Choice pattern · trailhead event</div>

  <div style="font-family:var(--font-mono);font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:#ff7a3d;font-weight:700;margin-bottom:6px">Day 1 · A trailhead near Voidokilia</div>
  <div style="font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1.15;color:#fff3d2">Someone forgot water</div>
  <p style="font-family:var(--font-body);font-size:15px;margin:6px 0 14px;color:#ffe9c8;line-height:1.5">As the group gathers, you realise two of them have brought nothing to drink — and the day ahead is dry.</p>

  <button style="font-family:var(--font-body);font-size:15.5px;text-align:left;color:#fff3d2;
    background:linear-gradient(180deg, rgba(255,122,61,.30), rgba(255,122,61,.08));
    border:1.5px solid #ff7a3d;border-radius:12px;padding:14px 15px;
    display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;margin-bottom:9px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16), 0 4px 12px -8px rgba(255,122,61,.5)">
    <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:#ffd86b;border:1.5px solid #ffd86b;border-radius:6px;padding:3px 8px;background:rgba(255,216,107,.14)">✓</span>
    <span style="flex:1"><b style="font-weight:600">Share spare water from your pack</b><span style="display:block;font-size:13px;color:#ffd86b;font-style:italic;margin-top:2px">You packed for this</span></span>
  </button>

  <button style="font-family:var(--font-body);font-size:15.5px;text-align:left;color:#fff3d2;
    background:rgba(0,0,0,.42);border:1.5px solid rgba(255,212,160,.42);border-radius:12px;padding:14px 15px;
    display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;margin-bottom:9px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
    <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:#ff7a3d;border:1.5px solid #ff7a3d;border-radius:6px;padding:3px 8px">·</span>
    <span style="flex:1"><b style="font-weight:600">Send them to the kiosk first</b><span style="display:block;font-size:13px;color:#ffc78a;font-style:italic;margin-top:2px">A late start</span></span>
  </button>

  <button style="font-family:var(--font-body);font-size:15.5px;text-align:left;color:#fff3d2;
    background:rgba(0,0,0,.42);border:1.5px solid rgba(255,212,160,.42);border-radius:12px;padding:14px 15px;
    display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
    <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:#ff7a3d;border:1.5px solid #ff7a3d;border-radius:6px;padding:3px 8px">·</span>
    <span style="flex:1"><b style="font-weight:600">Set off and ration as you go</b><span style="display:block;font-size:13px;color:#ff8aa6;font-style:italic;margin-top:2px">Risky in the heat</span></span>
  </button>
</div></div>
</body></html>
