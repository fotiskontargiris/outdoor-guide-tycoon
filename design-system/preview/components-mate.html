<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:20px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.07; pointer-events:none;}

  .panel{position:relative; border-radius:16px; overflow:hidden; isolation:isolate;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.28), transparent 55%),
      linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1px solid rgba(255,212,160,.36);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 10px 26px -14px rgba(0,0,0,.7);
    padding:18px 18px 20px;}
  .panel::after{content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);
    border-radius:inherit;}
  .panel > *{position:relative; z-index:2;}

  .kicker-warm{font-family:var(--font-mono); font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:#ffb86b; font-weight:600; margin-bottom:14px;}

  /* MATE CARD */
  .mate{
    display:flex; align-items:flex-start; gap:14px;
    background:rgba(0,0,0,.42);
    border:1px solid rgba(255,212,160,.4);
    border-radius:13px;
    padding:14px 14px 14px 14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
    margin-bottom:10px;
  }
  .mate.you{
    background:linear-gradient(180deg, rgba(255,122,61,.22), rgba(255,122,61,.06));
    border:1.5px solid #ff7a3d;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 4px 14px -8px rgba(255,122,61,.5);
  }
  .avatar{
    width:42px; height:42px; flex:none; border-radius:11px;
    background:linear-gradient(180deg,#ffd86b,#ff7a3d);
    color:#2a0a04;
    font-family:var(--font-display); font-weight:700; font-size:19px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 4px 12px -6px rgba(255,122,61,.6);
    border:1px solid rgba(255,212,160,.5);
  }
  .who{flex:1; min-width:0;}
  .nm{font-family:var(--font-display); font-weight:700; font-size:17px; color:#fff3d2; line-height:1.15;}
  .nm em{font-style:italic; color:#ffd86b;}
  .spec{font-family:var(--font-body); font-style:italic; font-size:13px; color:#ffc78a; margin-top:2px;}
  .task{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.04em; margin-top:7px;
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 9px; border-radius:8px;
    background:rgba(111,212,255,.14);
    border:1px solid rgba(111,212,255,.55);
    color:#6fd4ff;
    font-weight:600;
  }
  .task.idle{
    background:rgba(163,122,85,.14);
    border:1px solid rgba(163,122,85,.6);
    color:#d6b58b;
  }
  .gauges{display:flex; gap:8px; margin-top:10px;}
  .g{flex:1;}
  .gl{font-family:var(--font-mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#ffb86b; font-weight:600; margin-bottom:3px;}
  .bar{height:6px; border-radius:3px; background:rgba(0,0,0,.6); overflow:hidden; border:1px solid rgba(255,212,160,.22);}
  .bar > i{display:block; height:100%; border-radius:3px;}

  .assign{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; font-weight:600;
    color:#ffd86b;
    background:rgba(255,216,107,.12);
    border:1.5px solid #ffd86b;
    border-radius:10px;
    padding:9px 13px;
    cursor:pointer; align-self:center;
    transition:transform .12s, background .2s;
    text-transform:uppercase;
  }
  .assign:hover{background:rgba(255,216,107,.22);}
  .assign:active{transform:scale(.96);}
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#ffb86b" stroke-width="1.4">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
  </g>
</svg>

<div class="card">
  <div class="panel">
    <div class="kicker-warm">Mate cards · the team</div>

    <div class="mate you">
      <div class="avatar">A</div>
      <div class="who">
        <div class="nm">You · <em>Alexios</em></div>
        <div class="spec">Mountain-rescue medic</div>
        <div class="task">▸ On the Polylimnio waterfalls</div>
        <div class="gauges">
          <div class="g"><div class="gl">Energy</div><div class="bar"><i style="width:82%;background:linear-gradient(90deg,#6fd4ff,#3a8fc7);box-shadow:0 0 8px #6fd4ffaa"></i></div></div>
        </div>
      </div>
      <button class="assign">Reassign</button>
    </div>

    <div class="mate">
      <div class="avatar" style="background:linear-gradient(180deg,#ff8aa6,#c4456a)">M</div>
      <div class="who">
        <div class="nm">Maria</div>
        <div class="spec">calm in foul weather</div>
        <div class="task">▸ Resting · −fatigue, +morale</div>
        <div class="gauges">
          <div class="g"><div class="gl">Skill</div><div class="bar"><i style="width:62%;background:linear-gradient(90deg,#ffd86b,#e0a040);box-shadow:0 0 8px #ffd86baa"></i></div></div>
          <div class="g"><div class="gl">Morale</div><div class="bar"><i style="width:78%;background:linear-gradient(90deg,#7fe39c,#3fb56b);box-shadow:0 0 8px #7fe39caa"></i></div></div>
          <div class="g"><div class="gl">Fatigue</div><div class="bar"><i style="width:22%;background:linear-gradient(90deg,#ff7a3d,#c44a1a);box-shadow:0 0 8px #ff7a3daa"></i></div></div>
        </div>
      </div>
      <button class="assign">Reassign</button>
    </div>

    <div class="mate">
      <div class="avatar" style="background:linear-gradient(180deg,#7fe39c,#3fb56b);color:#0a1a10">N</div>
      <div class="who">
        <div class="nm">Nikos</div>
        <div class="spec">sure-footed on scree</div>
        <div class="task idle">· Idle — awaiting assignment</div>
        <div class="gauges">
          <div class="g"><div class="gl">Skill</div><div class="bar"><i style="width:55%;background:linear-gradient(90deg,#ffd86b,#e0a040);box-shadow:0 0 8px #ffd86baa"></i></div></div>
          <div class="g"><div class="gl">Morale</div><div class="bar"><i style="width:80%;background:linear-gradient(90deg,#7fe39c,#3fb56b);box-shadow:0 0 8px #7fe39caa"></i></div></div>
          <div class="g"><div class="gl">Fatigue</div><div class="bar"><i style="width:10%;background:linear-gradient(90deg,#ff7a3d,#c44a1a);box-shadow:0 0 8px #ff7a3daa"></i></div></div>
        </div>
      </div>
      <button class="assign">Assign</button>
    </div>
  </div>
</div>
</body></html>
