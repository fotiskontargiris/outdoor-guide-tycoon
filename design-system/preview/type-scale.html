<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:20px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.07; pointer-events:none;}

  /* Glossy warm panel — high contrast against deep ember backdrop */
  .panel{
    position:relative; border-radius:16px; overflow:hidden; isolation:isolate;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.28), transparent 55%),
      linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1px solid rgba(255,212,160,.36);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 10px 26px -14px rgba(0,0,0,.7);
    padding:18px 18px 20px;
  }
  .panel::after{content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);
    border-radius:inherit;}
  .panel > *{position:relative; z-index:2;}

  /* Active warm ink defaults */
  .ink-cream{color:#fff3d2;}
  .ink-honey{color:#ffc78a;}
  .ink-amber{color:#ffb86b;}
  .ink-saffron{color:#ffd86b;}
  .ink-coral{color:#ff8aa6;}
  .ink-mute{color:#a37a55;}

  .kicker-warm{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; color:#ffb86b;}
  .lab-warm{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#ff7a3d;}
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#ffb86b" stroke-width="1.4">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
  </g>
</svg>
<div class="card">
<div class="panel">
  <div class="kicker-warm" style="margin-bottom:14px">Type scale · sharp contrast</div>
  <div style="display:grid;grid-template-columns:88px 1fr;gap:6px 18px;align-items:baseline">
    <div class="lab-warm">h1</div>
    <div style="font-family:var(--font-display);font-weight:700;font-size:52px;line-height:1;letter-spacing:-.02em;color:#fff3d2">Messinia <em style="font-style:italic;color:#ffd86b">Guide</em></div>

    <div class="lab-warm">h2</div>
    <div style="font-family:var(--font-display);font-weight:600;font-size:30px;line-height:1.05;color:#ffe9c8">Build your guide</div>

    <div class="lab-warm">.weather</div>
    <div style="font-family:var(--font-display);font-weight:500;font-size:24px;color:#ffd06a">Clear skies <span style="font-family:var(--font-body);font-style:italic;color:#ffc78a;font-size:15px;font-weight:400">— over Voidokilia</span></div>

    <div class="lab-warm">.prose</div>
    <div style="font-family:var(--font-body);font-size:17px;color:#ffe9c8;line-height:1.45">The cicadas are screaming.</div>

    <div class="lab-warm">.sub</div>
    <div style="font-family:var(--font-body);font-style:italic;font-size:14px;color:#ffc78a">a guide making a name in Messinia</div>

    <div class="lab-warm">.kicker</div>
    <div class="kicker-warm">OUTDOOR ACTIVITIES TYCOON</div>

    <div class="lab-warm">.lab</div>
    <div class="lab-warm">DAY · REPUTE · CASH · ENERGY</div>
  </div>
</div></div>
</body></html>
