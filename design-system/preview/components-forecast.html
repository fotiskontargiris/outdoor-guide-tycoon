<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:20px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.07; pointer-events:none;}

  /* Glossy warm panel — high contrast against deep ember backdrop */
  .panel{
    position:relative; border-radius:16px; overflow:hidden; isolation:isolate;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.28), transparent 55%),
      linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1px solid rgba(255,212,160,.36);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 10px 26px -14px rgba(0,0,0,.7);
    padding:18px 18px 20px;
  }
  .panel::after{content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);
    border-radius:inherit;}
  .panel > *{position:relative; z-index:2;}

  /* Active warm ink defaults */
  .ink-cream{color:#fff3d2;}
  .ink-honey{color:#ffc78a;}
  .ink-amber{color:#ffb86b;}
  .ink-saffron{color:#ffd86b;}
  .ink-coral{color:#ff8aa6;}
  .ink-mute{color:#a37a55;}

  .kicker-warm{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; color:#ffb86b;}
  .lab-warm{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#ff7a3d;}
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#ffb86b" stroke-width="1.4">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
  </g>
</svg>
<div class="card">
<div class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#ffb86b;font-weight:600">
      Forecast · <span style="color:#ffd86b">Clear</span> today
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#ff7a3d;font-weight:600">5-day ▸</div>
  </div>
  <div style="display:flex;gap:8px">
    
<div style="flex:1;min-width:0;text-align:center;background:rgba(255,122,61,.16);border:1px solid #ff7a3d;border-radius:11px;padding:10px 4px 9px">
  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ffd86b;font-weight:600">Today</div>
  <div style="width:16px;height:16px;border-radius:50%;background:#ffd86b;margin:7px auto 5px;box-shadow:0 0 14px #ffd86b,0 0 4px #ffd86b,inset 0 1px 0 rgba(255,255,255,.4)"></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#ffd86b;font-weight:600">Clear</div>
</div>
    
<div style="flex:1;min-width:0;text-align:center;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.32);border-radius:11px;padding:10px 4px 9px">
  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ffb86b;font-weight:600">D5</div>
  <div style="width:16px;height:16px;border-radius:50%;background:#ff7a3d;margin:7px auto 5px;box-shadow:0 0 14px #ff7a3d,0 0 4px #ff7a3d,inset 0 1px 0 rgba(255,255,255,.4)"></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#ff7a3d;font-weight:600">Hot</div>
</div>
    
<div style="flex:1;min-width:0;text-align:center;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.32);border-radius:11px;padding:10px 4px 9px">
  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ffb86b;font-weight:600">D6</div>
  <div style="width:16px;height:16px;border-radius:50%;background:#6fd4ff;margin:7px auto 5px;box-shadow:0 0 14px #6fd4ff,0 0 4px #6fd4ff,inset 0 1px 0 rgba(255,255,255,.4)"></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#6fd4ff;font-weight:600">Windy</div>
</div>
    
<div style="flex:1;min-width:0;text-align:center;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.32);border-radius:11px;padding:10px 4px 9px">
  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ffb86b;font-weight:600">D7</div>
  <div style="width:16px;height:16px;border-radius:50%;background:#a8c8e6;margin:7px auto 5px;box-shadow:0 0 14px #a8c8e6,0 0 4px #a8c8e6,inset 0 1px 0 rgba(255,255,255,.4)"></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#a8c8e6;font-weight:600">Drizzle</div>
</div>
    
<div style="flex:1;min-width:0;text-align:center;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.32);border-radius:11px;padding:10px 4px 9px">
  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ffb86b;font-weight:600">D8</div>
  <div style="width:16px;height:16px;border-radius:50%;background:#ff5a4a;margin:7px auto 5px;box-shadow:0 0 14px #ff5a4a,0 0 4px #ff5a4a,inset 0 1px 0 rgba(255,255,255,.4)"></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#ff5a4a;font-weight:600">Storm</div>
</div>
  </div>
</div></div>
</body></html>
