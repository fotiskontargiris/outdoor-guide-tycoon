<!doctype html>
<html lang="en"><head>

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:18px 22px; min-height:auto;}

<div class="card">

<div style="position:relative;height:200px;border:1px solid var(--edge);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,#0c252b,#081b20)">
  <svg preserveAspectRatio="none" viewBox="0 0 400 800" style="position:absolute;inset:0;width:100%;height:100%;opacity:.18" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#e3b863" stroke-width="1.6">
      <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>

    </g>
  </svg>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
    <div class="kicker">The single most identifying mark</div>
    <div style="font-family:var(--font-display);font-style:italic;font-size:22px;color:var(--gold);margin-top:6px">topo-backdrop.svg</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:6px">position: fixed · opacity: 0.06 · sand contour on dusk teal</div>
  </div>
</div>
</div>
