<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:20px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.07; pointer-events:none;}

  /* Glossy warm panel — high contrast against deep ember backdrop */
  .panel{
    position:relative; border-radius:16px; overflow:hidden; isolation:isolate;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.28), transparent 55%),
      linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1px solid rgba(255,212,160,.36);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 10px 26px -14px rgba(0,0,0,.7);
    padding:18px 18px 20px;
  }
  .panel::after{content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);
    border-radius:inherit;}
  .panel > *{position:relative; z-index:2;}

  /* Active warm ink defaults */
  .ink-cream{color:#fff3d2;}
  .ink-honey{color:#ffc78a;}
  .ink-amber{color:#ffb86b;}
  .ink-saffron{color:#ffd86b;}
  .ink-coral{color:#ff8aa6;}
  .ink-mute{color:#a37a55;}

  .kicker-warm{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; color:#ffb86b;}
  .lab-warm{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#ff7a3d;}
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#ffb86b" stroke-width="1.4">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
  </g>
</svg>
<div class="card">
<div class="panel">
  <div class="kicker-warm" style="margin-bottom:14px">HUD · stat strip with strong colour separation</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px">
    
<div style="position:relative;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.36);border-radius:13px;padding:10px 8px 10px;text-align:center;backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
  <span style="display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#ff7a3d;font-weight:600">DAY</span>
  <span style="display:block;font-family:var(--font-mono);font-size:22px;font-weight:700;margin-top:4px;color:#fff3d2;text-shadow:0 0 18px #fff3d255">4</span>
  
</div>
    
<div style="position:relative;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.36);border-radius:13px;padding:10px 8px 10px;text-align:center;backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
  <span style="display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#ff7a3d;font-weight:600">CASH</span>
  <span style="display:block;font-family:var(--font-mono);font-size:22px;font-weight:700;margin-top:4px;color:#ffd86b;text-shadow:0 0 18px #ffd86b55">€1,240</span>
  
</div>
    
<div style="position:relative;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.36);border-radius:13px;padding:10px 8px 10px;text-align:center;backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
  <span style="display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#ff7a3d;font-weight:600">REPUTE</span>
  <span style="display:block;font-family:var(--font-mono);font-size:22px;font-weight:700;margin-top:4px;color:#7fe39c;text-shadow:0 0 18px #7fe39c55">68</span>
  <div style="height:6px;border-radius:3px;background:rgba(0,0,0,.5);margin-top:8px;overflow:hidden;border:1px solid rgba(255,212,160,.22)"><i style="display:block;height:100%;border-radius:3px;width:68%;background:linear-gradient(90deg, #7fe39c, #3fb56b);box-shadow:0 0 8px #7fe39caa"></i></div>
</div>
    
<div style="position:relative;background:rgba(0,0,0,.32);border:1px solid rgba(255,212,160,.36);border-radius:13px;padding:10px 8px 10px;text-align:center;backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.10)">
  <span style="display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#ff7a3d;font-weight:600">ENERGY</span>
  <span style="display:block;font-family:var(--font-mono);font-size:22px;font-weight:700;margin-top:4px;color:#6fd4ff;text-shadow:0 0 18px #6fd4ff55">82</span>
  <div style="height:6px;border-radius:3px;background:rgba(0,0,0,.5);margin-top:8px;overflow:hidden;border:1px solid rgba(255,212,160,.22)"><i style="display:block;height:100%;border-radius:3px;width:82%;background:linear-gradient(90deg, #6fd4ff, #3a8fc7);box-shadow:0 0 8px #6fd4ffaa"></i></div>
</div>
  </div>
  <div style="margin-top:12px;font-family:var(--font-mono);font-size:11.5px;letter-spacing:.04em;color:#ffc78a;text-align:center;line-height:1.5">
    Goal — reach <b style="color:#ffd86b;font-weight:700">€1,500</b> &amp; <b style="color:#ffd86b;font-weight:700">70 reputation</b> · gear <b style="color:#7fe39c;font-weight:700">92%</b> · pack <b style="color:#fff3d2;font-weight:700">6</b> slots
  </div>
</div></div>
</body></html>
