<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;}
  body{padding:18px 22px; min-height:auto;}
  .card{position:relative; z-index:1;}
  .topo-mini{position:absolute; inset:-40px -40px; z-index:0; opacity:.04; pointer-events:none;}
  
</style>
</head><body>
<svg class="topo-mini" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#e3b863" stroke-width="1.2">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
    <path d="M-20,680 C80,640 150,720 240,680 330,640 380,700 440,670"/>
  </g>
</svg>
<div class="card">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="height:60px;background:var(--panel);border:1px solid var(--edge);border-radius:14px"></div>
    <div class="lab">--r · 14px · scene</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="height:60px;background:var(--panel);border:1px solid var(--edge);border-radius:12px"></div>
    <div class="lab">--r-sm · 12px · choice</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="height:60px;background:var(--panel);border:1px solid var(--edge);border-radius:9px"></div>
    <div class="lab">--r-pill · 9px · inline</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="height:60px;background:var(--panel);border:1px solid var(--edge);border-radius:20px 20px 0 0"></div>
    <div class="lab">--r-sheet · 20px · drawer</div>
  </div>
</div>
</div>
</body></html>
