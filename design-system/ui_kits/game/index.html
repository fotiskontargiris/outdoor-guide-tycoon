<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Messinia Guide — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* ─── WARM CLAY direction · override base tokens locally ─── */
  :root{
    --bg:        #22120a;
    --bg2:       #0e0805;
    --panel:     rgba(124,80,52,.62);
    --panel2:    rgba(54,28,16,.68);
    --edge:      rgba(255,212,160,.4);

    --ink:       #fff3d2;        /* warm cream */
    --ink-dim:   #ffc78a;        /* honey */
    --ink-faint: #ffb86b;        /* amber */
    --ink-on-go: #2a0a04;

    --terra:        #ff7a3d;     /* primary coral */
    --terra-bright: #ffa066;     /* button highlight */
    --gold:         #ffd86b;     /* saffron */
    --sea:          #6fd4ff;     /* active sky */
    --olive:        #ffc78a;     /* warm tan */
    --sage:         #7fe39c;     /* leaf */
    --danger:       #ff5a4a;

    --d1: var(--sage);
    --d2: var(--gold);
    --d3: var(--terra);

    --shadow-card: 0 14px 36px -16px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.18);
    --shadow-go:   0 14px 32px -10px var(--terra), inset 0 1px 0 rgba(255,255,255,.4);
  }

  body{
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(255,138,166,.20), transparent 60%),
      radial-gradient(80% 60% at 50% 12%, rgba(255,122,61,.30), transparent 65%),
      linear-gradient(180deg, #3a1822 0%, #22120a 38%, #0e0805 100%);
    background-attachment:fixed;
  }
  .topo{stroke-width:1.4;}
  .topo g{stroke:var(--gold);}

  /* ─── chrome ─── */
  .appbar{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin:2px 0 14px; animation:rise .7s ease both;}
  .brand{text-align:left;}
  h1{text-shadow:0 4px 30px rgba(0,0,0,.4);}
  .iconbtn{
    flex:none; width:46px; height:46px; border-radius:12px;
    border:1.5px solid var(--edge); background:rgba(0,0,0,.42); color:var(--ink);
    font-size:24px; line-height:1; cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14);
    transition:border-color .2s, background .2s, transform .12s;
  }
  .iconbtn:hover{border-color:var(--terra); background:rgba(255,122,61,.18);}
  .iconbtn:active{transform:scale(.95);}

  /* forecast */
  #fcast{margin-bottom:14px;}
  .fcard{
    position:relative; overflow:hidden;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.24), transparent 55%),
      linear-gradient(180deg, rgba(124,80,52,.62) 0%, rgba(60,30,18,.72) 100%);
    border:1.5px solid var(--edge); border-radius:14px;
    padding:14px 14px 14px; cursor:pointer;
    box-shadow:var(--shadow-card);
    animation:rise .5s .08s ease both;
    transition:border-color .2s;
  }
  .fcard:hover{border-color:var(--terra);}
  .fcard::after{content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,0) 62%, rgba(255,255,255,.04) 100%);}
  .fcard > *{position:relative; z-index:2;}
  .fcard .fh{display:flex; justify-content:space-between; align-items:center; font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px;}
  .fcard .fh b{color:var(--gold); font-weight:700;}
  .fcard .fh span:last-child{color:var(--terra);}
  .fcard .frow{display:flex; gap:7px;}
  .wchip{
    flex:1; min-width:0; text-align:center;
    background:rgba(0,0,0,.32); border:1.5px solid rgba(255,212,160,.32);
    border-radius:11px; padding:10px 4px 9px;
  }
  .wchip:first-child{background:rgba(255,122,61,.16); border-color:var(--terra);}
  .wlab{font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);}
  .wchip:first-child .wlab{color:var(--gold);}
  .wdot{width:16px; height:16px; border-radius:50%; margin:7px auto 5px; box-shadow:0 0 14px currentColor, inset 0 1px 0 rgba(255,255,255,.4);}
  .wshort{font-family:var(--font-mono); font-size:11px; font-weight:700;}

  /* action bar */
  .actionbar{margin-top:18px; padding-top:16px; border-top:1px solid var(--edge);}
  .actionbar .lab{margin-bottom:10px;}
  button.go{
    font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--ink-on-go);
    width:100%; border:none; border-radius:14px; padding:18px; cursor:pointer;
    background:linear-gradient(180deg, var(--gold), var(--terra));
    box-shadow:var(--shadow-go);
    transition:transform .12s ease, filter .2s;
    display:flex; align-items:center; justify-content:center; gap:10px;
    letter-spacing:.01em;
  }
  button.go:hover{filter:brightness(1.07); transform:translateY(-2px);}
  button.go:active{transform:translateY(0) scale(.99);}
  button.go .gs{font-family:var(--font-mono); font-size:11px; font-weight:600; color:rgba(42,10,4,.7);}

  /* drawer */
  .drawer{position:fixed; inset:0; z-index:50; background:rgba(14,8,5,.72); backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center; opacity:0; transition:opacity .22s;}
  .drawer.open{display:flex; opacity:1;}
  .sheet{
    width:100%; max-width:640px;
    background:linear-gradient(180deg, #3a2014 0%, #1a0c06 100%);
    border:1.5px solid var(--edge); border-bottom:none;
    border-radius:var(--r-sheet) var(--r-sheet) 0 0;
    padding:10px 16px 26px; transform:translateY(100%);
    transition:transform .32s cubic-bezier(.2,.7,.1,1);
    box-shadow:0 -20px 40px -20px rgba(0,0,0,.7);
  }
  .drawer.open .sheet{transform:none;}
  .sheet .grip{width:42px; height:5px; border-radius:3px; background:var(--edge); margin:4px auto 14px;}
  .sheet .sh{font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--terra); margin-bottom:14px; text-align:center;}

  /* HUD */
  .hud{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:8px; animation:rise .7s .05s ease both;}
  .stat{
    position:relative;
    background:rgba(0,0,0,.42);
    border:1.5px solid var(--edge);
    border-radius:13px;
    padding:10px 8px 10px; text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
  }
  .stat .lab{display:block; font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--terra);}
  .stat .val{font-family:var(--font-mono); font-size:21px; font-weight:700; margin-top:4px; display:block; text-shadow:0 0 18px currentColor;}
  .bar{height:6px; border-radius:3px; background:rgba(0,0,0,.55); margin-top:8px; overflow:hidden; border:1px solid rgba(255,212,160,.22);}
  .bar > i{display:block; height:100%; border-radius:3px; transition:width .5s ease; box-shadow:0 0 8px currentColor;}

  .goal{margin:10px 0 16px; font-size:12px; line-height:1.55;}
  .goal b{font-weight:700;}

  /* scene */
  .scene{
    position:relative; overflow:hidden;
    background:
      radial-gradient(140% 90% at 50% -20%, rgba(255,200,140,.22), transparent 55%),
      linear-gradient(180deg, rgba(124,80,52,.6) 0%, rgba(60,30,18,.7) 100%);
    border:1.5px solid var(--edge); border-radius:var(--r);
    padding:20px 18px;
    box-shadow:var(--shadow-card);
    flex:1; animation:rise .45s ease both;
  }
  .scene::after{content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,0) 36%, rgba(255,255,255,0) 64%, rgba(255,255,255,.04) 100%);}
  .scene > *{position:relative; z-index:2;}
  .scene p{margin:0 0 14px; font-size:16px; line-height:1.55;}
  .scene h2{font-size:24px; line-height:1.15; font-weight:700;}

  .day-tag{font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--terra); margin-bottom:6px;}
  .weather{font-family:var(--font-display); font-size:22px; font-weight:600; margin:0 0 6px; color:var(--gold);}
  .weather small{display:block; font-family:var(--font-body); font-size:14.5px; font-style:italic; color:var(--ink-dim); font-weight:400;}

  /* options */
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  button.opt{
    font-family:var(--font-body); font-size:16px; text-align:left; color:var(--ink);
    background:rgba(0,0,0,.42);
    border:1.5px solid var(--edge); border-radius:12px; padding:14px 15px; cursor:pointer;
    transition:transform .12s ease, border-color .2s, background .2s;
    width:100%; display:flex; align-items:center; gap:12px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
  }
  button.opt:hover{border-color:var(--terra); background:rgba(255,122,61,.16); transform:translateY(-1px);}
  button.opt:active{transform:translateY(0) scale(.995);}
  button.opt .mark{
    font-family:var(--font-mono); font-size:13px; font-weight:700;
    color:var(--terra); border:1.5px solid var(--terra); border-radius:6px; padding:3px 8px; flex:none;
  }
  button.opt .b-main{flex:1; font-weight:500;}
  button.opt .b-sub{display:block; font-size:13px; color:var(--ink-dim); font-style:italic; margin-top:3px;}
  button.opt.primary{
    border-color:var(--terra); border-width:1.5px;
    background:linear-gradient(180deg, rgba(255,122,61,.30), rgba(255,122,61,.08));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16), 0 4px 12px -8px rgba(255,122,61,.5);
  }
  button.opt.primary .mark{color:var(--gold); border-color:var(--gold); background:rgba(255,216,107,.14);}

  /* booking inside opt */
  .booking{display:flex; flex-direction:column; align-items:flex-start; gap:3px;}
  .booking .route{font-family:var(--font-display); font-size:17px; font-weight:700;}
  .booking .meta{font-size:13.5px; color:var(--ink-dim); font-style:italic;}
  .booking .tags{font-family:var(--font-mono); font-size:11px; font-weight:600; margin-top:6px; display:flex; gap:8px; flex-wrap:wrap;}
  .booking .tags span{color:var(--gold); background:rgba(255,216,107,.12); border:1px solid rgba(255,216,107,.4); padding:2px 7px; border-radius:5px;}
  .booking .pay{color:var(--ink-on-go) !important; background:linear-gradient(180deg, var(--gold), var(--terra)) !important; border:none !important; font-weight:700;}
  .d1 .route{color:var(--sage);}
  .d2 .route{color:var(--gold);}
  .d3 .route{color:var(--terra);}

  /* mate */
  .team{display:flex; flex-direction:column; gap:10px; margin:6px 0 18px;}
  .mate{
    background:rgba(0,0,0,.42);
    border:1.5px solid var(--edge); border-radius:13px;
    padding:13px 14px; display:flex; align-items:flex-start; gap:12px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
  }
  .mate .who{flex:1; min-width:0;}
  .mate .nm{font-family:var(--font-display); font-weight:700; font-size:17px; color:var(--ink); line-height:1.15;}
  .mate .spec{font-size:13px; font-style:italic; color:var(--ink-dim); margin-top:2px;}
  .mate .task{
    font-family:var(--font-mono); font-size:11.5px; font-weight:600; margin-top:8px;
    display:inline-flex; padding:3px 9px; border-radius:8px;
    background:rgba(111,212,255,.14); border:1px solid rgba(111,212,255,.55); color:var(--sea);
  }
  .mate .task.idle{background:rgba(255,184,107,.10); border-color:rgba(255,184,107,.5); color:var(--ink-faint);}
  .gauges{display:flex; gap:8px; margin-top:10px;}
  .g{flex:1;}
  .g .gl{font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:3px;}
  .g .bar{margin-top:3px;}
  .mate button.assign{
    font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--gold); background:rgba(255,216,107,.12);
    border:1.5px solid var(--gold); border-radius:10px;
    padding:9px 13px; cursor:pointer; transition:transform .12s, background .2s;
    align-self:center;
  }
  .mate button.assign:hover{background:rgba(255,216,107,.22);}
  .mate button.assign:active{transform:scale(.96);}

  /* result */
  .res{border-left:3px solid var(--terra); padding:8px 0 8px 14px; margin:0 0 14px; animation:slidein .4s ease both;}

  /* ledger */
  .ledger .row{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:14px; font-weight:600; padding:8px 0; border-bottom:1px dashed rgba(255,212,160,.18);}
  .ledger .row .l{color:var(--ink-dim);}
  .ledger .row .v.pos{color:var(--sage); text-shadow:0 0 12px rgba(127,227,156,.4);}
  .ledger .row .v.neg{color:var(--danger); text-shadow:0 0 12px rgba(255,90,74,.4);}

  /* inputs */
  input{font-size:18px !important;}

  /* labels */
  .lab{font-weight:700;}

  footer{text-align:center; margin-top:20px; font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.16em; color:var(--ink-faint);}
  footer button{background:none; border:none; color:var(--terra); font-family:inherit; font-size:10.5px; letter-spacing:.16em; font-weight:600; cursor:pointer; text-decoration:underline; text-underline-offset:4px; padding:6px 4px;}
  footer button:hover{color:var(--gold);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
