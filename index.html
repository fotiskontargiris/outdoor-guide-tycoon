<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- Hide the browser chrome where the platform allows.
     Theme-color tints the address bar to match the game bg when visible.
     The apple/mobile capable tags let "Add to Home Screen" launch as a
     fullscreen app with no browser chrome at all. The manifest declares
     display:standalone + orientation:landscape so installed PWA matches
     the game's locked landscape design. -->
<meta name="theme-color" content="#0c252b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A Guide's Life">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>A Guide's Life or no Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c252b; --bg2:#081b20;
    --panel:rgba(23,62,68,0.55); --panel2:rgba(12,40,46,0.6);
    --edge:rgba(220,196,150,0.16);
    --ink:#ecdcc0; --ink-dim:#9fb0ad; --ink-faint:#6f8884;
    --terra:#d2754a; --terra-bright:#e88a5c;
    --olive:#aebd7e; --sage:#9cc07a;
    --gold:#e3b863; --sea:#6fb0ad;
    --danger:#e0664c;
    --r:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  /* GAME UI ARCHITECTURE — fixed viewport, never a page scroll.
     Top chrome stays anchored. The scene area fills remaining height.
     Inside scene: in 2-col mode the image is fixed, the right panel
     scrolls internally; in utility mode the scene itself scrolls.
     The bubble / scene / image never moves when the player scrolls. */
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:'Spectral',Georgia,serif; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(210,117,74,0.18), transparent 55%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    background-attachment:fixed; line-height:1.55;
    height:100vh; height:100dvh;     /* dynamic vh handles mobile address bar */
    overflow:hidden;                  /* NO page scroll, ever */
  }
  .topo{position:fixed; inset:0; z-index:0; opacity:0.06; pointer-events:none;}
  /* Landscape-first wrap. Locked to viewport height. */
  .wrap{
    position:relative; z-index:1;
    max-width:1100px; margin:0 auto;
    padding:14px 18px 16px;
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
    overflow:hidden;
  }
  /* Top chrome — natural size, never grows or scrolls */
  .appbar, .hud, .goal, #goal, #fcast { flex:none; }
  /* The scene area fills the remaining viewport height */
  .scene, #scene {
    flex:1;
    min-height:0;                     /* allow shrinking inside flex */
    display:flex; flex-direction:column;
    overflow-y:auto;                  /* utility scenes scroll internally */
    overflow-x:hidden;
    scrollbar-width:thin;
    scrollbar-color:var(--terra) transparent;
  }
  .scene::-webkit-scrollbar { width:6px; }
  .scene::-webkit-scrollbar-thumb { background:rgba(210,117,74,0.5); border-radius:3px; }
  .scene::-webkit-scrollbar-track { background:transparent; }
  /* Direct scene children default to natural height; only .two-col
     fills the remaining space (and internally manages its own scroll). */
  .scene > * { flex:none; }
  .scene > .two-col { flex:1; min-height:0; }
  /* The theatrical 2-col scene: image stage left, content panel right.
     Fills the scene's remaining height; image fixed, panel scrolls. */
  .two-col{
    display:grid;
    grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);
    gap:28px;
    align-items:stretch;
    flex:1;
    min-height:0;
    overflow:hidden;
  }
  .two-col .col-stage, .two-col .col-panel{min-width:0;}
  /* Stage column: image fits inside via max-width/height, no scroll */
  .col-stage{
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    min-height:0;
  }
  .col-stage > *,
  .col-stage img,
  .col-stage .scene-stage,
  .col-stage .scene-stage img {
    max-width:100%; max-height:100%;
    width:auto; height:auto;
    display:block;
  }
  .col-stage .scene-stage{position:relative;}
  /* Panel column: scrolls internally when content exceeds height */
  .col-panel{
    overflow-y:auto;
    padding-right:8px;
    scrollbar-width:thin;
    scrollbar-color:var(--terra) transparent;
  }
  .col-panel::-webkit-scrollbar { width:6px; }
  .col-panel::-webkit-scrollbar-thumb { background:rgba(210,117,74,0.5); border-radius:3px; }
  .col-panel::-webkit-scrollbar-track { background:transparent; }
  /* Choice button grids — landscape lets short-label buttons go 2-up */
  .choices.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  /* LANDSCAPE-ONLY (locked decision, 2026-05-28). No portrait fallback.
     If a touch device hits the page in portrait, the .rotate-prompt
     overlay covers the screen and asks for landscape. Desktop users in
     a normal browser window are landscape by default; only an
     intentionally portrait-shaped narrow window triggers the prompt. */
  .rotate-prompt{
    display:none;
    position:fixed; inset:0; z-index:1000;
    background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink);
    align-items:center; justify-content:center;
    text-align:center; padding:32px;
    font-family:'Fraunces',serif;
  }
  .rotate-prompt .rp-inner{max-width:420px;}
  .rotate-prompt .rp-icon{
    font-size:48px; line-height:1;
    color:var(--terra);
    margin-bottom:20px;
    display:inline-block;
    animation:rp-rotate 2.4s ease-in-out infinite;
  }
  .rotate-prompt h2{font-family:'Fraunces',serif; font-weight:600; font-size:28px; margin:0 0 12px; letter-spacing:-.01em;}
  .rotate-prompt p{font-style:italic; color:var(--ink-dim); font-size:16px; line-height:1.5; margin:0;}
  .rotate-prompt .rp-kicker{
    font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.3em;
    text-transform:uppercase; color:var(--terra); margin-bottom:14px;
  }
  @keyframes rp-rotate{
    0%,100%{transform:rotate(-90deg);}
    50%{transform:rotate(0deg);}
  }
  @media (orientation:portrait) and (max-width:900px){
    .rotate-prompt{display:flex;}
    .wrap{display:none;}
  }

  /* PRE-TITLE COLD OPEN — moodful typographic reveal that doubles as
     the user-gesture for fullscreen. Static HTML overlay, removed on
     first dismiss. Plays again on page reload, not on within-session
     "Main menu" navigation. Touch anywhere → fullscreen + fade out. */
  .intro-screen{
    position:fixed; inset:0; z-index:500;
    background:linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:32px;
    cursor:pointer;
    transition:opacity .5s ease;
  }
  .intro-screen.fading{opacity:0;}
  .intro-screen .topo-bg{
    position:absolute; inset:0;
    background-image:radial-gradient(120% 80% at 50% -10%, rgba(210,117,74,0.10), transparent 55%);
    pointer-events:none;
  }
  /* GSAP-style intro orchestration. Per-word stagger on the title,
     multi-property animations (translate/scale/blur/opacity), and
     custom cubic-bezier easings that mimic the GSAP power/expo/back
     curves. Vanilla CSS, no library — same polish, none of the kb. */

  /* Custom easings, named after their GSAP equivalents */
  /*  --ease-power3   smooth fast-to-slow             */
  /*  --ease-expo     extreme fast-to-slow            */
  /*  --ease-back     slight overshoot on settle       */
  :root{
    --ease-power3: cubic-bezier(.215,.61,.355,1);
    --ease-expo:   cubic-bezier(.19,1,.22,1);
    --ease-back:   cubic-bezier(.34,1.56,.64,1);
  }

  .intro-main{
    font-family:'Fraunces',serif; font-weight:800;
    font-size:clamp(40px,9vw,80px);
    color:var(--ink);
    letter-spacing:-.02em; line-height:1;
  }
  /* Per-word reveal — each word slides up + scales + fades, staggered.
     Markup wraps each word in a <span class="iw"> (intro-word). */
  .intro-main .iw{
    display:inline-block;
    opacity:0;
    transform:translateY(40px) scale(.92);
    animation:introWord 1.4s var(--ease-back) both;
  }
  .intro-main .iw:nth-child(1){animation-delay:.4s;}
  .intro-main .iw:nth-child(2){animation-delay:.7s;}
  .intro-main .iw:nth-child(3){animation-delay:1.0s;}

  .intro-italic{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:clamp(28px,6vw,52px);
    color:var(--gold);
    margin-top:8px;
  }
  .intro-italic .iw{
    display:inline-block;
    opacity:0;
    transform:translateX(-30px) scale(.9);
    filter:blur(6px);
    animation:introItalic 1.6s var(--ease-expo) both;
  }
  .intro-italic .iw:nth-child(1){animation-delay:2.0s;}
  .intro-italic .iw:nth-child(2){animation-delay:2.2s;}
  .intro-italic .iw:nth-child(3){animation-delay:2.4s;}

  /* The kicker — this line carries the WINK of the game ("a career
     in the outdoors and minor catastrophes"). Loud, bright, slightly
     too pleased with itself. Letter-spacing tightens + glow pulses
     on arrival. */
  .intro-kicker{
    font-family:'Spline Sans Mono',monospace;
    font-size:clamp(13px,2vw,18px);
    font-weight:700;
    letter-spacing:.3em; text-transform:uppercase;
    color:var(--terra-bright);
    text-shadow:0 0 18px rgba(232,138,92,0.35), 0 1px 2px rgba(0,0,0,0.4);
    margin-top:40px;
    /* nowrap so the letter-spacing animation .5em → .3em can't change
       the line count mid-animation (which caused 2-line → 1-line jitter). */
    white-space:nowrap;
    opacity:0;
    transform:translateY(20px);
    animation:introKicker 1.4s var(--ease-power3) 3.6s both,
              introKickerGlow 1.6s ease-out 4.6s both;
  }
  .intro-verdict{
    font-family:'Fraunces',serif; font-style:italic;
    color:var(--ink-dim);
    font-size:clamp(15px,2vw,19px);
    margin-top:18px;
    opacity:0;
    filter:blur(8px);
    transform:translateY(12px);
    animation:introVerdict 1.6s var(--ease-power3) 5.2s both;
  }
  .intro-tap{
    font-family:'Spline Sans Mono',monospace;
    font-size:11px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--ink-faint);
    margin-top:48px;
    opacity:0;
    animation:introTapIn 0.6s var(--ease-power3) 6.6s forwards,
              introTapPulse 1.8s ease 7.4s infinite alternate;
  }

  /* Per-word entrance — slides up from below, scales from .92 to 1,
     gentle overshoot via --ease-back. Drops the translate/scale fully. */
  @keyframes introWord{
    0%   {opacity:0; transform:translateY(40px) scale(.92);}
    60%  {opacity:1;}
    100% {opacity:1; transform:translateY(0) scale(1);}
  }
  /* Italic words — slide in from left with scale + blur defocus. */
  @keyframes introItalic{
    0%   {opacity:0; transform:translateX(-30px) scale(.9); filter:blur(6px);}
    60%  {opacity:1; filter:blur(0);}
    100% {opacity:1; transform:translateX(0) scale(1); filter:blur(0);}
  }
  /* Kicker — slides up, letter-spacing tightens as it lands. */
  @keyframes introKicker{
    0%   {opacity:0; transform:translateY(20px); letter-spacing:.5em;}
    60%  {opacity:1;}
    100% {opacity:1; transform:translateY(0); letter-spacing:.3em;}
  }
  /* Kicker glow pulse — fires after the slide-in, single burst that
     fades to the resting glow level. */
  @keyframes introKickerGlow{
    0%   {text-shadow:0 0 18px rgba(232,138,92,0.35), 0 1px 2px rgba(0,0,0,0.4);}
    40%  {text-shadow:0 0 36px rgba(232,138,92,0.75), 0 0 8px rgba(232,138,92,0.5), 0 1px 2px rgba(0,0,0,0.4);}
    100% {text-shadow:0 0 18px rgba(232,138,92,0.35), 0 1px 2px rgba(0,0,0,0.4);}
  }
  /* Verdict — focus-pulling effect: blur(8px) → blur(0) while sliding up. */
  @keyframes introVerdict{
    0%   {opacity:0; filter:blur(8px); transform:translateY(12px);}
    100% {opacity:1; filter:blur(0); transform:translateY(0);}
  }
  @keyframes introTapIn{
    from{opacity:0; transform:translateY(8px);}
    to  {opacity:0.7; transform:translateY(0);}
  }
  @keyframes introTapPulse{
    from{opacity:0.35;}
    to  {opacity:0.85;}
  }
  /* Kept for backwards compat — story-screen text still references introFade */
  @keyframes introFade{
    from{opacity:0; transform:translateY(8px);}
    to  {opacity:1; transform:none;}
  }
  @keyframes introSlide{
    from{opacity:0; transform:translateX(-16px); letter-spacing:.5em;}
    to  {opacity:1; transform:none; letter-spacing:.3em;}
  }

  .appbar{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin:2px 0 14px; animation:rise .7s ease both;}
  .brand{text-align:left;}
  .kicker{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--terra); margin-bottom:3px;}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:clamp(26px,7vw,38px); margin:0; line-height:1.05; letter-spacing:-.01em;}
  h1 em{font-style:italic; color:var(--gold);}
  .sub{font-style:italic; color:var(--ink-dim); font-size:12.5px; margin-top:5px; align-self:center;}
  .iconbtn{flex:none; width:44px; height:44px; border-radius:12px; border:1px solid var(--edge); background:var(--panel); color:var(--ink); font-size:22px; line-height:1; cursor:pointer; backdrop-filter:blur(4px); transition:border-color .2s, background .2s, opacity .2s;}
  .iconbtn:hover{border-color:var(--terra); background:rgba(210,117,74,.12);}
  .iconbtn:active{transform:scale(.95);}
  /* Permanent hamburger — fixed top-right of viewport, always visible
     so the player can exit fullscreen / open the menu from any scene,
     including the title screen (z:100 cover overlay) and the kitchen
     intro where the appbar is otherwise empty. Semi-transparent so it
     doesn't compete with the scene; full opacity on hover/active.
     z-index 150 — above title-full (100), below drawer (200) so the
     menu overlay covers it cleanly when open. */
  #menuBtn{
    position:fixed; top:14px; right:14px; z-index:150;
    opacity:.55;
  }
  #menuBtn:hover, #menuBtn:active, #menuBtn:focus-visible{opacity:1;}

  /* forecast card — its own square */
  .fcard{background:var(--panel2); border:1px solid var(--edge); border-radius:13px; padding:11px 12px 12px; margin:0 0 14px; cursor:pointer; transition:border-color .2s; animation:rise .5s .08s ease both;}
  .fcard:hover{border-color:var(--terra);}
  .fcard .fh{display:flex; justify-content:space-between; align-items:center; font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px;}
  .fcard .fh b{color:var(--gold); font-weight:600;}
  .fcard .fh span{color:var(--terra);}
  .fcard .frow{display:flex; gap:6px;}

  /* separated action bar */
  .actionbar{margin-top:16px; padding-top:14px; border-top:1px solid var(--edge);}
  .actionbar .lab{font-family:'Spline Sans Mono',monospace; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px;}
  button.go{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:#1a2b22; width:100%; border:none; border-radius:13px; padding:16px; cursor:pointer;
    background:linear-gradient(180deg,var(--terra-bright),var(--terra)); box-shadow:0 10px 26px -12px var(--terra); transition:transform .12s ease, filter .2s; display:flex; align-items:center; justify-content:center; gap:10px;}
  button.go:hover{filter:brightness(1.06); transform:translateY(-1px);}
  button.go:active{transform:translateY(0) scale(.99);}
  button.go .gs{font-family:'Spline Sans Mono',monospace; font-size:11px; font-weight:500; color:rgba(26,43,34,.7);}

  /* menu drawer */
  .drawer{position:fixed; inset:0; z-index:200; background:rgba(6,16,18,.62); backdrop-filter:blur(3px); display:none; align-items:flex-end; justify-content:center; opacity:0; transition:opacity .22s;}
  .drawer.open{display:flex; opacity:1;}
  .sheet{width:100%; max-width:640px; background:linear-gradient(180deg,#123238,#0c272c); border:1px solid var(--edge); border-bottom:none; border-radius:20px 20px 0 0; padding:10px 16px 26px; transform:translateY(16px); transition:transform .24s; box-shadow:0 -20px 50px -20px rgba(0,0,0,.8);}
  .drawer.open .sheet{transform:none;}
  .sheet .grip{width:38px; height:4px; border-radius:3px; background:var(--edge); margin:4px auto 14px;}
  .sheet .sh{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:12px; text-align:center;}

  .hud{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:6px; animation:rise .7s .05s ease both;}
  .stat{background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:9px 8px 8px; text-align:center; backdrop-filter:blur(4px);}
  .stat .lab{font-family:'Spline Sans Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); display:block;}
  .stat .val{font-family:'Spline Sans Mono',monospace; font-size:17px; font-weight:600; margin-top:3px; display:block;}
  .bar{height:4px; border-radius:3px; background:rgba(255,255,255,.08); margin-top:6px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:3px; transition:width .5s ease;}

  .goal{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.03em; color:var(--ink-faint); text-align:center; margin:8px 0 14px; line-height:1.5;}
  .goal b{color:var(--gold); font-weight:600;}

  .scene{background:var(--panel); border:1px solid var(--edge); border-radius:var(--r); padding:18px 16px; backdrop-filter:blur(6px); box-shadow:0 18px 40px -28px rgba(0,0,0,.9); flex:1; animation:rise .45s ease both;}
  .day-tag{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--terra); margin-bottom:2px;}
  .weather{font-family:'Fraunces',serif; font-size:20px; font-weight:500; margin:0 0 4px; color:var(--gold);}
  .weather small{display:block; font-family:'Spectral',serif; font-size:13.5px; font-style:italic; color:var(--ink-dim); font-weight:400; letter-spacing:0;}
  .scene h2{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:2px 0 8px; line-height:1.12;}
  .scene p{margin:0 0 14px; font-size:16px;}

  .choices{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
  button.opt{
    font-family:'Spectral',serif; font-size:15.5px; text-align:left; color:var(--ink);
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.06));
    border:1px solid var(--edge); border-radius:12px; padding:14px 15px; cursor:pointer;
    transition:transform .12s ease, border-color .2s, background .2s; width:100%; display:flex; align-items:center; gap:12px;
  }
  button.opt:hover{border-color:var(--terra); background:linear-gradient(180deg, rgba(210,117,74,.12), rgba(0,0,0,.06)); transform:translateY(-1px);}
  button.opt:active{transform:translateY(0) scale(.995);}
  button.opt .mark{font-family:'Spline Sans Mono',monospace; font-size:12px; color:var(--terra); border:1px solid var(--terra); border-radius:6px; padding:2px 7px; flex:none;}
  button.opt .b-main{flex:1;}
  button.opt .b-sub{display:block; font-size:12.5px; color:var(--ink-faint); font-style:italic; margin-top:2px;}
  button.opt.disabled{opacity:.4; pointer-events:none; filter:grayscale(.5);}
  button.opt.primary{border-color:rgba(210,117,74,.55); background:linear-gradient(180deg, rgba(210,117,74,.16), rgba(0,0,0,.05));}

  .booking{display:flex; flex-direction:column; align-items:flex-start; gap:2px;}
  .booking .route{font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
  .booking .meta{font-size:13px; color:var(--ink-dim); font-style:italic;}
  .booking .tags{font-family:'Spline Sans Mono',monospace; font-size:11px; margin-top:5px; display:flex; gap:10px; flex-wrap:wrap;}
  .booking .tags span{color:var(--ink-faint);}
  .booking .pay{color:var(--gold);}
  .d1{color:var(--sage);} .d2{color:var(--gold);} .d3{color:var(--terra-bright);}

  .team{display:flex; flex-direction:column; gap:9px; margin:4px 0 16px;}
  .mate{background:var(--panel2); border:1px solid var(--edge); border-radius:12px; padding:11px 13px; display:flex; align-items:center; gap:12px;}
  .mate .who{flex:1; min-width:0;}
  .mate .nm{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
  .mate .spec{font-size:12px; font-style:italic; color:var(--ink-faint);}
  .mate .task{font-family:'Spline Sans Mono',monospace; font-size:11px; margin-top:4px; color:var(--sea);}
  .mate .task.idle{color:var(--ink-faint);}
  .gauges{display:flex; gap:9px; margin-top:7px;}
  .g{flex:1;}
  .g .gl{font-family:'Spline Sans Mono',monospace; font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint);}
  .g .bar{margin-top:3px;}
  .mate button.assign{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.08em; color:var(--terra); background:none; border:1px solid var(--terra); border-radius:9px; padding:8px 11px; cursor:pointer; flex:none; align-self:center;}
  .mate button.assign:active{transform:scale(.96);}

  .res{border-left:2px solid var(--edge); padding-left:13px; margin:0 0 14px; animation:slidein .4s ease both;}
  .res .line{font-size:15px; margin:0 0 7px;}
  .delta{font-family:'Spline Sans Mono',monospace; font-size:13px; font-weight:600; margin-right:8px;}
  .up{color:var(--sage);} .down{color:var(--danger);} .neu{color:var(--ink-dim);} .gold{color:var(--gold);}

  .ledger{margin:2px 0 14px;}
  .ledger .row{display:flex; justify-content:space-between; font-family:'Spline Sans Mono',monospace; font-size:13px; padding:6px 0; border-bottom:1px dashed rgba(255,255,255,.07);}
  .ledger .row .l{color:var(--ink-dim);}
  .ledger .row .v.pos{color:var(--sage);} .ledger .row .v.neg{color:var(--danger);}

  .end{text-align:center; padding:8px 4px;}
  .end h2{font-size:30px;}
  .end .verdict{font-style:italic; color:var(--ink-dim); margin-bottom:16px;}

  footer{text-align:center; margin-top:18px; font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--ink-faint);}
  footer button{background:none; border:none; color:var(--terra); font-family:inherit; font-size:10px; letter-spacing:.1em; cursor:pointer; text-decoration:underline; text-underline-offset:3px;}

  @keyframes rise{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
  @keyframes slidein{from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:none;}}

  /* Art assets — see ASSET-MANIFEST.md. .art is the base; per-tier
     modifiers size and frame for the slot the asset lands in. All
     assets are matte gouache (see ART-DIRECTION.md) so no shadow,
     glow, or radius — the picture is the picture. */
  /* No forced aspect-ratio — every image renders at its native shape
     (heroes are 2:3 portrait, places/scenes/title are 16:10, chrome 4:3,
     glyphs 1:1). Forcing aspect-ratio stretched whichever batch didn't
     match the assumption. Landscape 2-col: inside .col-stage images fill
     their column; outside (utility screens) they keep modest max-widths. */
  .art{display:block; max-width:100%; height:auto; margin:0 auto;}
  .art-hero{display:block; width:80%; max-width:320px; height:auto; margin:6px auto 12px;}
  .art-place{display:block; width:100%; max-width:620px; height:auto; margin:6px auto 10px;}
  .art-scene{display:block; width:100%; max-width:720px; height:auto; margin:6px auto 14px;}
  .art-chrome{display:block; width:100%; max-width:520px; height:auto; margin:6px auto 12px;}
  .art-title{display:block; width:100%; max-width:620px; height:auto; margin:0;}
  .art-wordmark{display:block; max-width:280px; height:auto; margin:0 auto 14px;}
  /* Inside col-stage: image fills the column. */
  .col-stage .art, .col-stage .scene-stage{max-width:none; width:100%;}
  .col-stage .scene-stage{margin:0;}
  /* Title block: cover image leads, wordmark + kicker sit BELOW as a
     caption. The "first booking" cover is dense with narrative content
     (mum's note, phone notification, map) — overlaying type on top of
     it would compete. Below-image caption respects the image's voice.
     Colors hardcoded for the dark page background (var(--ink) which
     is the light sand for text-on-dark-bg is actually correct here). */
  .title-block{max-width:560px; margin:0 auto 8px;}
  .title-wm{text-align:center; margin:14px auto 4px; line-height:1;}
  .title-wm-kicker{font-family:'Spline Sans Mono',monospace; font-size:clamp(9px,1.6vw,11px); letter-spacing:.3em; text-transform:uppercase; color:var(--terra); margin-bottom:12px; line-height:1.3;}
  .title-wm-main{font-family:'Fraunces',serif; font-weight:800; font-size:clamp(28px,7vw,46px); color:var(--ink); letter-spacing:-.015em; line-height:1;}
  .title-wm-italic{font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:clamp(18px,4.6vw,32px); color:var(--gold); margin-top:6px; letter-spacing:.005em;}
  /* Inline glyphs: discipline picker (~36px) + forecast chip (~22px). */
  .art-glyph{display:inline-block; width:76px; height:76px; vertical-align:middle; margin-right:12px; flex:none;}
  .art-glyph-sm{display:block; width:22px; height:22px; margin:4px auto 4px;}

  /* TITLE SCREEN — true fullscreen cover overlay. Sits OUTSIDE the
     wrap visually (position:fixed inset:0) so the cover image goes
     edge-to-edge regardless of wrap's 1100px max-width. The cold-open
     intro already showed the wordmark / kicker / verdict typography;
     this screen is mute on purpose — just the desk image and the two
     small action buttons. Hamburger (z:150) and drawer (z:200) stack
     above so menu still works from here. */
  .title-full{
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    background:var(--bg);  /* fallback if image is missing */
  }
  .title-full-bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
  }
  .title-full-controls{
    position:relative; z-index:2;
    display:flex; flex-direction:column;
    gap:10px;
    width:100%; max-width:320px;
    padding:0 16px;
  }
  .title-btn{
    display:flex; align-items:center; gap:12px;
    width:100%;
    background:rgba(238,229,210,.94); color:#1B1B1F;
    border:2px solid #1B1B1F; border-radius:12px;
    padding:11px 16px;
    font-family:'Fraunces',serif; font-weight:600; font-size:16px;
    text-align:left; cursor:pointer;
    box-shadow:0 4px 18px rgba(0,0,0,.35);
    transition:transform .15s ease, background .15s ease;
  }
  .title-btn:hover{transform:translateY(-1px); background:#EEE5D2;}
  .title-btn:active{transform:translateY(0);}
  .title-btn[disabled]{opacity:.45; cursor:not-allowed; transform:none;}
  .title-btn .mark{
    font-family:'Spline Sans Mono',monospace; font-size:14px;
    color:var(--terra); flex:none; width:18px; text-align:center;
  }
  .title-btn .b-main{flex:1; line-height:1.15;}
  .title-btn .b-sub{
    display:block;
    font-family:'Spline Sans Mono',monospace; font-size:9px;
    letter-spacing:.18em; text-transform:uppercase;
    color:rgba(27,27,31,.6); margin-top:3px; font-weight:500;
  }
  .title-footnote{
    position:absolute; bottom:14px; left:0; right:0;
    z-index:2; text-align:center;
    font-family:'Spline Sans Mono',monospace; font-size:10px;
    letter-spacing:.15em; color:rgba(238,229,210,.6);
    text-shadow:0 1px 3px rgba(0,0,0,.6);
    padding:0 16px;
  }

  /* SCENE-FULL — fullscreen body-level overlay for any scene that
     wants the cover-image-fills-everything treatment (kitchen, etc.).
     Same architecture as .title-full: bypasses .scene's containment
     by sitting at body level. Layout: cover image fills bg; day-tag
     pinned top-center; speech bubbles overlay; discrete narrator +
     controls panel pinned to lower portion of screen.
     Fades in over 1.4s — combined with the story-screen's 1.2s fade-
     out, gives a true crossfade transition from text → graphic. */
  .scene-full{
    position:fixed; inset:0; z-index:100;
    overflow:hidden;
    background:var(--bg);
    animation:sceneFadeIn 1.4s ease-out both;
  }
  @keyframes sceneFadeIn{
    from{opacity:0;}
    to  {opacity:1;}
  }
  .scene-full-bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
  }
  .scene-full-tag{
    position:absolute; top:48px; left:0; right:0;
    z-index:3; text-align:center;
    font-family:'Spline Sans Mono',monospace;
    font-size:12px; font-weight:700;
    letter-spacing:.3em; text-transform:uppercase;
    color:rgba(238,229,210,.96);
    text-shadow:0 1px 5px rgba(0,0,0,.85);
    pointer-events:none;
    padding:0 70px;  /* keep clear of hamburger top-right */
  }
  /* Bubbles inside scene-full sit above the bg, below the panel */
  .scene-full .bubble{z-index:3;}
  /* Discrete narrator + controls panel pinned to lower portion */
  .scene-full-panel{
    position:absolute;
    left:50%; bottom:20px;
    transform:translateX(-50%);
    z-index:4;
    width:calc(100% - 40px);
    max-width:720px;
    background:rgba(238,229,210,.93);
    border:1.5px solid #1B1B1F;
    border-radius:12px;
    padding:14px 18px;
    box-shadow:0 6px 26px rgba(0,0,0,.5);
  }
  .scene-narrator{
    font-family:'Fraunces',serif; font-style:italic;
    font-size:13px; line-height:1.5;
    color:#1B1B1F;
    margin:0;
  }
  .scene-input{
    display:flex; align-items:center;
    gap:10px; flex-wrap:wrap;
    margin-top:12px; padding-top:12px;
    border-top:1px solid rgba(27,27,31,.18);
  }
  .scene-input-label{
    font-family:'Spline Sans Mono',monospace;
    font-size:10.5px; font-weight:700;
    letter-spacing:.22em; text-transform:uppercase;
    color:rgba(27,27,31,.85);
    flex:none;
  }
  .scene-input input{
    flex:1; min-width:140px;
    padding:9px 12px;
    border-radius:8px;
    border:1px solid rgba(27,27,31,.4);
    background:rgba(255,255,255,.65);
    color:#1B1B1F;
    font-family:'Fraunces',serif; font-size:15px;
    outline:none;
  }
  .scene-input input:focus{
    border-color:var(--terra);
    background:rgba(255,255,255,.92);
  }
  .scene-input .scene-btn{
    flex:none;
    background:#1B1B1F; color:#EEE5D2;
    border:none; border-radius:8px;
    padding:10px 16px;
    font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    cursor:pointer;
    transition:background .15s, transform .15s;
  }
  .scene-input .scene-btn:hover{background:#000; transform:translateY(-1px);}
  .scene-input .scene-btn:active{transform:translateY(0);}

  /* Mini variant of the scene panel — narrower, anchored bottom-right
     instead of centred. Used when the narrator text has been shown on
     a prior story-screen and only a small input remains. */
  .scene-full-panel--mini{
    left:auto; right:24px;
    bottom:24px;
    transform:none;
    width:auto; max-width:300px;
    padding:12px 14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .scene-full-panel--mini .scene-input-label{margin-bottom:2px;}
  .scene-full-panel--mini input{
    width:100%;
    padding:9px 12px;
    border-radius:8px;
    border:1px solid rgba(27,27,31,.4);
    background:rgba(255,255,255,.7);
    color:#1B1B1F;
    font-family:'Fraunces',serif; font-size:15px;
    outline:none;
  }
  .scene-full-panel--mini input:focus{
    border-color:var(--terra);
    background:rgba(255,255,255,.95);
  }
  .scene-full-panel--mini .scene-btn{
    width:100%;
    background:#1B1B1F; color:#EEE5D2;
    border:none; border-radius:8px;
    padding:10px 14px;
    font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    cursor:pointer;
    transition:background .15s, transform .15s;
  }
  .scene-full-panel--mini .scene-btn:hover{background:#000; transform:translateY(-1px);}

  /* Choices panel — wider than mini, holds a vertical list of buttons.
     Scrollable when content exceeds available height (10 heroes need this).
     max-height keeps the panel clear of left-side bubbles above. */
  .scene-full-panel--choices{
    left:auto; right:24px;
    bottom:24px;
    transform:none;
    width:calc(100% - 48px);
    max-width:380px;
    max-height:calc(100% - 200px);
    overflow-y:auto;
    padding:12px 14px;
    display:flex; flex-direction:column;
    gap:8px;
    scrollbar-width:thin;
    scrollbar-color:rgba(27,27,31,.4) transparent;
  }
  .scene-full-panel--choices::-webkit-scrollbar{width:5px;}
  .scene-full-panel--choices::-webkit-scrollbar-thumb{background:rgba(27,27,31,.35); border-radius:3px;}
  /* Scroll hint — sticky chevron at the bottom of the panel that tells
     the player they can scroll. Position:sticky keeps it at the bottom
     of the visible viewport while content scrolls; when scrolled to the
     end it settles into normal flow at the actual bottom of content. */
  .scene-full-panel--choices .scroll-hint{
    position:sticky; bottom:-12px;
    align-self:center;
    font-family:'Spline Sans Mono',monospace;
    font-size:14px; line-height:1;
    color:rgba(27,27,31,.45);
    padding:6px 10px 2px;
    margin:-4px 0 -8px;
    pointer-events:none;
    animation:scrollHint 1.6s ease-in-out infinite;
  }
  @keyframes scrollHint{
    0%,100%{opacity:.35; transform:translateY(0);}
    50%   {opacity:.8;  transform:translateY(3px);}
  }
  .scene-full-panel--choices .scene-input-label{margin-bottom:4px;}
  /* .opt buttons inside the choices panel — override for bone bg.
     More transparent so the cover image bleeds through. No pre-selected
     "primary" highlight in dish/hero pickers (click = advance, no
     selected state to show). Hover still gives strong feedback. */
  .scene-full-panel--choices button.opt{
    background:rgba(255,255,255,.38);
    border:1px solid rgba(27,27,31,.25);
    color:#1B1B1F;
    padding:9px 12px;
    font-size:13.5px;
    border-radius:8px;
    margin:0;
    text-align:left;
  }
  .scene-full-panel--choices button.opt:hover{
    background:rgba(255,255,255,.78);
    border-color:#1B1B1F;
    transform:translateY(-1px);
  }
  .scene-full-panel--choices button.opt.primary{
    background:rgba(255,255,255,.55);
    border-color:rgba(27,27,31,.55);
  }
  .scene-full-panel--choices button.opt .mark{
    color:#1B1B1F;
    border-color:rgba(27,27,31,.4);
  }
  .scene-full-panel--choices button.opt .b-sub{
    color:rgba(27,27,31,.62);
    font-size:11.5px;
  }
  .scene-full-panel--choices button.opt.disabled{opacity:.35;}
  /* Action button (Go on / Step outside) in the choices panel */
  .scene-full-panel--choices .scene-go{
    width:100%;
    background:#1B1B1F; color:#EEE5D2;
    border:none; border-radius:8px;
    padding:10px 14px;
    font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    cursor:pointer;
    transition:background .15s, transform .15s;
    margin-top:4px;
  }
  .scene-full-panel--choices .scene-go:hover{background:#000; transform:translateY(-1px);}
  .scene-full-panel--choices .scene-back{
    width:100%;
    background:transparent;
    color:rgba(27,27,31,.7);
    border:1px solid rgba(27,27,31,.3);
    border-radius:8px;
    padding:8px 12px;
    font-family:'Fraunces',serif; font-size:12.5px; font-style:italic;
    cursor:pointer;
  }
  .scene-full-panel--choices .scene-back:hover{background:rgba(0,0,0,.05);}

  /* STORY-SCREEN — solid-bg page for prose moments. Lets the player
     read undistracted before the scene image arrives. Day-tag top,
     centred prose middle. Auto-transitions after ~10s with a slow
     fade; tap also dismisses (silent skip — no visible prompt). */
  .story-screen{
    position:fixed; inset:0; z-index:105;
    background:linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:60px 40px 80px;
    cursor:pointer;
    transition:opacity 1.2s ease;
  }
  .story-screen.fading{opacity:0;}
  /* Scene-full bubble overrides — in viewport context, use pixel offsets
     that clear the menu button (top-right 14/14, size 44) and leave a
     comfortable inset from screen edges. Inside .scene-stage (smaller
     box) the existing percentage positions still apply. */
  /* Panigiri setup — wider, centred, taller panel (it carries a lot of picks)
     over the full-bleed festival image. Must follow --choices to override it. */
  .scene-full-panel--setup{
    left:50%; right:auto; transform:translateX(-50%);
    bottom:16px;
    width:calc(100% - 36px); max-width:600px;
    max-height:calc(100% - 80px);
  }
  .setup-lede{ font-family:'Fraunces',serif; font-size:13px; line-height:1.45; color:#1B1B1F; margin:0 0 8px; }
  /* on-trail beats: readable panel over the full-bleed place backdrop */
  .scene-full-panel--trip{ left:50%; right:auto; transform:translateX(-50%); bottom:18px;
    width:calc(100% - 40px); max-width:560px; max-height:calc(100% - 92px); color:#1B1B1F; }
  .scene-full-panel--trip .trip-title{ font-family:'Fraunces',serif; font-weight:600; font-size:17px;
    line-height:1.18; margin:0 0 6px; color:#1B1B1F; }
  .scene-full-panel--trip .trip-text{ font-family:'Fraunces',serif; font-size:13.5px; line-height:1.45;
    margin:0 0 10px; color:#1B1B1F; }
  .scene-full-panel--trip .res{ border-left-color:rgba(27,27,31,.22); margin:0 0 10px; }
  .scene-full-panel--trip .res .line{ color:#1B1B1F; }
  /* day report: existing dark-theme markup on a bone panel via local var overrides */
  .scene-full-panel--report{ left:50%; right:auto; transform:translateX(-50%); bottom:16px;
    width:calc(100% - 40px); max-width:600px; max-height:calc(100% - 84px); color:#1B1B1F;
    --panel2:rgba(255,255,255,.5); --edge:rgba(27,27,31,.18); --ink-faint:rgba(27,27,31,.5); --ink-dim:rgba(27,27,31,.72); }
  .scene-full-panel--report .trip-title{ font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:#1B1B1F; margin:0 0 8px; }
  .scene-full-panel--report .res{ border-left-color:rgba(27,27,31,.2); margin:0 0 10px; }
  .scene-full-panel--report .res .line{ color:#1B1B1F; }
  .scene-full-panel--report .report-note{ font-style:italic; color:rgba(27,27,31,.72); font-size:12.5px; margin:6px 0; }
  .scene-full-panel--report .ledger .row{ border-bottom-color:rgba(27,27,31,.12); }
  .scene-full .bubble.left-top  { top:80px; left:24px;  max-width:55%; }
  .scene-full .bubble.right-top { top:80px; right:80px; max-width:50%; }
  .scene-full .bubble.left-mid  { top:38%;  left:24px;  max-width:55%; }
  .scene-full .bubble.right-mid { top:38%;  right:80px; max-width:50%; }
  .scene-full .bubble.left-bot  { top:62%;  left:24px;  max-width:55%; }
  .scene-full .bubble.right-bot { top:62%;  right:80px; max-width:50%; }

  /* ============ DESK-HUB (diegetic home base) — see DESK-HUB.md ============
     A body-level full-bleed room. One 20:9 base painting fills a centred
     stage; interactive objects are absolutely-positioned overlays/regions
     placed in % of the stage, so they track the image on any viewport.
     The room IS the menu — no HUD chrome. */
  .hub{ position:fixed; inset:0; z-index:100; background:var(--bg);
    display:grid; place-items:center; overflow:hidden;
    animation:sceneFadeIn 1.4s ease-out both; }
  .hub-stage{ position:relative; aspect-ratio:1870/841;
    width:min(100%, calc(100dvh * 1870 / 841)); max-height:100dvh; }
  .hub-base{ position:absolute; inset:0; width:100%; height:100%;
    object-fit:fill; z-index:0; }
  /* a tappable object: positioned by its CENTRE (left/top), sized by width% */
  .hub-obj, .hub-region{ position:absolute; transform:translate(-50%,-50%);
    background:none; border:none; padding:0; margin:0; cursor:pointer;
    -webkit-tap-highlight-color:transparent; z-index:2; }
  .hub-obj img{ display:block; width:100%; height:auto; pointer-events:none;
    filter:drop-shadow(0 3px 5px rgba(27,27,31,.28)); }
  .hub-obj{ animation:hubPulse 2.8s ease-in-out infinite;
    transition:filter .2s, transform .12s; }
  @keyframes hubPulse{ 0%,100%{ filter:drop-shadow(0 0 0 rgba(232,168,81,0)); }
    50%{ filter:drop-shadow(0 0 7px rgba(232,168,81,.40)); } }
  .hub-obj:hover, .hub-obj:focus-visible{
    filter:drop-shadow(0 0 13px rgba(232,168,81,.85)); outline:none; }
  .hub-obj:active{ transform:translate(-50%,-50%) scale(.96); }
  /* seasonal harbour view dropped into the window opening (non-interactive) */
  .hub-window{ position:absolute; transform:translate(-50%,-50%); z-index:1; pointer-events:none; }
  .hub-window img{ display:block; width:100%; height:auto; }
  /* invisible regions over painted-in furniture (window/bed/door/board) */
  .hub-region{ border-radius:16px; animation:hubRegion 2.8s ease-in-out infinite;
    transition:background .25s, box-shadow .25s; }
  @keyframes hubRegion{ 0%,100%{ box-shadow:inset 0 0 22px 2px rgba(232,168,81,0); }
    50%{ box-shadow:inset 0 0 26px 3px rgba(232,168,81,.15); } }
  .hub-region:hover, .hub-region:focus-visible{ outline:none;
    background:radial-gradient(ellipse at center, rgba(232,168,81,.20) 0%, rgba(232,168,81,0) 70%);
    box-shadow:inset 0 0 30px 4px rgba(232,168,81,.40); }
  /* highlight-all cue mode (the ? toggle): boost glow + show labels */
  body.hub-cue .hub-obj{ filter:drop-shadow(0 0 13px rgba(232,168,81,.9)); }
  body.hub-cue .hub-region{ box-shadow:inset 0 0 30px 4px rgba(232,168,81,.42);
    background:radial-gradient(ellipse at center, rgba(232,168,81,.16) 0%, rgba(232,168,81,0) 72%); }
  .hub-obj[data-label]::after, .hub-region[data-label]::after{ content:attr(data-label);
    position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:5px;
    font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; white-space:nowrap;
    color:#EEE5D2; background:rgba(27,27,31,.82); padding:2px 7px; border-radius:5px;
    opacity:0; transition:opacity .2s; pointer-events:none; }
  body.hub-cue .hub-obj[data-label]::after, body.hub-cue .hub-region[data-label]::after{ opacity:1; }
  /* top-center date / weather strip */
  .hub-tag{ position:absolute; top:16px; left:0; right:0; z-index:5;
    text-align:center; pointer-events:none;
    font-family:'Spline Sans Mono',monospace; font-size:11px; font-weight:700;
    letter-spacing:.26em; text-transform:uppercase;

  /* Scene stage — persistent scene image with characters speaking in
     bubbles overlaid. See ART-DIRECTION.md §12. The image holds across
     beats of a conversation; bubbles replace per beat. */
  .scene-stage{position:relative; max-width:620px; margin:6px auto 10px; line-height:0;}
  .scene-stage img{display:block; width:100%; height:auto; border-radius:8px;}
  .bubble{
    position:absolute;
    background:rgba(238,229,210,.94);   /* bone, slightly translucent */
    color:#1B1B1F;                       /* hardcoded dark ink (var(--ink) is light sand on dark bg) */
    border:2px solid #1B1B1F;
    border-radius:16px;
    padding:9px 13px;
    font-family:'Fraunces',serif;
    font-size:clamp(13px,2.4vw,15px);
    line-height:1.35;
    max-width:60%;
    animation:bubblein 1.2s ease-out both;  /* slow fade-in */
  }
  /* Tail — small ink triangle pointing at the speaker's position */
  .bubble:after{content:''; position:absolute; width:0; height:0; border:7px solid transparent;}
  .bubble:before{content:''; position:absolute; width:0; height:0; border:6px solid transparent; z-index:1;}
  /* Position variants — left side (speaker on left of image) */
  .bubble.left-top   {top:5%;  left:5%;}
  .bubble.left-mid   {top:32%; left:8%;}
  .bubble.left-bot   {top:60%; left:6%;}
  .bubble.left-top:after, .bubble.left-mid:after, .bubble.left-bot:after{bottom:-14px; left:24%; border-top-color:#1B1B1F;}
  .bubble.left-top:before, .bubble.left-mid:before, .bubble.left-bot:before{bottom:-10px; left:25%; border-top-color:rgba(238,229,210,.94);}
  /* Position variants — right side (bubble points left at the speaker) */
  .bubble.right-top  {top:5%;  right:5%;}
  .bubble.right-mid  {top:32%; right:5%;}
  .bubble.right-bot  {top:60%; right:5%;}
  .bubble.right-top:after, .bubble.right-mid:after, .bubble.right-bot:after{bottom:-14px; right:24%; border-top-color:#1B1B1F;}
  .bubble.right-top:before, .bubble.right-mid:before, .bubble.right-bot:before{bottom:-10px; right:25%; border-top-color:rgba(238,229,210,.94);}
  /* Thought variant — dashed border, italic type */
  .bubble.thought{border-style:dashed; font-style:italic;}
  /* Icon / device variant — mono small caps for non-human speakers */
  .bubble.icon{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:7px 11px;}
  /* Off-frame (speaker not visible) — no tail */
  .bubble.offframe{font-style:italic;}
  .bubble.offframe:after, .bubble.offframe:before{display:none;}
  /* Stagger animation across stacked bubbles */
  /* Stacked bubble cadence — each subsequent bubble appears 2s after
     the previous starts, so mum's multi-bubble speech (Beat 4 pitch)
     lands line by line with breathing room rather than all at once. */
  .bubble:nth-of-type(1){animation-delay:0s;}
  .bubble:nth-of-type(2){animation-delay:2s;}
  .bubble:nth-of-type(3){animation-delay:4s;}
  .bubble:nth-of-type(4){animation-delay:6s;}
  @keyframes bubblein{from{opacity:0; transform:translateY(-6px) scale(.96);} to{opacity:1; transform:none;}}

  /* Narrator line — italic, low contrast, sits BELOW the scene image */
  .narrator{font-style:italic; color:var(--ink-dim); font-size:14px; line-height:1.5; text-align:center; max-width:520px; margin:8px auto 14px;}

<script>
const $ = id => document.getElementById(id);
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const rnd = a => a[Math.floor(Math.random()*a.length)];
const chance = p => Math.random()<p;
const ri = (a,b)=>a+Math.floor(Math.random()*(b-a+1));

let S, gCounter=0;

/* Weather. Each type carries a stability baseline — Clear/Hot sit quiet,
   Drizzle/Storm are volatile. Each daily roll wraps the type in its own
   per-day stability score (baseline ± jitter, 0-100), so the same Clear
   day can be steady or unstable. Days <75 stability roll for a mid-trip
   turn (renderWeatherTurn). */
const WEATHER=[
  {name:'Clear skies', short:'Clear', col:'var(--gold)', note:'The light is perfect and the air is still. A guide could not ask for more.', risk:0, drain:0, stability:85},
  {name:'Hot and dry', short:'Hot', col:'var(--terra)', note:'The cicadas are screaming. The Messinian sun will test everyone today.', risk:0.05, drain:10, heat:true, stability:75},
  {name:'Gusty winds', short:'Windy', col:'var(--sea)', note:'The wind is up off the gulf, snapping at the ridgelines.', risk:0.10, wind:true, stability:50},
  {name:'Low cloud and drizzle', short:'Drizzle', col:'#7fb6c8', note:'A soft grey ceiling sits over Taygetos. Footing will be slick.', risk:0.08, mist:true, stability:40},
  {name:'A storm is gathering', short:'Storm', col:'var(--danger)', note:'The horizon has gone the colour of a bruise. The high routes are no place to be.', risk:0.24, storm:true, stability:30},
];
const FORECAST_DAYS=5;
function rollWeather(){
  const base = rnd(WEATHER);
  // Per-day jitter — same Clear day can be 70 or 100 stable.
  const stability = clamp((base.stability||60) + ri(-15, 15), 0, 100);
  return Object.assign({}, base, {stability});
}
function ensureForecast(){ S.forecast=S.forecast||[]; while(S.forecast.length<FORECAST_DAYS) S.forecast.push(rollWeather()); }
// Where each weather type can drift if a day turns. Weights bias the change
// in a plausible direction (windy days lean toward storm/drizzle; storms
// blow themselves out toward windy/drizzle; clear days mostly stay or pick
// up wind in the afternoon).
const WEATHER_TRANSITIONS = {
  Clear:   [{to:'Windy', w:3}, {to:'Hot', w:1}],
  Hot:     [{to:'Windy', w:2}, {to:'Storm', w:1}],
  Windy:   [{to:'Storm', w:2}, {to:'Drizzle', w:2}, {to:'Clear', w:1}],
  Drizzle: [{to:'Storm', w:2}, {to:'Windy', w:2}, {to:'Clear', w:1}],
  Storm:   [{to:'Windy', w:3}, {to:'Drizzle', w:2}],
};
function weatherByShort(s){ return WEATHER.find(w=>w.short===s); }
function pickTurnTarget(currentShort){
  const opts = WEATHER_TRANSITIONS[currentShort] || [];
  if(!opts.length) return null;
  let total = opts.reduce((s,o)=>s+o.w,0), r = Math.random()*total;
  for(const o of opts){ if((r -= o.w) <= 0) return weatherByShort(o.to); }
  return weatherByShort(opts[0].to);
}
// Stability label / colour for forecast chips and headers.
function stabilityHint(stab){
  if(stab >= 75) return {label:'steady',   col:'var(--olive)'};
  if(stab >= 50) return {label:'unsettled',col:'var(--gold)'};
  if(stab >= 30) return {label:'volatile', col:'var(--terra)'};
  return                 {label:'turning',  col:'var(--danger)'};
}
function weatherAdvice(w){
  if(w.storm) return 'High and exposed routes are off. Anyone out wants a map and rain shells.';
  if(w.mist) return 'A map &amp; compass is worth its weight; expect slick ground.';
  if(w.wind) return 'Keep off knife-edge ridges; pack rain shells in case it turns.';
  if(w.heat) return 'Sun protection and plenty of water — start early, rest in the shade.';
  return 'A fine day for almost anything. Make the most of it.';
}
function weatherChip(w, label, big){
  // Outline tints by stability so unstable days are subtly flagged in the
  // forecast strip. When a glyph asset is shipped, it replaces the colored
  // dot; the chip still tints by stability and labels by short name.
  const sh = stabilityHint(w.stability ?? 75);
  const border = w.stability != null && w.stability < 75 ? sh.col : 'var(--edge)';
  // Unstable forecast days swap to the dedicated unstable glyph; otherwise
  // we look up by short name (Clear/Hot/Windy/Drizzle/Storm).
  const unstable = w.stability != null && w.stability < 50;
  const glyphId = unstable ? 'glyph-weather-unstable' : WEATHER_GLYPH[w.short];
  const glyph = imgFor(glyphId, {cls:'art art-glyph-sm', alt:w.short});
  const dot = `<div style="width:${big?'14px':'10px'};height:${big?'14px':'10px'};border-radius:50%;background:${w.col};margin:5px auto 4px;box-shadow:0 0 8px ${w.col}"></div>`;
  return `<div style="flex:1;min-width:0;text-align:center;background:var(--panel2);border:1px solid ${border};border-radius:10px;padding:${big?'10px 6px':'8px 4px'}">
    <div style="font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)">${label}</div>
    ${glyph || dot}
    <div style="font-family:'Spline Sans Mono',monospace;font-size:${big?'12px':'10px'};color:${w.col}">${w.short}</div>
  </div>`;
}
function paintForecast(){
  if(!S || !$('fcast')) return;
  ensureForecast();
  const chips=S.forecast.slice(0,FORECAST_DAYS).map((w,i)=>{
    const sd=S.seasonDay+i;
    const label = i===0 ? 'Today' : (sd<=SUMMER_DAYS ? 'D'+sd : 'Off');
    return weatherChip(w, label);
  }).join('');
  $('fcast').innerHTML=`<div class="fcard" onclick="renderForecast()">
    <div class="fh"><span>Forecast · <b>${S.weather.short}</b> today</span><span>5-day ▸</span></div>
    <div class="frow">${chips}</div></div>`;
}
function renderForecast(){
  ensureForecast();
  const back = S.phase===1?'renderCurrent()':'renderAssign()';
  const cards=S.forecast.slice(0,FORECAST_DAYS).map((w,i)=>`
    <div class="mate" style="align-items:flex-start">
      <div style="width:34px;height:34px;border-radius:50%;background:${w.col};box-shadow:0 0 12px ${w.col};flex:none;margin-top:2px"></div>
      <div class="who" style="margin-left:12px">
        <div class="nm">${i===0?'Today':(S.seasonDay+i<=SUMMER_DAYS?summerDate(S.seasonDay+i):'After the season closes')} — <span style="color:${w.col}">${w.name}</span></div>
        <div class="spec" style="margin:2px 0 4px">${w.note}</div>
        <div class="task">${weatherAdvice(w)}</div>
      </div>
    </div>`).join('');
  reportStage('bedroom-p1-window-summer', `<p class="trip-title">The week ahead</p>
    <p class="report-note">How the days read from the window. Save the high, exposed lines for clear weather.</p>
    <div class="team">${cards}</div>
    <button class="scene-go" onclick="${back}">Back to the day</button>`,
    `${dayTag()} · forecast`);
}

  [/Methoni|Methóni|Pylos|Koroni|Koróni|Finikounda|Finikoúnda/i,'place-pylos-methoni'],

function placeAssetFor(routeName){
  if(!routeName) return null;
  for(let i=0;i<PLACE_PATTERNS.length;i++){
    if(PLACE_PATTERNS[i][0].test(routeName)) return PLACE_PATTERNS[i][1];
  }
  return null;
}
function imgFor(id, opts){
  opts = opts || {};
  if(!id || !ASSETS[id]) return '';
  const cls = opts.cls || 'art';
  const alt = (opts.alt || '').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return `<img class="${cls}" src="${ASSETS[id]}" alt="${alt}" loading="lazy">`;
}
/* sceneStage(assetId, bubbles, opts) — persistent scene image with
   speech bubbles overlaid. The "image with text under" pattern is
   replaced by this — characters speak inside the scene; the narrator
   speaks in italic underneath via the {narrator: '...'} opt.
   See ART-DIRECTION.md §12. Each bubble = {text, where, kind?}:
     where: 'left-top'|'left-mid'|'left-bot'|'right-top'|'right-mid'|'right-bot'
     kind:  optional — 'thought'|'icon'|'offframe' (adds modifier class) */
function sceneStage(assetId, bubbles, opts){
  opts = opts || {};
  const img = imgFor(assetId, {cls:'art', alt:opts.alt || ''});
  if(!img) return opts.narrator ? `<p class="narrator">${opts.narrator}</p>` : '';
  const bubbleHTML = (bubbles||[]).map(b => {
    const kind = b.kind ? ' ' + b.kind : '';
    return `<div class="bubble ${b.where||'left-top'}${kind}">${b.text}</div>`;
  }).join('');
  const narrator = opts.narrator ? `<p class="narrator">${opts.narrator}</p>` : '';
  return `<div class="scene-stage">${img}${bubbleHTML}</div>${narrator}`;
}

   days played day-by-day. Winter (Nov–March, 22 weeks) is one planning

const WINTER_WEEKS=22;
const MONTHS=[['April',30],['May',31],['June',30],['July',31],['August',31],['September',30],['October',31]];
function summerDate(d){ let r=d; for(const [n,k] of MONTHS){ if(r<=k) return `${n} ${r}`; r-=k; } return `October ${r}`; }
function summerWeek(d){ return Math.floor((d-1)/7)+1; }
function dayTag(){ return S.season==='winter' ? `Year ${S.year} · Winter` : `Year ${S.year} · ${summerDate(S.seasonDay)}`; }
function seasonPhase(d){ if(d<=30) return 'early';        // April: shoulder, locals
                          if(d<=92) return 'building';     // May-June: warming up
                          if(d<=153) return 'peak';        // July-August: tourists everywhere
                          if(d<=183) return 'late';        // September: still busy, shoulder begins
                          return 'closing'; }              // October: tail of the season

/* Storage with two backends: window.storage when running as a Claude.ai
   artifact, otherwise plain localStorage so the game saves when you open
   the HTML on your phone or download it to a desktop browser. */
function hasArtifactStorage(){ return typeof window!=='undefined' && !!window.storage; }
function hasLocalStorage(){ try{ return typeof window!=='undefined' && !!window.localStorage; }catch(e){ return false; } }
function hasStorage(){ return hasArtifactStorage() || hasLocalStorage(); }
async function saveGame(){
  const data = JSON.stringify({S, g:gCounter});
  try{
    if(hasArtifactStorage()) await window.storage.set(SAVE_KEY, data, false);
    else if(hasLocalStorage()) window.localStorage.setItem(SAVE_KEY, data);
  }catch(e){}
}
async function loadSave(){
  try{
    if(hasArtifactStorage()){
      const r=await window.storage.get(SAVE_KEY);
      if(r&&r.value) return JSON.parse(r.value);
    } else if(hasLocalStorage()){
      const v=window.localStorage.getItem(SAVE_KEY);
      if(v) return JSON.parse(v);
    }
  }catch(e){}
  return null;
}
async function clearSave(){
  try{
    if(hasArtifactStorage()) await window.storage.delete(SAVE_KEY,false);
    else if(hasLocalStorage()) window.localStorage.removeItem(SAVE_KEY);
  }catch(e){}
}

// Render a solid-bg "story-screen" — a paragraph of prose with day-tag
// at the top and tap-to-continue at the bottom. Used as the front beat
// for any kitchen / scene transition where the narrator text wants room
// to breathe without competing with the cover image.
function renderStoryScreen(opts){
  // opts: { tag, text, onContinue, autoMs }
  // Auto-transitions after autoMs (default 10000ms). Slow fade-out
  // (CSS 1.2s). Tap also dismisses (silent skip — no visible prompt).
  removeStoryOverlay();
  if(!(typeof document !== 'undefined' && document.body && document.body.appendChild)) {
    // Test harness fallback — skip the overlay, go straight to next.
    if(typeof opts.onContinue === 'function') opts.onContinue();
    return;
  }
  const overlay = document.createElement('div');
  overlay.id = 'storyOverlay';
  overlay.className = 'story-screen';
  overlay.innerHTML = `
    <div class="story-screen-tag">${opts.tag||''}</div>
    <p class="story-screen-text">${opts.text||''}</p>
  `;
  let dismissed = false;
  const handler = () => {
    if(dismissed) return;
    dismissed = true;
    overlay.removeEventListener('click', handler);
    overlay.classList.add('fading');
    if(typeof opts.onContinue === 'function') opts.onContinue();
    setTimeout(() => { overlay.parentNode && overlay.parentNode.removeChild(overlay); }, 1250);
  };
  overlay.addEventListener('click', handler);
  setTimeout(handler, opts.autoMs || 10000);  // auto-dismiss after 10s
  document.body.appendChild(overlay);
  setScene('');
}

function renderTitle(save, loading){
  // Body-level overlay — the .scene parent has backdrop-filter:blur
  // which creates a positioning context that traps position:fixed
  // children, plus the visible rounded panel chrome. Bypassing that
  // by appending directly to <body> so the cover goes true full-bleed
  // from corner to corner of the viewport.
  showMenuBtn(false); $('hud').innerHTML=''; $('goal').innerHTML=''; setSub('');
  removeTitleOverlay();
  const canCont = !!save && !loading;
  const sub = loading
    ? 'Checking for a saved season…'
    : save
      ? `Year ${save.S.year||1} · ${save.S.season==='winter'?'Winter planning':(save.S.seasonDay?summerDate(save.S.seasonDay):'Day '+save.S.day)}`
      : 'A fresh start';
  const cover = ASSETS['title-cover']
    ? `<img class="title-full-bg" src="${ASSETS['title-cover']}" alt="The First Booking — a Kalamata kitchen table at dusk">`
    : '';
  const btn = (mark, main, subline, disabled, onclick) =>
    `<button class="title-btn" ${disabled?'disabled':''} onclick="${disabled?'':onclick}">
       <span class="mark">${mark}</span>
       <span class="b-main">${main}<span class="b-sub">${subline}</span></span>
     </button>`;
  const controls = `<div class="title-full-controls">
    ${btn('▸','Continue', sub, !canCont, 'continueGame()')}
    ${btn('✦','New game','Home to Kalamata', false, 'startNewGame()')}
  </div>`;
  const footnote = hasStorage()
    ? ''
    : '<div class="title-footnote">Saving isn’t available in this viewer — but the game plays in full.</div>';
  // Append at body level so the overlay escapes .scene's containment.
  // The test harness uses a fake document without createElement, so
  // fall back to the old setScene path there.
  if(typeof document !== 'undefined' && typeof document.createElement === 'function' && document.body && document.body.appendChild){
    const overlay = document.createElement('div');
    overlay.id = 'titleOverlay';
    overlay.className = 'title-full';
    overlay.innerHTML = `${cover}${controls}${footnote}`;
    document.body.appendChild(overlay);
    setScene(''); // clear the scene so nothing peeks through
  } else {
    setScene(`<div class="title-full">${cover}${controls}${footnote}</div>`);
  }
}
async function doContinue(){
  const save=cachedSave||await loadSave();
  if(!save||!save.S){ renderKitchenIntro(); return; }
  S=save.S; gCounter=save.g||0;
  S.depot=S.depot||{}; S.loadout=S.loadout||[]; S.packSize=S.packSize||4;
  // Migrate old array-form owned (v5 and earlier) to the new tiered object form
  if(Array.isArray(S.owned)){ const m={}; S.owned.forEach(id=>{ if(ITEM_LIFETIME[id]!=null) m[id]=freshOwned(id,'standard'); }); S.owned=m; }
  S.owned=S.owned||{water:freshOwned('water','standard')};
  S.certs=S.certs||[]; S.infra=S.infra||[];
  // Disciplines — pre-M1 saves only ran hiking, so default the offered list to that.
  S.offeredDisciplines=S.offeredDisciplines||['hike']; S.fleet=S.fleet||{};
  if(S.loan===undefined) S.loan=null;
  if(S.turnedAwayThisYear==null) S.turnedAwayThisYear=0;
  if(S.lastHirePromptDay==null) S.lastHirePromptDay=0;
  S.forecast=S.forecast||[]; ensureForecast();
  S.year=S.year||1; S.seasonDay=S.seasonDay||S.day||1; S.season=S.season||'summer';
  S.yearLogs=S.yearLogs||[]; if(S.phase3Ready==null) S.phase3Ready=false;
  if(S.dish===undefined) S.dish=null;
  S.stats=S.stats||{earned:0,fees:0,tips:0,wagesPaid:0,retainersPaid:0,tripsYou:0,tripsGuides:0,hires:0,bestRep:S.rep,yearsCompleted:0};
  ['fees','tips','retainersPaid','yearsCompleted'].forEach(k=>{ if(S.stats[k]==null) S.stats[k]=0; });
  S.yearStats=S.yearStats||freshYearStats();
  setSub('Year '+S.year+' · '+(S.phase===2?'Phase II — you lead a team now.':'Phase I — '+((S.you&&S.you.name)||'your')+'\u2019s season continues.'));
  renderHUD(); renderCurrent();
}

function mkBookings(n){
  // Website infra: one extra booking choice each morning, and a slight
  // bias toward better-paying clients (re-roll the lowest-pm pick once).
  if(hasInfra('website')) n += 1;
  // Only offer routes for disciplines the player actually guides — AND only
  // those they can physically reach today given their transport (Year 1 is
  // constrained to the bus from Kalamata; the moped opens "mid", the Hilux
  // opens "far"). Fleet-kit shortage on regional routes is a separate gate
  // surfaced via bookingLock so the player sees what they're missing.
  const offered = S.offeredDisciplines && S.offeredDisciplines.length ? S.offeredDisciplines : ['hike'];
  const pool = ROUTES.filter(r => offered.includes(r.activity||'hike') && routeReachable(r));
  if(!pool.length) return [];
  const out=[];
  for(let i=0;i<n && pool.length;i++){
    const r=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    let c=rnd(CLIENTS);
    if(hasInfra('website') && c.pm < 1.0 && chance(0.5)) c=rnd(CLIENTS);
    const pay=Math.round(r.base*c.pm*(0.85+Math.random()*0.4));
    // Activity-aware weather cancellation. Hiking: storms cancel hard (diff-3).
    // Sea kayak: storms cancel everything from diff-2 up; the meltemi (wind)
    // shuts down open-water crossings, and exposed seas at diff-3.
    const act = r.activity||'hike';
    let cancelled=false, cancelReason='';
    const tags = r.tags||[];
    if(act==='hike' && S.weather.storm && r.diff===3){ cancelled=true; cancelReason='Cancelled — storm on the high routes'; }
    if(act==='seakayak'){
      if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — storm at sea'; }
      else if(S.weather.wind && tags.includes('open-water')){ cancelled=true; cancelReason='Cancelled — the meltemi is up, no open crossings today'; }
      else if(S.weather.wind && tags.includes('exposed') && r.diff===3){ cancelled=true; cancelReason='Cancelled — too much wind for exposed water at this grade'; }
    }
    // Canyon: any storm risk on committing canyons is a flash-flood danger.
    if(act==='canyon'){
      if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — flash-flood danger; storm anywhere upstream'; }
      else if(S.weather.mist && r.diff===3){ cancelled=true; cancelReason='Cancelled — drizzle is raising the water, technical descents are off'; }
    }
    // Rafting: storm = high water, cancels the hard runs; dam-fed routes shrug off mild weather.
    if(act==='raft'){
      if(S.weather.storm && r.diff>=2 && !tags.includes('dam-fed')){ cancelled=true; cancelReason='Cancelled — the river is up and pushing brown'; }
    }
    // Cycling: heat on the long exposed climbs is dangerous; storm cancels the mountain route.
    if(act==='cycle'){
      if(S.weather.heat && r.diff===3 && tags.includes('long')){ cancelled=true; cancelReason='Cancelled — too hot for a long climb today'; }
      else if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — slick roads and lightning on the open road'; }
    }
    // SUP: any wind is the enemy — the whole product is calm water.
    if(act==='sup'){
      if(S.weather.storm){ cancelled=true; cancelReason='Cancelled — no SUP day in a storm'; }
      else if(S.weather.wind && (tags.includes('exposed')||tags.includes('open'))){ cancelled=true; cancelReason='Cancelled — too much wind for the open crossing'; }
      else if(S.weather.wind && r.diff===1){ cancelled=true; cancelReason='Cancelled — wind blowing the beginners offshore; back tomorrow'; }
    }
    // Climbing: storm/lightning cancels exposed rock; heat saps and greases holds on long days.
    if(act==='climb'){
      if(S.weather.storm){ cancelled=true; cancelReason='Cancelled — thunder on exposed rock is no place to be'; }
      else if(S.weather.heat && tags.includes('multi-pitch')){ cancelled=true; cancelReason='Cancelled — the rock is greasy and the oven is open'; }
    }
    out.push({route:r.name, activity:act, region:r.region||'local', diff:r.diff, client:c.label, ctype:c.type, group:c.g, pay, tags,
              cancelled, cancelReason});
  }
  return out;
}

/* Fullscreen helpers — uses the Fullscreen API where supported; on
   iOS Safari (which restricts requestFullscreen on arbitrary elements)
   the user's recourse is "Add to Home Screen" — the manifest.json +
   apple-mobile-web-app-capable meta make that launch as a full app.
   Auto-triggered from the title screen Continue/New game buttons
   (that's a user gesture, which the spec requires). */
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
}
function enterFullscreen(){
  if(isFullscreen()) return;
  const el = document.documentElement;
  try{
    if(el.requestFullscreen)         return void el.requestFullscreen().catch(()=>{});
    if(el.webkitRequestFullscreen)   return void el.webkitRequestFullscreen();
    if(el.mozRequestFullScreen)      return void el.mozRequestFullScreen();
    if(el.msRequestFullscreen)       return void el.msRequestFullscreen();
  }catch(e){ /* iOS Safari + others may throw — fall through silently */ }
}
function exitFullscreenSafe(){
  try{
    if(document.exitFullscreen)        return void document.exitFullscreen().catch(()=>{});
    if(document.webkitExitFullscreen)  return void document.webkitExitFullscreen();
    if(document.mozCancelFullScreen)   return void document.mozCancelFullScreen();
    if(document.msExitFullscreen)      return void document.msExitFullscreen();
  }catch(e){}
}
function toggleFullscreen(){ isFullscreen() ? exitFullscreenSafe() : enterFullscreen(); }
/* Cold-open dismiss. The tap on the intro overlay is the user
   gesture that lets enterFullscreen() succeed. The overlay fades
   out over .5s, then removes itself; the title screen below is
   already rendered, so this just reveals it. Removed elements
   don't come back — Main menu navigation later doesn't replay
   the intro (only a page reload does). */
function dismissIntro(){
  const el = document.getElementById('intro');
  if(!el) return;
  enterFullscreen();
  el.classList.add('fading');
  setTimeout(() => { el.parentNode && el.parentNode.removeChild(el); }, 520);
}
// Also dismiss on any keypress, for desktop / accessibility.
// Defensive — the headless test harness stubs window without
// addEventListener, so guard the binding.
if(typeof window !== 'undefined' && typeof window.addEventListener === 'function'){
  window.addEventListener('keydown', function introKey(e){
    if(document.getElementById('intro') && (e.key==='Enter' || e.key===' ' || e.key==='Escape')){
      e.preventDefault();
      dismissIntro();
    }
  }, {once:false});
}
/* Wrappers for the title-screen buttons — try fullscreen on the user

// Why can this booking not be taken right now? Returns a reason string or null.
// Activity-aware: hiking diff-3 needs Mountain Leader; sea-kayak diff-3 needs the
// Advanced Sea Kayak Leader Award (lands in the M1.cert chunk; not yet earnable);
// any sea-kayak booking requires a non-empty fleet.
function bookingLock(b){
  if(b.cancelled) return b.cancelReason || 'Cancelled — too dangerous today';
  const act = b.activity||'hike';
  const tags = b.tags||[];
  const region = b.region||'local';
  if(act==='hike' && b.diff===3 && !hasCert('mountain')) return 'Locked — needs the Mountain Leader cert';
  if(act==='seakayak'){
    if(!hasCert('kayakBasic')) return 'Locked — needs the Sea Kayak Award (the gate to guiding kayak)';
    const exposed = tags.includes('exposed') || tags.includes('open-water');
    if(exposed && b.diff>=2 && !hasCert('kayakLeader')) return 'Locked — needs the Sea Kayak Leader Award for exposed water';
    if(b.diff===3 && !hasCert('kayakAdvanced')) return 'Locked — needs the Advanced Sea Kayak Leader Award';
    if(fleetCapacity('seakayak') < 1) return 'Locked — you have no kayaks (or no PFD sets) yet';
    if(region!=='local' && fleetTransportCap('seakayak')<1) return 'Locked — you can drive there but cannot bring the boats. Buy a roof rack (€150) or a trailer (€400).';
  }
  if(act==='canyon'){
    if(!hasCert('canyonBasic')) return 'Locked — needs the Canyon Guide cert';
    if(b.diff===2 && !hasCert('canyonLeader')) return 'Locked — needs the Canyon Leader cert for standard gorges';
    if(b.diff===3 && !hasCert('canyonAdvanced')) return 'Locked — needs the Advanced Canyon Leader cert';
    if(fleetCapacity('canyon') < 1) return 'Locked — you have no client wetsuits / harness sets yet';
  }
  if(act==='raft'){
    if(!hasCert('raftBasic')) return 'Locked — needs the Raft Guide cert';
    if(b.diff===2 && !hasCert('raftLeader')) return 'Locked — needs the Trip Leader cert';
    if(b.diff===3 && !hasCert('raftAdvanced')) return 'Locked — needs the Raft Instructor cert';
    if(fleetCapacity('raft') < 1) return 'Locked — you have no raft (or kit set) yet';
    if(region!=='local' && fleetTransportCap('raft')<1) return 'Locked — a raft cannot ride on a roof. Buy a trailer (€400).';
  }
  if(act==='cycle'){
    if(!hasCert('cycleBasic')) return 'Locked — needs the Trail Cycle Leader cert';
    if(b.diff===2 && !hasCert('cycleLeader')) return 'Locked — needs the Mountain Bike Leader cert';
    if(b.diff===3 && !hasCert('cycleAdvanced')) return 'Locked — needs the Advanced MTB Guide cert';
    if(fleetCapacity('cycle') < 1) return 'Locked — you have no client bikes (or helmets) yet';
    if(region!=='local' && fleetTransportCap('cycle')<1) return 'Locked — you cannot shuttle bikes without a rack or trailer (€150 / €400).';
  }
  if(act==='sup'){
    if(!hasCert('supBasic')) return 'Locked — needs the SUP Award';
    if((tags.includes('open')||tags.includes('exposed')) && b.diff>=2 && !hasCert('supLeader')) return 'Locked — needs the SUP Leader Award for open water';
    if(b.diff===3 && !hasCert('supAdvanced')) return 'Locked — needs the Advanced / Coastal SUP Leader Award';
    if(fleetCapacity('sup') < 1) return 'Locked — you have no boards (or kit sets) yet';
    if(region!=='local' && fleetTransportCap('sup')<1) return 'Locked — you cannot move the boards without a rack or trailer (€150 / €400).';
  }
  if(act==='climb'){
    if(!hasCert('climbBasic')) return 'Locked — needs the Single-Pitch Award';
    if(tags.includes('exposed') && b.diff>=2 && !hasCert('climbLeader')) return 'Locked — needs the Rock Climbing Instructor cert for exposed crags';
    if(b.diff===3 && !hasCert('climbAdvanced')) return 'Locked — needs the Multi-Pitch / Mountaineering Instructor cert';
    if(fleetCapacity('climb') < 1) return 'Locked — you have no client harness/helmets (or shoes) yet';
  }
  return null;
}

/* ---------------- Hub placement editor (dev tool) ----------------

var hubEd = { sel:null, drag:null };
function hubEditOn(){ return typeof document!=='undefined' && document.body && document.body.classList.contains('hub-edit'); }
function hubStageRect(){ const s=document.querySelector('#hubOverlay .hub-stage'); return s?s.getBoundingClientRect():null; }
function hubN(el,p){ return parseFloat(el.style[p])||0; }
function hubEdSelect(el){

  hubEd.sel = el||null; if(el) el.classList.add('sel'); hubEdSync();

function hubEdSync(){

    +'</b> y:<b>'+hubN(el,'top').toFixed(1)+'</b> w:<b>'+hubN(el,'width').toFixed(1)+'</b>'
    +(isR?' h:<b>'+hubN(el,'height').toFixed(1)+'</b>':'');
}
function hubEdLayout(){
  const out={};
  document.querySelectorAll('#hubOverlay .hub-obj, #hubOverlay .hub-region').forEach(el=>{
    const o={x:+hubN(el,'left').toFixed(1), y:+hubN(el,'top').toFixed(1), w:+hubN(el,'width').toFixed(1)};
    if(el.classList.contains('hub-region')) o.h=+hubN(el,'height').toFixed(1);
    out[el.getAttribute('data-label')]=o;
  });

}
function hubEdCopy(){

function toggleHubEdit(){
  const hub=document.getElementById('hubOverlay'); if(!hub) return;
  const on=document.body.classList.toggle('hub-edit');

      panel.innerHTML='<span style="color:#ffd24a;font-weight:700">EDIT</span>'
        +'<span id="hubEdInfo"><i>click an object</i></span>'

        +'<button id="hubEdCopyBtn">Copy layout</button>'

if(typeof document!=='undefined' && document.addEventListener){
  document.addEventListener('pointerdown', e=>{
    if(!hubEditOn()) return;
    if(e.target.closest('#hubEdPanel')) return;
    const el=e.target.closest('#hubOverlay .hub-obj, #hubOverlay .hub-region');
    if(!el) return;
    e.preventDefault(); e.stopPropagation();
    hubEdSelect(el);
    const r=hubStageRect(); if(!r) return;
    hubEd.drag={ el, r, offx:(e.clientX-r.left)/r.width*100 - hubN(el,'left'), offy:(e.clientY-r.top)/r.height*100 - hubN(el,'top') };
  }, true);
  document.addEventListener('pointermove', e=>{
    if(!hubEditOn() || !hubEd.drag) return;
    const d=hubEd.drag;
    let x=(e.clientX-d.r.left)/d.r.width*100 - d.offx;
    let y=(e.clientY-d.r.top)/d.r.height*100 - d.offy;
    x=Math.max(0,Math.min(100,x)); y=Math.max(0,Math.min(100,y));
    d.el.style.left=x.toFixed(1)+'%'; d.el.style.top=y.toFixed(1)+'%'; hubEdSync();
  });
  document.addEventListener('pointerup', ()=>{ hubEd.drag=null; });
  document.addEventListener('click', e=>{
    if(hubEditOn() && e.target.closest('#hubOverlay .hub-obj, #hubOverlay .hub-region')){ e.preventDefault(); e.stopPropagation(); }
  }, true);
  document.addEventListener('wheel', e=>{
    if(!hubEditOn() || !hubEd.sel) return;
    e.preventDefault();
    const el=hubEd.sel, step=(e.deltaY<0?0.5:-0.5);
    if(e.shiftKey && el.classList.contains('hub-region')) el.style.height=Math.max(1,hubN(el,'height')+step).toFixed(1)+'%';
    else el.style.width=Math.max(1,hubN(el,'width')+step).toFixed(1)+'%';
    hubEdSync();
  }, {passive:false});
  document.addEventListener('keydown', e=>{
    const typing=/^(input|textarea)$/i.test((e.target&&e.target.tagName)||'');
    if((e.key==='e'||e.key==='E') && document.getElementById('hubOverlay') && !typing){ e.preventDefault(); toggleHubEdit(); return; }
    if(!hubEditOn() || !hubEd.sel) return;
    const el=hubEd.sel, s=e.shiftKey?0.2:0.6; let used=true;
    if(e.key==='ArrowLeft') el.style.left=(hubN(el,'left')-s).toFixed(1)+'%';
    else if(e.key==='ArrowRight') el.style.left=(hubN(el,'left')+s).toFixed(1)+'%';
    else if(e.key==='ArrowUp') el.style.top=(hubN(el,'top')-s).toFixed(1)+'%';
    else if(e.key==='ArrowDown') el.style.top=(hubN(el,'top')+s).toFixed(1)+'%';
    else used=false;
    if(used){ e.preventDefault(); hubEdSync(); }
  });
}

/* Mid-summer vehicle purchase. Transport infra is the only category buyable
   outside winter — the rest (website, hotelDeal) still go through enrollInfra
   in the winter office. The moped + Hilux purchases also fire a small scene
   (renderVehicleScene) — the moment is too important for a one-line note. */
function buyVehicle(id){
  const it = INFRA.find(x => x.id===id);
  if(!it || it.scope!=='transport') return;
  if(hasInfra(id)) return;
  if(it.prereq && !hasInfra(it.prereq)) return;
  const cost = alaniPrice(it.cost);
  if(S.cash < cost) return;
  S.cash -= cost;
  S.infra.push(id);
  if(S.yearStats) S.yearStats.infra = (S.yearStats.infra||0)+1;
  note(`Bought ${it.name.toLowerCase()} (−€${cost}).`);
  saveGame();
  if(VEHICLE_SCENES[id]){ renderVehicleScene(id); return; }
  openShop();
}

function enrollCertSchool(id){
  const c=CERTS.find(x=>x.id===id); if(!c||hasCert(id)) return;
  if(c.prereq&&!hasCert(c.prereq)) return;
  if(S.bestRepEverThisYear==null) S.bestRepEverThisYear = S.yearStats?.bestRep||S.rep;
  if(S.bestRepEverThisYear<c.repReq) return;
  const weeksLeft=WINTER_WEEKS-(S.winterWeeksUsed||0);
  if(S.cash<c.cost || c.weeks>weeksLeft) return;
  S.cash-=c.cost; S.certs.push(id);
  S.winterWeeksUsed=(S.winterWeeksUsed||0)+c.weeks;
  if(S.yearStats) S.yearStats.certs++;
  note(`Certified — ${c.name} (${c.org}, −€${c.cost}, ${c.weeks} weeks).`);
  // An L1 entry cert for a discipline you do not yet offer unlocks that
  // discipline from next spring (PHASE-1 §7: "literally how 'master multiple
  // activities' happens — take its entry award over winter and offer it next
  // season").
  if(c.rung===1 && c.discipline && c.discipline!=='general'){
    if(!S.offeredDisciplines.includes(c.discipline)){
      S.offeredDisciplines.push(c.discipline);
      const d=DISCIPLINES.find(x=>x.id===c.discipline);
      note(`You can offer ${d?d.name:c.discipline} from next spring — buy the kit at the shop.`);
    }
  }
  renderOffSeason();
}
function enrollInfra(id){
  const it=INFRA.find(x=>x.id===id); if(!it||hasInfra(id)) return;
  const weeksLeft=WINTER_WEEKS-(S.winterWeeksUsed||0);
  // Engineer — off-season projects come cheaper, because half the build is
  // your spreadsheet (HEROES.md → engineer: "compounding systems").
  // Transport (moped/Hilux/rack/trailer) is handled via buyVehicle, not here.
  let cost = it.cost;
  if(S.you && S.you.heroId==='engineer' && it.scope!=='transport') cost = Math.round(cost * 0.75);
  if(S.cash<cost || it.weeks>weeksLeft) return;
  S.cash-=cost; S.infra.push(id);
  S.winterWeeksUsed=(S.winterWeeksUsed||0)+it.weeks;
  if(S.yearStats) S.yearStats.infra++;
  note(`Set up — ${it.name} (−€${cost}, ${it.weeks} weeks).`);
  renderOffSeason();
}
