<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Outdoor Guide Life or no Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c252b; --bg2:#081b20;
    --panel:rgba(23,62,68,0.55); --panel2:rgba(12,40,46,0.6);
    --edge:rgba(220,196,150,0.16);
    --ink:#ecdcc0; --ink-dim:#9fb0ad; --ink-faint:#6f8884;
    --terra:#d2754a; --terra-bright:#e88a5c;
    --olive:#aebd7e; --sage:#9cc07a;
    --gold:#e3b863; --sea:#6fb0ad;
    --danger:#e0664c;
    --r:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Spectral',Georgia,serif; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(210,117,74,0.18), transparent 55%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    background-attachment:fixed; min-height:100vh; line-height:1.55; overflow-x:hidden;
  }
  .topo{position:fixed; inset:0; z-index:0; opacity:0.06; pointer-events:none;}
  .wrap{position:relative; z-index:1; max-width:640px; margin:0 auto; padding:18px 16px 40px; display:flex; flex-direction:column; min-height:100vh;}

  .appbar{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin:2px 0 14px; animation:rise .7s ease both;}
  .brand{text-align:left;}
  .kicker{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--terra); margin-bottom:3px;}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:clamp(26px,7vw,38px); margin:0; line-height:1.05; letter-spacing:-.01em;}
  h1 em{font-style:italic; color:var(--gold);}
  .sub{font-style:italic; color:var(--ink-dim); font-size:12.5px; margin-top:5px;}
  .iconbtn{flex:none; width:44px; height:44px; border-radius:12px; border:1px solid var(--edge); background:var(--panel); color:var(--ink); font-size:22px; line-height:1; cursor:pointer; backdrop-filter:blur(4px); transition:border-color .2s, background .2s;}
  .iconbtn:hover{border-color:var(--terra); background:rgba(210,117,74,.12);}
  .iconbtn:active{transform:scale(.95);}

  /* forecast card — its own square */
  .fcard{background:var(--panel2); border:1px solid var(--edge); border-radius:13px; padding:11px 12px 12px; margin:0 0 14px; cursor:pointer; transition:border-color .2s; animation:rise .5s .08s ease both;}
  .fcard:hover{border-color:var(--terra);}
  .fcard .fh{display:flex; justify-content:space-between; align-items:center; font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px;}
  .fcard .fh b{color:var(--gold); font-weight:600;}
  .fcard .fh span{color:var(--terra);}
  .fcard .frow{display:flex; gap:6px;}

  /* separated action bar */
  .actionbar{margin-top:16px; padding-top:14px; border-top:1px solid var(--edge);}
  .actionbar .lab{font-family:'Spline Sans Mono',monospace; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px;}
  button.go{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:#1a2b22; width:100%; border:none; border-radius:13px; padding:16px; cursor:pointer;
    background:linear-gradient(180deg,var(--terra-bright),var(--terra)); box-shadow:0 10px 26px -12px var(--terra); transition:transform .12s ease, filter .2s; display:flex; align-items:center; justify-content:center; gap:10px;}
  button.go:hover{filter:brightness(1.06); transform:translateY(-1px);}
  button.go:active{transform:translateY(0) scale(.99);}
  button.go .gs{font-family:'Spline Sans Mono',monospace; font-size:11px; font-weight:500; color:rgba(26,43,34,.7);}

  /* menu drawer */
  .drawer{position:fixed; inset:0; z-index:50; background:rgba(6,16,18,.62); backdrop-filter:blur(3px); display:none; align-items:flex-end; justify-content:center; opacity:0; transition:opacity .22s;}
  .drawer.open{display:flex; opacity:1;}
  .sheet{width:100%; max-width:640px; background:linear-gradient(180deg,#123238,#0c272c); border:1px solid var(--edge); border-bottom:none; border-radius:20px 20px 0 0; padding:10px 16px 26px; transform:translateY(16px); transition:transform .24s; box-shadow:0 -20px 50px -20px rgba(0,0,0,.8);}
  .drawer.open .sheet{transform:none;}
  .sheet .grip{width:38px; height:4px; border-radius:3px; background:var(--edge); margin:4px auto 14px;}
  .sheet .sh{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:12px; text-align:center;}

  .hud{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:6px; animation:rise .7s .05s ease both;}
  .stat{background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:9px 8px 8px; text-align:center; backdrop-filter:blur(4px);}
  .stat .lab{font-family:'Spline Sans Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); display:block;}
  .stat .val{font-family:'Spline Sans Mono',monospace; font-size:17px; font-weight:600; margin-top:3px; display:block;}
  .bar{height:4px; border-radius:3px; background:rgba(255,255,255,.08); margin-top:6px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:3px; transition:width .5s ease;}

  .goal{font-family:'Spline Sans Mono',monospace; font-size:10.5px; letter-spacing:.03em; color:var(--ink-faint); text-align:center; margin:8px 0 14px; line-height:1.5;}
  .goal b{color:var(--gold); font-weight:600;}

  .scene{background:var(--panel); border:1px solid var(--edge); border-radius:var(--r); padding:18px 16px; backdrop-filter:blur(6px); box-shadow:0 18px 40px -28px rgba(0,0,0,.9); flex:1; animation:rise .45s ease both;}
  .day-tag{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--terra); margin-bottom:2px;}
  .weather{font-family:'Fraunces',serif; font-size:20px; font-weight:500; margin:0 0 4px; color:var(--gold);}
  .weather small{display:block; font-family:'Spectral',serif; font-size:13.5px; font-style:italic; color:var(--ink-dim); font-weight:400; letter-spacing:0;}
  .scene h2{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:2px 0 8px; line-height:1.12;}
  .scene p{margin:0 0 14px; font-size:16px;}

  .choices{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
  button.opt{
    font-family:'Spectral',serif; font-size:15.5px; text-align:left; color:var(--ink);
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.06));
    border:1px solid var(--edge); border-radius:12px; padding:14px 15px; cursor:pointer;
    transition:transform .12s ease, border-color .2s, background .2s; width:100%; display:flex; align-items:center; gap:12px;
  }
  button.opt:hover{border-color:var(--terra); background:linear-gradient(180deg, rgba(210,117,74,.12), rgba(0,0,0,.06)); transform:translateY(-1px);}
  button.opt:active{transform:translateY(0) scale(.995);}
  button.opt .mark{font-family:'Spline Sans Mono',monospace; font-size:12px; color:var(--terra); border:1px solid var(--terra); border-radius:6px; padding:2px 7px; flex:none;}
  button.opt .b-main{flex:1;}
  button.opt .b-sub{display:block; font-size:12.5px; color:var(--ink-faint); font-style:italic; margin-top:2px;}
  button.opt.disabled{opacity:.4; pointer-events:none; filter:grayscale(.5);}
  button.opt.primary{border-color:rgba(210,117,74,.55); background:linear-gradient(180deg, rgba(210,117,74,.16), rgba(0,0,0,.05));}

  .booking{display:flex; flex-direction:column; align-items:flex-start; gap:2px;}
  .booking .route{font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
  .booking .meta{font-size:13px; color:var(--ink-dim); font-style:italic;}
  .booking .tags{font-family:'Spline Sans Mono',monospace; font-size:11px; margin-top:5px; display:flex; gap:10px; flex-wrap:wrap;}
  .booking .tags span{color:var(--ink-faint);}
  .booking .pay{color:var(--gold);}
  .d1{color:var(--sage);} .d2{color:var(--gold);} .d3{color:var(--terra-bright);}

  .team{display:flex; flex-direction:column; gap:9px; margin:4px 0 16px;}
  .mate{background:var(--panel2); border:1px solid var(--edge); border-radius:12px; padding:11px 13px; display:flex; align-items:center; gap:12px;}
  .mate .who{flex:1; min-width:0;}
  .mate .nm{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
  .mate .spec{font-size:12px; font-style:italic; color:var(--ink-faint);}
  .mate .task{font-family:'Spline Sans Mono',monospace; font-size:11px; margin-top:4px; color:var(--sea);}
  .mate .task.idle{color:var(--ink-faint);}
  .gauges{display:flex; gap:9px; margin-top:7px;}
  .g{flex:1;}
  .g .gl{font-family:'Spline Sans Mono',monospace; font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint);}
  .g .bar{margin-top:3px;}
  .mate button.assign{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.08em; color:var(--terra); background:none; border:1px solid var(--terra); border-radius:9px; padding:8px 11px; cursor:pointer; flex:none; align-self:center;}
  .mate button.assign:active{transform:scale(.96);}

  .res{border-left:2px solid var(--edge); padding-left:13px; margin:0 0 14px; animation:slidein .4s ease both;}
  .res .line{font-size:15px; margin:0 0 7px;}
  .delta{font-family:'Spline Sans Mono',monospace; font-size:13px; font-weight:600; margin-right:8px;}
  .up{color:var(--sage);} .down{color:var(--danger);} .neu{color:var(--ink-dim);} .gold{color:var(--gold);}

  .ledger{margin:2px 0 14px;}
  .ledger .row{display:flex; justify-content:space-between; font-family:'Spline Sans Mono',monospace; font-size:13px; padding:6px 0; border-bottom:1px dashed rgba(255,255,255,.07);}
  .ledger .row .l{color:var(--ink-dim);}
  .ledger .row .v.pos{color:var(--sage);} .ledger .row .v.neg{color:var(--danger);}

  .end{text-align:center; padding:8px 4px;}
  .end h2{font-size:30px;}
  .end .verdict{font-style:italic; color:var(--ink-dim); margin-bottom:16px;}

  footer{text-align:center; margin-top:18px; font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--ink-faint);}
  footer button{background:none; border:none; color:var(--terra); font-family:inherit; font-size:10px; letter-spacing:.1em; cursor:pointer; text-decoration:underline; text-underline-offset:3px;}

  @keyframes rise{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
  @keyframes slidein{from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:none;}}
</style>
</head>
<body>
<svg class="topo" preserveAspectRatio="none" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#e3b863" stroke-width="1.2">
    <path d="M-20,120 C80,80 140,170 220,120 320,70 380,150 440,110"/>
    <path d="M-20,170 C80,130 140,220 220,170 320,120 380,200 440,160"/>
    <path d="M-20,220 C80,180 140,270 220,220 320,170 380,250 440,210"/>
    <path d="M-20,330 C90,300 150,380 230,340 330,300 380,360 440,330"/>
    <path d="M-20,380 C90,350 150,430 230,390 330,350 380,410 440,380"/>
    <path d="M-20,520 C70,560 160,470 240,520 330,560 390,490 440,520"/>
    <path d="M-20,570 C70,610 160,520 240,570 330,610 390,540 440,570"/>
    <path d="M-20,680 C80,640 150,720 240,680 330,640 380,700 440,670"/>
  </g>
</svg>

<div class="wrap">
  <header class="appbar">
    <div class="brand">
      <div class="kicker">A career in the outdoors, money, and minor catastrophes</div>
      <h1>Outdoor Guide Life<br><em>or no Life</em></h1>
      <div class="sub" id="sub"></div>
    </div>
    <button class="iconbtn" id="menuBtn" onclick="toggleMenu()" aria-label="Menu" style="display:none">≡</button>
  </header>
  <div class="hud" id="hud"></div>
  <div class="goal" id="goal"></div>
  <div id="fcast"></div>
  <div class="scene" id="scene"></div>
</div>
<div class="drawer" id="drawer" onclick="if(event.target===this)closeMenu()">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const rnd = a => a[Math.floor(Math.random()*a.length)];
const chance = p => Math.random()<p;
const ri = (a,b)=>a+Math.floor(Math.random()*(b-a+1));

let S, gCounter=0;

const WEATHER=[
  {name:'Clear skies', short:'Clear', col:'var(--gold)', note:'The light is perfect and the air is still. A guide could not ask for more.', risk:0, drain:0},
  {name:'Hot and dry', short:'Hot', col:'var(--terra)', note:'The cicadas are screaming. The Messinian sun will test everyone today.', risk:0.05, drain:10, heat:true},
  {name:'Gusty winds', short:'Windy', col:'var(--sea)', note:'The wind is up off the gulf, snapping at the ridgelines.', risk:0.10, wind:true},
  {name:'Low cloud and drizzle', short:'Drizzle', col:'#7fb6c8', note:'A soft grey ceiling sits over Taygetos. Footing will be slick.', risk:0.08, mist:true},
  {name:'A storm is gathering', short:'Storm', col:'var(--danger)', note:'The horizon has gone the colour of a bruise. The high routes are no place to be.', risk:0.24, storm:true},
];
const FORECAST_DAYS=5;
function rollWeather(){ return rnd(WEATHER); }
function ensureForecast(){ S.forecast=S.forecast||[]; while(S.forecast.length<FORECAST_DAYS) S.forecast.push(rollWeather()); }
function weatherAdvice(w){
  if(w.storm) return 'High and exposed routes are off. Anyone out wants a map and rain shells.';
  if(w.mist) return 'A map &amp; compass is worth its weight; expect slick ground.';
  if(w.wind) return 'Keep off knife-edge ridges; pack rain shells in case it turns.';
  if(w.heat) return 'Sun protection and plenty of water — start early, rest in the shade.';
  return 'A fine day for almost anything. Make the most of it.';
}
function weatherChip(w, label, big){
  return `<div style="flex:1;min-width:0;text-align:center;background:var(--panel2);border:1px solid var(--edge);border-radius:10px;padding:${big?'10px 6px':'8px 4px'}">
    <div style="font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)">${label}</div>
    <div style="width:${big?'14px':'10px'};height:${big?'14px':'10px'};border-radius:50%;background:${w.col};margin:5px auto 4px;box-shadow:0 0 8px ${w.col}"></div>
    <div style="font-family:'Spline Sans Mono',monospace;font-size:${big?'12px':'10px'};color:${w.col}">${w.short}</div>
  </div>`;
}
function paintForecast(){
  if(!S || !$('fcast')) return;
  ensureForecast();
  const chips=S.forecast.slice(0,FORECAST_DAYS).map((w,i)=>{
    const sd=S.seasonDay+i;
    const label = i===0 ? 'Today' : (sd<=SUMMER_DAYS ? 'D'+sd : 'Off');
    return weatherChip(w, label);
  }).join('');
  $('fcast').innerHTML=`<div class="fcard" onclick="renderForecast()">
    <div class="fh"><span>Forecast · <b>${S.weather.short}</b> today</span><span>5-day ▸</span></div>
    <div class="frow">${chips}</div></div>`;
}
function renderForecast(){
  ensureForecast();
  const back = S.phase===1?'renderMorning()':'renderAssign()';
  const cards=S.forecast.slice(0,FORECAST_DAYS).map((w,i)=>`
    <div class="mate" style="align-items:flex-start">
      <div style="width:34px;height:34px;border-radius:50%;background:${w.col};box-shadow:0 0 12px ${w.col};flex:none;margin-top:2px"></div>
      <div class="who" style="margin-left:12px">
        <div class="nm">${i===0?'Today':(S.seasonDay+i<=SUMMER_DAYS?summerDate(S.seasonDay+i):'After the season closes')} — <span style="color:${w.col}">${w.name}</span></div>
        <div class="spec" style="margin:2px 0 4px">${w.note}</div>
        <div class="task">${weatherAdvice(w)}</div>
      </div>
    </div>`).join('');
  setScene(`<div class="day-tag">${dayTag()} · Forecast</div>
    <h2>The week ahead</h2>
    <p>This is how your guides read the days and plan their routes. Save the high, exposed lines for clear weather.</p>
    <div class="team">${cards}</div>
    <div class="actionbar"><button class="go" onclick="${back}">Back to the day</button></div>`);
}

const ROUTES=[
  // HIKING — Messinia, Mani, Taygetos, Arcadia, Parnon, Achaia (17 routes)
  {name:'Polylimnio waterfalls',                    activity:'hike',     diff:1, base:60,  tags:['river','forest']},
  {name:'Voidokilia & Navarino dunes',              activity:'hike',     diff:1, base:58,  tags:['coast','exposed']},
  {name:'Ancient Messene & Mavromati',              activity:'hike',     diff:2, base:95,  tags:['exposed','long','historical']},
  {name:'Neda Gorge & waterfalls',                  activity:'hike',     diff:2, base:110, tags:['river','gorge','remote']},
  {name:'Kardamyli & the old mule paths',           activity:'hike',     diff:1, base:70,  tags:['coast','forest']},
  {name:'Vyros Gorge & stone bridges',              activity:'hike',     diff:2, base:115, tags:['river','gorge','remote']},
  {name:'Cape Tenaro lighthouse',                   activity:'hike',     diff:2, base:135, tags:['coast','exposed','long','remote']},
  {name:'Mystras Byzantine path',                   activity:'hike',     diff:1, base:80,  tags:['historical','forest']},
  {name:'Saidona to the Taygetos refuge',           activity:'hike',     diff:2, base:140, tags:['alpine','long']},
  {name:'Taygetos summit (Profitis Ilias)',         activity:'hike',     diff:3, base:205, tags:['alpine','exposed','hard']},
  {name:'Lousios monasteries loop',                 activity:'hike',     diff:2, base:125, tags:['historical','river','forest']},
  {name:'Menalon Trail — Lousios Gorge',            activity:'hike',     diff:3, base:170, tags:['forest','remote','long','gorge']},
  {name:'Mount Lykaion (Zeus altar)',               activity:'hike',     diff:3, base:175, tags:['alpine','exposed','historical']},
  {name:'Parnon black-fir forest',                  activity:'hike',     diff:2, base:120, tags:['forest','remote']},
  {name:'Mount Parnon summit (Megali Tourla)',      activity:'hike',     diff:3, base:195, tags:['alpine','exposed','hard','remote']},
  {name:'Vouraikos Gorge from Kalavrita',           activity:'hike',     diff:2, base:130, tags:['river','gorge','long']},
  {name:'Mount Chelmos & the Styx waterfall',       activity:'hike',     diff:3, base:220, tags:['alpine','remote','hard','river']},
  // SEA KAYAKING — the M1 vertical slice (DISCIPLINES.md → SEA KAYAKING)
  // diff-3 open-water routes are gated on the Advanced Sea Kayak Leader Award.
  {name:'Voidokilia Bay & the lagoon',              activity:'seakayak', diff:1, base:60,  tags:['coast','calm','scenic']},
  {name:'Gialova lagoon & the Divari',              activity:'seakayak', diff:1, base:65,  tags:['calm','eco','family']},
  {name:'Navarino Bay & the wreck',                 activity:'seakayak', diff:2, base:120, tags:['coast','exposed','historical']},
  {name:'Pylos to the Methoni sea caves',           activity:'seakayak', diff:2, base:125, tags:['coast','caves','long']},
  {name:'Kardamyli coast & sea caves',              activity:'seakayak', diff:2, base:130, tags:['coast','caves','remote']},
  {name:'Finikounda bays & islets',                 activity:'seakayak', diff:2, base:115, tags:['coast','islets','scenic']},
  {name:'Koroni castle from the sea',               activity:'seakayak', diff:2, base:130, tags:['coast','historical']},
  {name:'Epidavros sunken city',                    activity:'seakayak', diff:2, base:140, tags:['coast','historical','snorkel']},
  {name:'The Proti island crossing',                activity:'seakayak', diff:3, base:190, tags:['open-water','exposed','remote']},
  {name:'Cape Tainaron lighthouse (kayak)',         activity:'seakayak', diff:3, base:205, tags:['open-water','exposed','remote','historical']},
  {name:'Sapientza & Schiza crossing',              activity:'seakayak', diff:3, base:200, tags:['open-water','remote','exposed']},
  // CANYONING — DISCIPLINES.md § CANYONING (5 routes; Polylimnio & Neda & Vyros & Lousios share
  // names with hike routes but are separate activity trips with different kit and risk profile)
  {name:'Polylimnio canyon (pools & jumps)',        activity:'canyon',   diff:1, base:70,  tags:['river','waterfalls','forest']},
  {name:'Neda Gorge canyon',                        activity:'canyon',   diff:2, base:120, tags:['river','gorge','remote']},
  {name:'Vyros Gorge canyon',                       activity:'canyon',   diff:2, base:115, tags:['gorge','remote','forest']},
  {name:'Lousios Gorge canyon',                     activity:'canyon',   diff:2, base:130, tags:['river','gorge','historical']},
  {name:'Ridomo Gorge (technical)',                 activity:'canyon',   diff:3, base:180, tags:['technical','remote','abseil']},
  // RAFTING — DISCIPLINES.md § RAFTING (4 routes; Arcadia + north-Peloponnese rivers)
  {name:'Alfeios River (Olympia)',                  activity:'raft',     diff:1, base:100, tags:['river','scenic','family']},
  {name:'Lousios River',                            activity:'raft',     diff:2, base:130, tags:['river','gorge','historical']},
  {name:'Ladonas River (dam-fed)',                  activity:'raft',     diff:2, base:125, tags:['river','dam-fed','reliable']},

  // CYCLING — DISCIPLINES.md § CYCLING / E-BIKE (5 routes)

/* ---------------- calendar ----------------
   A season is the Greek outdoor-tourism summer: April 1 → October 31, 214
   days played day-by-day. Winter (Nov–March, 22 weeks) is one planning
   screen — trainings and infra projects burn weeks; spring arrives when
   the player commits. */
const SUMMER_DAYS=214;
const WINTER_WEEKS=22;
const MONTHS=[['April',30],['May',31],['June',30],['July',31],['August',31],['September',30],['October',31]];
function summerDate(d){ let r=d; for(const [n,k] of MONTHS){ if(r<=k) return `${n} ${r}`; r-=k; } return `October ${r}`; }
function summerWeek(d){ return Math.floor((d-1)/7)+1; }
function dayTag(){ return S.season==='winter' ? `Year ${S.year} · Winter` : `Year ${S.year} · ${summerDate(S.seasonDay)}`; }
function seasonPhase(d){ if(d<=30) return 'early';        // April: shoulder, locals
                          if(d<=92) return 'building';     // May-June: warming up
                          if(d<=153) return 'peak';        // July-August: tourists everywhere
                          if(d<=183) return 'late';        // September: still busy, shoulder begins
                          return 'closing'; }              // October: tail of the season

/* Storage with two backends: window.storage when running as a Claude.ai
   artifact, otherwise plain localStorage so the game saves when you open
   the HTML on your phone or download it to a desktop browser. */
function hasArtifactStorage(){ return typeof window!=='undefined' && !!window.storage; }
function hasLocalStorage(){ try{ return typeof window!=='undefined' && !!window.localStorage; }catch(e){ return false; } }
function hasStorage(){ return hasArtifactStorage() || hasLocalStorage(); }
async function saveGame(){
  const data = JSON.stringify({S, g:gCounter});
  try{
    if(hasArtifactStorage()) await window.storage.set(SAVE_KEY, data, false);
    else if(hasLocalStorage()) window.localStorage.setItem(SAVE_KEY, data);
  }catch(e){}
}
async function loadSave(){
  try{
    if(hasArtifactStorage()){
      const r=await window.storage.get(SAVE_KEY);
      if(r&&r.value) return JSON.parse(r.value);
    } else if(hasLocalStorage()){
      const v=window.localStorage.getItem(SAVE_KEY);
      if(v) return JSON.parse(v);
    }
  }catch(e){}
  return null;
}
async function clearSave(){
  try{
    if(hasArtifactStorage()) await window.storage.delete(SAVE_KEY,false);
    else if(hasLocalStorage()) window.localStorage.removeItem(SAVE_KEY);
  }catch(e){}
}

function freshYearStats(){ return {fees:0, tips:0, wages:0, retainers:0, loan:0, certs:0, infra:0, tripsYou:0, tripsGuides:0, bestRep:0, worstRep:100, startCash:0, openingRep:0}; }
async function goMenu(){ const save=await loadSave(); cachedSave=save; renderTitle(save,false); }
function people(){ return [S.you, ...S.guides]; }
function personById(id){ return id==='you'?S.you:S.guides.find(g=>g.id===id); }
function mkBookings(n){
  // Website infra: one extra booking choice each morning, and a slight
  // bias toward better-paying clients (re-roll the lowest-pm pick once).
  if(hasInfra('website')) n += 1;
  // Only offer routes for disciplines the player actually guides.
  const offered = S.offeredDisciplines && S.offeredDisciplines.length ? S.offeredDisciplines : ['hike'];
  const pool = ROUTES.filter(r => offered.includes(r.activity||'hike'));
  if(!pool.length) return [];
  const out=[];
  for(let i=0;i<n && pool.length;i++){
    const r=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    let c=rnd(CLIENTS);
    if(hasInfra('website') && c.pm < 1.0 && chance(0.5)) c=rnd(CLIENTS);
    const pay=Math.round(r.base*c.pm*(0.85+Math.random()*0.4));
    // Activity-aware weather cancellation. Hiking: storms cancel hard (diff-3).
    // Sea kayak: storms cancel everything from diff-2 up; the meltemi (wind)
    // shuts down open-water crossings, and exposed seas at diff-3.
    const act = r.activity||'hike';
    let cancelled=false, cancelReason='';
    const tags = r.tags||[];
    if(act==='hike' && S.weather.storm && r.diff===3){ cancelled=true; cancelReason='Cancelled — storm on the high routes'; }
    if(act==='seakayak'){
      if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — storm at sea'; }
      else if(S.weather.wind && tags.includes('open-water')){ cancelled=true; cancelReason='Cancelled — the meltemi is up, no open crossings today'; }
      else if(S.weather.wind && tags.includes('exposed') && r.diff===3){ cancelled=true; cancelReason='Cancelled — too much wind for exposed water at this grade'; }
    }
    // Canyon: any storm risk on committing canyons is a flash-flood danger.
    if(act==='canyon'){
      if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — flash-flood danger; storm anywhere upstream'; }
      else if(S.weather.mist && r.diff===3){ cancelled=true; cancelReason='Cancelled — drizzle is raising the water, technical descents are off'; }
    }
    // Rafting: storm = high water, cancels the hard runs; dam-fed routes shrug off mild weather.
    if(act==='raft'){
      if(S.weather.storm && r.diff>=2 && !tags.includes('dam-fed')){ cancelled=true; cancelReason='Cancelled — the river is up and pushing brown'; }
    }
    // Cycling: heat on the long exposed climbs is dangerous; storm cancels the mountain route.
    if(act==='cycle'){
      if(S.weather.heat && r.diff===3 && tags.includes('long')){ cancelled=true; cancelReason='Cancelled — too hot for a long climb today'; }
      else if(S.weather.storm && r.diff>=2){ cancelled=true; cancelReason='Cancelled — slick roads and lightning on the open road'; }
    }
    out.push({route:r.name, activity:act, diff:r.diff, client:c.label, ctype:c.type, group:c.g, pay, tags,
              cancelled, cancelReason});
  }
  return out;
}
function startDay(){
  ensureForecast();
  S.weather = S.forecast[0];
  S.trip=null; S.queue=null; S.dayReports=[];
  S.you.task=null; S.guides.forEach(g=>g.task=null);
  S.bookings = mkBookings(S.phase===1?3:4);
  renderHUD(); renderCurrent(); saveGame();
}
function advanceDay(){
  S.day++; S.seasonDay++;
  if(S.forecast&&S.forecast.length) S.forecast.shift(); ensureForecast();
  if(S.season==='summer' && S.seasonDay>SUMMER_DAYS){ enterOffSeason(); return; }
  startDay();
}
function renderCurrent(){
  if(S.season==='winter'){ renderOffSeason(); return; }
  if(S.phase===1) renderMorning(); else renderAssign();
}

function repTier(rep){
  if(rep>=85) return {name:'an institution',          col:'var(--gold)'};
  if(rep>=70) return {name:'a region-wide name',      col:'var(--sage)'};
  if(rep>=55) return {name:'locally known',           col:'var(--sage)'};
  if(rep>=40) return {name:'word is getting around',  col:'var(--olive)'};
  if(rep>=20) return {name:'a few good reviews',      col:'var(--ink-dim)'};
  if(rep>=10) return {name:'a nobody, mostly',        col:'var(--ink-faint)'};
  return       {name:'a name to avoid',                col:'var(--danger)'};
}
function renderHUD(){
  showMenuBtn(true);
  if(S.stats) S.stats.bestRep=Math.max(S.stats.bestRep||0,S.rep);
  if(S.yearStats){ S.yearStats.bestRep=Math.max(S.yearStats.bestRep||0,S.rep); S.yearStats.worstRep=Math.min(S.yearStats.worstRep||100,S.rep); }
  const repC = S.rep>=70?'var(--sage)':S.rep>=35?'var(--gold)':'var(--danger)';
  const dayLabel = S.season==='winter' ? 'Winter' : ('Y'+S.year);
  const dayValue = S.season==='winter' ? 'plan' : summerDate(S.seasonDay);
  const tier = repTier(S.rep);
  const tierLine = `<div style="font-style:italic;color:var(--ink-faint);font-size:11.5px;margin:-4px 0 8px;text-align:center">You are <span style="color:${tier.col};font-style:normal">${tier.name}</span>.</div>`;
  if(S.phase===1){
    const enC=S.energy>=45?'var(--sea)':S.energy>=20?'var(--gold)':'var(--danger)';
    $('hud').innerHTML =
      stat(dayLabel,dayValue)+stat('Cash','€'+S.cash, S.cash>=0?'var(--gold)':'var(--danger)')+
      stat('Repute',S.rep,repC,[S.rep,repC])+stat('Energy',S.energy,enC,[S.energy,enC]);
    $('goal').innerHTML = tierLine + 'Year '+S.year+' · Milestone — <b>€1500</b> &amp; <b>70 reputation</b> to take on guides · gear '+gearGlyph()+' · pack <b>'+S.packSize+'</b> slots';
  } else {
    $('hud').innerHTML =
      stat(dayLabel,dayValue)+stat('Cash','€'+S.cash, S.cash>=0?'var(--gold)':'var(--danger)')+
      stat('Repute',S.rep,repC,[S.rep,repC])+stat('Team',1+S.guides.length);
    $('goal').innerHTML = tierLine + (S.phase3Ready
      ? 'Year '+S.year+' · <b style="color:var(--sage)">Phase III ready</b> — water &amp; air will open in a future season. Build the legacy · gear '+gearGlyph()
      : 'Year '+S.year+' · Milestone — <b>€5000</b>, hold <b>70 reputation</b> &amp; a <b>team of 3</b> to be ready for Phase III · gear '+gearGlyph());
  }

// Why can this booking not be taken right now? Returns a reason string or null.
// Activity-aware: hiking diff-3 needs Mountain Leader; sea-kayak diff-3 needs the
// Advanced Sea Kayak Leader Award (lands in the M1.cert chunk; not yet earnable);
// any sea-kayak booking requires a non-empty fleet.
function bookingLock(b){
  if(b.cancelled) return b.cancelReason || 'Cancelled — too dangerous today';
  const act = b.activity||'hike';
  const tags = b.tags||[];
  if(act==='hike' && b.diff===3 && !hasCert('mountain')) return 'Locked — needs the Mountain Leader cert';
  if(act==='seakayak'){
    if(!hasCert('kayakBasic')) return 'Locked — needs the Sea Kayak Award (the gate to guiding kayak)';
    const exposed = tags.includes('exposed') || tags.includes('open-water');
    if(exposed && b.diff>=2 && !hasCert('kayakLeader')) return 'Locked — needs the Sea Kayak Leader Award for exposed water';
    if(b.diff===3 && !hasCert('kayakAdvanced')) return 'Locked — needs the Advanced Sea Kayak Leader Award';
    if(fleetCapacity('seakayak') < 1) return 'Locked — you have no kayaks (or no PFD sets) yet';
  }
  if(act==='canyon'){
    if(!hasCert('canyonBasic')) return 'Locked — needs the Canyon Guide cert';
    if(b.diff===2 && !hasCert('canyonLeader')) return 'Locked — needs the Canyon Leader cert for standard gorges';
    if(b.diff===3 && !hasCert('canyonAdvanced')) return 'Locked — needs the Advanced Canyon Leader cert';
    if(fleetCapacity('canyon') < 1) return 'Locked — you have no client wetsuits / harness sets yet';
  }
  if(act==='raft'){
    if(!hasCert('raftBasic')) return 'Locked — needs the Raft Guide cert';
    if(b.diff===2 && !hasCert('raftLeader')) return 'Locked — needs the Trip Leader cert';
    if(b.diff===3 && !hasCert('raftAdvanced')) return 'Locked — needs the Raft Instructor cert';
    if(fleetCapacity('raft') < 1) return 'Locked — you have no raft (or kit set) yet';
  }
  if(act==='cycle'){
    if(!hasCert('cycleBasic')) return 'Locked — needs the Trail Cycle Leader cert';
    if(b.diff===2 && !hasCert('cycleLeader')) return 'Locked — needs the Mountain Bike Leader cert';
    if(b.diff===3 && !hasCert('cycleAdvanced')) return 'Locked — needs the Advanced MTB Guide cert';
    if(fleetCapacity('cycle') < 1) return 'Locked — you have no client bikes (or helmets) yet';
  }
  return null;
}

/* ---------------- personal interactive trip ---------------- */
function hasItem(id){ return S.loadout.includes(id); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function recommended(b,w){
  const act=b.activity||'hike';
  const t=b.tags||[];
  if(act==='seakayak'){
    const r=new Set(['water','pfd','paddle','drybag']);
    if(w.heat||t.includes('exposed')||t.includes('open-water')) r.add('sunscreen');
    if(t.includes('exposed')||t.includes('open-water')) { r.add('sprayskirt'); r.add('bilgepump'); }
    if(t.includes('open-water')||t.includes('remote')) { r.add('towline'); r.add('vhf'); r.add('sparepaddle'); }
    if(w.mist||t.includes('open-water')) r.add('compass');
    if(w.mist||w.storm||w.wind&&t.includes('open-water')) r.add('cag');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')) r.add('snacks');
    return r;
  }
  if(act==='canyon'){
    // Always: rope + harness + helmet + wetsuit. Throw-line and shoes as grade rises.
    const r=new Set(['water','wetsuit','canyonHarness','canyonHelmet','rope','canyonBag']);
    if(b.diff>=2||t.includes('river')) r.add('throwline');
    if(b.diff>=2||t.includes('technical')) r.add('descender');
    if(t.includes('technical')||t.includes('abseil')) r.add('cowstails');
    if(t.includes('technical')||t.includes('abseil')||t.includes('remote')) r.add('canyonShoes');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')||b.diff>=3) r.add('snacks');
    return r;
  }
  if(act==='raft'){
    // Throw-bag, pump+repair, spare paddle, flip line — the river guide's basics.
    const r=new Set(['water','raftThrow','raftPump','raftSparePaddle','raftFlip']);
    if(w.heat) r.add('sunscreen');
    if(b.diff>=2) r.add('raftBail');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')) r.add('snacks');
    return r;
  }
  if(act==='cycle'){
    // Repair kit + tubes + pump always. GPS on long backcountry. Sun matters.
    const r=new Set(['water','bikeRepair','bikeTubes','bikePump']);
    if(w.heat||t.includes('exposed')) r.add('sunscreen');
    if(t.includes('backcountry')||t.includes('long')||t.includes('mountain')) r.add('bikeGPS');
    if(b.diff>=2||t.includes('long')) r.add('snacks');
    if(b.diff>=2||t.includes('mountain')) r.add('firstaid');
    return r;
  }
  // hiking
  const r=new Set(['water']);
  if(w.heat||t.includes('exposed')) r.add('sunscreen');
  if(t.includes('river')||t.includes('forest')||t.includes('gorge')) r.add('repellent');
  if(b.diff>=2||t.includes('rock')||t.includes('alpine')||t.includes('gorge')) r.add('poles');
  if(w.mist||w.storm||t.includes('remote')) r.add('map');
  if(w.mist||w.storm||w.wind||t.includes('alpine')) r.add('shell');
  if(b.diff>=2||t.includes('long')) r.add('snacks');
  if(b.diff>=3||t.includes('remote')) r.add('firstaid');
  if(t.includes('long')&&t.includes('alpine')) r.add('lamp');
  return r;
}
function conditionsLine(b,w){
  const act=b.activity||'hike';
  const t=b.tags||[], bits=[];
  if(act==='seakayak'){
    if(t.includes('open-water')) bits.push('an open crossing where the wind is everything');
    else if(t.includes('caves')) bits.push('sea caves and clear deep water');
    else if(t.includes('calm')) bits.push('glassy sheltered water');
    else if(t.includes('coast')) bits.push('coastal paddling under cliffs');
    if(t.includes('historical')) bits.push('old stone watching from above');
    if(t.includes('snorkel')) bits.push('a swim stop on the way');
    if(w.wind) bits.push('a wind that the meltemi may yet decide is its own');
    if(w.storm) bits.push('a storm coming in — open water is no place to be');
    if(w.mist) bits.push('sea fog flattening the horizon');
    if(w.heat) bits.push('a flat-calm hammer of a sun');
    if(t.includes('long')||b.diff>=3) bits.push('a long day on the water');
    if(t.includes('remote')) bits.push('miles from any harbour');
    return bits.length ? cap(bits.join(', '))+'.' : 'A gentle paddle in fair weather.';
  }
  if(act==='canyon'){
    if(t.includes('technical')) bits.push('big committing rappels and serious cold water');
    else if(t.includes('gorge')) bits.push('a deep, cold gorge under high walls');
    else if(t.includes('waterfalls')) bits.push('emerald pools and small jumps');
    if(t.includes('historical')) bits.push('monasteries glued to the cliffs far overhead');
    if(t.includes('remote')) bits.push('a long approach from the road');
    if(w.storm) bits.push('a storm anywhere upstream is a flash-flood risk');
    if(w.mist) bits.push('the water is rising, the rock will be slick');
    if(w.heat) bits.push('ideal — the cold water is the reward');
    if(t.includes('abseil')||b.diff===3) bits.push('rope work, properly committing');
    return bits.length ? cap(bits.join(', '))+'.' : 'A gentle gorge in fair weather.';
  }
  if(act==='raft'){
    if(t.includes('dam-fed')) bits.push('reliable dam-released flow');
    else if(t.includes('river')) bits.push('moving water under low arching trees');
    if(t.includes('historical')) bits.push('cliff-clinging monasteries pass overhead');
    if(t.includes('remote')) bits.push('a put-in nobody else uses today');
    if(w.storm) bits.push('the river is up and pushing brown');

  else if(t.includes('coast')) bits.push('open coast and dunes');

function setOff(){ startTrailhead(); }

function eligible(){ const b=S.trip.b,w=S.weather; const act=b.activity||'hike'; return EVENTS.filter(e=>activityMatch(e,act) && e.when(b,w)); }

function perkIs(...types){ return S.you && types.includes(S.you.perk); }

function finishPlayerTrip(){

    else if(!weeksOk) sub = `Needs ${it.weeks} weeks, only ${left} left`;
    else sub = `€${it.cost} · ${it.weeks} weeks · ${it.effect}`;
    return `<button class="opt ${have?'':can?'primary':'disabled'}" onclick="${can?`enrollInfra('${it.id}')`:''}" ${have?'style="opacity:.55"':''}>
      <span class="mark">${have?'✓':it.weeks+'w'}</span><span class="b-main">${it.name}<span class="b-sub">${sub}</span></span></button>`;
  }).join('');
  // roster
  const rosterRows = S.guides.length
    ? S.guides.map(g => `<div class="mate"><div class="who">
        <div class="nm">${g.name} <span class="spec">· ${g.spec}</span></div>
        <div class="task">skill ${g.skill} · wage €${g.wage}/day · retainer paid</div>
      </div><button class="assign" onclick="releaseGuide('${g.id}')">Release</button></div>`).join('')
    : '<div style="font-style:italic;color:var(--ink-faint);padding:8px 0">No guides on the books — hire after spring opens.</div>';
  setScene(`<div class="day-tag">Year ${S.year} · Winter</div>
    <h2>The winter office</h2>
    <p>Five quiet months. Long enough to take a course, fix the truck, or develop a serious drinking problem. You have <b>${left}</b> week${left===1?'':'s'} before April pretends to be warm again. Cash <b style="color:var(--gold)">€${S.cash}</b>${S.cash<0?' — and you are in the red':''}.</p>
    <div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:8px 0 6px">HATEOA cert school</div>
    <div class="choices">${certRows}</div>
    <div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 6px">Infrastructure projects</div>
    <div class="choices">${infraRows}</div>
    <div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 6px">Your team</div>
    <div class="team">${rosterRows}</div>
    <div class="actionbar"><button class="go" onclick="enterSpring()">Open spring — Year ${S.year+1} <span class="gs">${left} unused week${left===1?'':'s'}</span></button></div>`);
  paintForecast();
}
function enterSpring(){
  S.year++; S.season='summer'; S.seasonDay=1;
  S.yearStats = freshYearStats();
  S.yearStats.startCash = S.cash; S.yearStats.openingRep = S.rep;
  S.winterWeeksUsed=0; S.bestRepEverThisYear=null;
  // Fresh weather and a new day
  S.forecast=[]; ensureForecast();
  S.weather = S.forecast[0];
  S.trip=null; S.queue=null; S.dayReports=[];
  S.you.task=null; S.guides.forEach(g=>{ g.task=null; g.fatigue=0; g.morale=Math.max(g.morale, 70); });
  S.energy=100;
  note(`Spring · Year ${S.year} opens. April is here.`);
  setSub('Year '+S.year+' · '+(S.phase===2?'Phase II — a fresh season begins.':'Phase I — a fresh season begins.'));
  startDay();
}

/* ---------------- transition to Phase 2 ---------------- */
function enterPhase2(){
  S.phase=2; setSub('Year '+S.year+' · Phase II — You lead a team now. Keep them sharp, keep them safe.');
  const g={id:'g'+(++gCounter), name:'Maria', isYou:false, skill:55, fatigue:0, morale:80, wage:35, spec:rnd(SPECS), task:null};
  S.guides=[g];
  S.depot={water:Math.max(4,0)};
  Object.keys(S.owned||{}).forEach(id=>{ S.depot[id]=(S.depot[id]||0)+(CON.includes(id)?4:1); });
  ['water'].forEach(id=>{ S.depot[id]=Math.max(S.depot[id]||0,4); });
  setScene(`<div class="end">
      <div class="day-tag" style="color:var(--sage)">A turning point · ${dayTag()}</div>
      <h2>Apparently you have a business now</h2>
      <p class="verdict">Your name carries some weight now, which means people will pay you to send other people on adventures they barely understand. You take on your first guide — <b>Maria</b> — and hand her a radio. She is, on paper, your responsibility now.</p>
      <p style="font-size:15px">From here you plan each day for a team. Assign people to trips, to rest, or to training, and keep a <b>gear depot</b> stocked so nobody heads out short. When a guide hits trouble, they will radio in for your call. Wages fall due every day — so keep good people working, and try very hard not to lose anyone.</p>
      <div class="choices"><button class="opt primary" onclick="advanceDay();"><span class="mark">▸</span><span class="b-main">Open the office. God help you.</span></button></div>
    </div>`);
}

/* ---------------- PHASE 2: assignment ---------------- */
function takenBy(i){ return people().find(p=>p.task&&p.task.kind==='trip'&&p.task.bIdx===i); }
function wages(){ return S.guides.reduce((s,g)=>s+g.wage,0); }
function renderAssign(){
  renderHUD();
  const w=S.weather;
  const cards=people().map(p=>mateCard(p)).join('');
  const tripsPlanned=people().filter(p=>p.task&&p.task.kind==='trip').length;
  setScene(`<div class="day-tag">${dayTag()} · Dawn</div>
    <p class="weather">${w.name}<small>${w.note}</small></p>
    <h2>Right, where is everyone going?</h2>
    <p>Park a person on each job, then push the button and let the day happen to them. Daily wages: <b style="color:var(--gold)">€${wages()}</b>.</p>
    <div class="team">${cards}</div>
    <div style="font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--ink-faint);margin:0 0 12px;line-height:1.7">${gearSummary()}</div>
    <div class="choices">
      ${simpleOpt('▣','Stock the gear depot','Buy water, kits and durable gear for your guides', false, 'openDepot()')}
      ${simpleOpt('+','Hire a guide', S.guides.length>=5?'Your team is full (5)':'Recruit from the candidate pool', S.guides.length>=5, 'openHire()')}
    </div>
    <div class="actionbar"><button class="go" onclick="runDay()">Run the day <span class="gs">${tripsPlanned} trip(s) · ${4-availBookings()}/4 booked${gearShortfall().severe?' · short on kit':''}</span></button></div>`);
  paintForecast();
}
function gearShortfall(){
  const trips=people().filter(p=>p.task&&p.task.kind==='trip').map(p=>({p,b:S.bookings[p.task.bIdx]})).filter(t=>t.b);
  if(!trips.length) return {missing:{}, severe:false, total:0};
  const conS={}; CON.forEach(id=>conS[id]=S.depot[id]||0);
  const durS={}; DUR.forEach(id=>durS[id]=S.depot[id]||0);
  const missing={};
  trips.forEach(t=>{
    for(const id of [...recommended(t.b,S.weather)]){
      if(CON.includes(id)){ if(conS[id]>0)conS[id]--; else missing[id]=(missing[id]||0)+1; }
      else if(DUR.includes(id)){ if(durS[id]>0)durS[id]--; else missing[id]=(missing[id]||0)+1; }
    }
  });
  const total=Object.values(missing).reduce((a,b)=>a+b,0);
  const severe=(missing.water||0)>=2 || total>=4;
  return {missing, severe, total};
}
function gearSummary(){
  const con=CON.map(id=>{ const n=S.depot[id]||0; return `<span style="color:${n>0?'var(--ink-dim)':'var(--danger)'}">${ITEMS[id]} ×${n}</span>`; }).join(' · ');
  const dur=DUR.map(id=>`${ITEMS[id]} ${S.depot[id]||0}`).join(' · ');
  const sf=gearShortfall(); const missList=Object.keys(sf.missing);
  let warn='';
  if(missList.length){
    const parts=missList.map(id=>`${ITEMS[id]}${sf.missing[id]>1?` ×${sf.missing[id]}`:''}`);
    warn=`<div style="color:${sf.severe?'var(--danger)':'var(--gold)'};margin-top:4px">⚠ Short for today's plan: ${parts.join(', ')}.</div>`;
  }
  return `Depot — consumables: ${con}<br>reusable kits: ${dur}${warn}`;
}
function openDepot(){
  renderHUD();
  const rows=GEAR.map(it=>{
    const type=CON.includes(it.id)?'consumable':'reusable';
    const have=S.depot[it.id]||0, total=it.cost*it.batch, can=S.cash>=total;
    return `<button class="opt ${can?'':'disabled'}" onclick="${can?`buyGear('${it.id}')`:''}">
      <span class="mark">${have}</span><span class="b-main">${ITEMS[it.id]} <span style="color:var(--ink-faint);font-size:12px">· ${type}</span><span class="b-sub">In stock ${have} · buy ${it.batch} for €${total}${can?'':' — need more cash'}</span></span></button>`;
  }).join('');
  setScene(`<div class="day-tag">${dayTag()} · Gear depot</div>
    <h2>Stock the depot, again</h2>
    <p>Consumables are used up each trip; reusable kits stay, but only so many guides can carry them at once. Cash: <b style="color:var(--gold)">€${S.cash}</b>.</p>
    <div class="choices">${rows}
      ${packUpgradeOptP2()}
    </div>
    <div class="actionbar"><button class="go" onclick="renderAssign()">Done — back to planning</button></div>`);
}
function buyGear(id){
  const it=GEAR.find(x=>x.id===id); if(!it) return; const total=it.cost*it.batch;
  if(S.cash<total) return;
  S.cash-=total; S.depot[id]=(S.depot[id]||0)+it.batch; saveGame(); openDepot();
}
function packUpgradeOptP2(){
  const next=S.packSize<6?6:S.packSize<8?8:null;
  if(!next) return '';
  const cost=next===6?250:600, can=S.cash>=cost;
  return simpleOpt('◈', `Upgrade your own pack (${next} slots)`, can?`€${cost} · carry more on the trips you lead yourself`:`Need €${cost}`, !can, 'buyPackNow()');
}
function buyPackNow(){ const next=S.packSize<6?6:8, cost=next===6?250:600; if(S.cash<cost) return; S.cash-=cost; S.packSize=next; saveGame(); openDepot(); }
function availBookings(){ return S.bookings.filter((b,i)=>!b.cancelled && !takenBy(i)).length; }
function mateCard(p){
  const fresh = p.isYou? S.energy : (100-p.fatigue);
  const freshC = fresh>=50?'var(--sea)':fresh>=25?'var(--gold)':'var(--danger)';
  const moraleC = p.morale>=50?'var(--gold)':'var(--danger)';
  let taskTxt='Unassigned', taskCls='idle';
  if(p.task){ taskCls='';
    if(p.task.kind==='trip'){ const b=S.bookings[p.task.bIdx]; taskTxt='→ '+(b?b.route:'—'); }
    else if(p.task.kind==='rest') taskTxt='→ Resting';
    else if(p.task.kind==='train') taskTxt= p.isYou?'→ Training the team':'→ In training';
  }
  return `<div class="mate">
    <div class="who">
      <div class="nm">${p.name} <span class="spec">· ${p.spec}</span></div>
      <div class="task ${taskCls}">${taskTxt}</div>
      <div class="gauges">
        <div class="g"><div class="gl">Skill</div><div class="bar"><i style="width:${p.skill}%;background:var(--olive)"></i></div></div>
        <div class="g"><div class="gl">${p.isYou?'Energy':'Fresh'}</div><div class="bar"><i style="width:${clamp(fresh,0,100)}%;background:${freshC}"></i></div></div>
        ${p.isYou?'':`<div class="g"><div class="gl">Morale</div><div class="bar"><i style="width:${p.morale}%;background:${moraleC}"></i></div></div>`}
      </div>
    </div>
    <button class="assign" onclick="openChooser('${p.id}')">Assign</button>
  </div>`;
}
function openChooser(pid){
  const p=personById(pid);
  const opts=S.bookings.map((b,i)=>{
    const otherHas=takenBy(i)&&takenBy(i).id!==pid;
    const need=b.diff===3?45:b.diff===2?30:0;
    const tooTired = p.isYou ? S.energy<need : (100-p.fatigue) < (b.diff*12);
    const noCert = p.isYou && b.diff===3 && !hasCert('mountain');
    const dis=b.cancelled||otherHas||tooTired||noCert;
    const reason=b.cancelled?'Cancelled — storm':otherHas?('Assigned to '+takenBy(i).name):noCert?'You need the Mountain Leader cert':tooTired?'Too worn out for this':'';
    return optBooking(b,dis,reason,`assignTrip('${pid}',${i})`);
  }).join('');
  const trainSub = p.isYou?'Spend the day sharpening the whole team (free)':'Costs €60 · raises skill &amp; morale';
  setScene(`<div class="day-tag">${dayTag()} · Assigning</div>
    <h2>What should ${p.name} do today?</h2>
    <p>Pick a trip, or set ${p.isYou?'yourself':'them'} to rest or training.</p>
    <div class="choices">${opts}
      ${simpleOpt('~','Rest and recover','Restore freshness and lift morale', false, `assignTask('${pid}','rest')`)}
      ${simpleOpt('+', p.isYou?'Run a training day':'Send to training', trainSub, (!p.isYou&&S.cash<60), `assignTask('${pid}','train')`)}
      ${simpleOpt('·','Leave unassigned','No job today', false, `assignTask('${pid}',null)`)}
    </div>`);
}
function assignTrip(pid,i){ personById(pid).task={kind:'trip',bIdx:i}; renderAssign(); }
function assignTask(pid,kind){ personById(pid).task = kind?{kind}:null; renderAssign(); }

/* ---------------- running the day ---------------- */
function runDay(){
  const trips = people().filter(p=>p.task&&p.task.kind==='trip').map(p=>({p, b:S.bookings[p.task.bIdx]}));
  trips.sort((a,b)=> (a.p.isYou?1:0)-(b.p.isYou?1:0));
  allocateGear(trips);
  S.queue=trips;
  processNext();
}
function allocateGear(trips){
  const durFree={}; DUR.forEach(k=>durFree[k]=S.depot[k]||0);
  trips.forEach(t=>{
    const need=[...recommended(t.b,S.weather)];
    const cap = t.p.isYou ? S.packSize : 6;
    const got=[];
    for(const id of need){
      if(got.length>=cap) break;
      if(CON.includes(id)){ if((S.depot[id]||0)>0){ S.depot[id]--; got.push(id); } }
      else if(DUR.includes(id)){ if(durFree[id]>0){ durFree[id]--; got.push(id); } }
    }
    t.equipped=got;
    t.coverage = need.length ? got.length/need.length : 1;
  });
}
function processNext(){
  if(!S.queue||S.queue.length===0){ endOfDay(); return; }
  const job=S.queue.shift();
  if(job.p.isYou){ S._pendEquip=job.equipped||[]; beginTrip(job.b); }
  else runGuideTrip(job.p, job.b, job);
}
function gSkillCheck(g, base){ return chance(clamp(base + g.skill/250 - g.fatigue/300, 0.08, 0.95)); }
function runGuideTrip(g,b,job){
  const cov = job&&job.coverage!=null ? job.coverage : 1;
  const pRadio = clamp(0.18 + b.diff*0.07 + S.weather.risk*0.5 - g.skill/500 - (cov-0.5)*0.16, 0.04, 0.7);
  const pool = RADIO.filter(e=>e.when(b,S.weather));
  if(pool.length && chance(pRadio)){
    const ev=wpick(pool); S.radio={g,b,ev};
    setScene(`<div class="day-tag">${dayTag()} · ${b.route} · radio call</div>
      <h2>${ev.title(g,b)}</h2><p>${ev.text(g,b,S)}</p>
      <div class="choices">${ev.choices.map((c,i)=>`<button class="opt ${i===0?'primary':''}" onclick="resolveRadio(${i})">
        <span class="mark">${i+1}</span><span class="b-main">${typeof c.label==='function'?c.label(g,b):c.label}<span class="b-sub">${c.hint||''}</span></span></button>`).join('')}</div>`);
  } else {
    finalizeGuide(g,b, autoResolve(g,b,cov));
  }
}
function autoResolve(g,b,cov){
  cov = cov==null?1:cov;
  const p=clamp(0.45+g.skill/180 - b.diff*0.08 - S.weather.risk*0.6 - g.fatigue/250 + (cov-0.6)*0.35, 0.10, 0.97);
  if(chance(p)){
    if(chance(0.2)) return {line:`${g.name} ran the ${b.route} beautifully${cov>=0.99?', well-kitted and in command,':''} — the clients left glowing.`, payMul:1, rep:ri(2,4), morale:5, tips:20};
    return {line:`${g.name} ran the ${b.route} cleanly. A good day's work.`, payMul:1, rep:ri(1,3), morale:3};
  }
  return {line:`${cov<0.5?`Sent out short on kit, ${g.name}`:g.name} had a rough outing on the ${b.route} — a complaint or two came back.`, payMul:0.65, rep:-ri(2,5), morale:-5, cash:-10};
}
function finalizeGuide(g,b,r){
  const fee=Math.round(b.pay*(r.payMul!=null?r.payMul:1)), tip=(r.tips||0), earned=fee+tip;
  S.cash+=earned+(r.cash||0);
  applyRep(r.rep);
  if(r.gear) S.gear=clamp(S.gear+r.gear,0,100);
  g.morale=clamp(g.morale+(r.morale||0),0,100);
  g.fatigue=clamp(g.fatigue+(22+b.diff*5),0,100);
  if(S.stats){ S.stats.earned+=earned; S.stats.fees+=fee; S.stats.tips+=tip; S.stats.tripsGuides++; }
  if(S.yearStats){ S.yearStats.fees+=fee; S.yearStats.tips+=tip; S.yearStats.tripsGuides++; }
  S.dayReports.push({line:r.line, earned, rep:r.rep, tips:tip, cash:r.cash});
  const reviews=makeReviews((r.rep||0)+(r.morale||0)/2, tip, 1);
  renderHUD();
  if(checkEnd()) return;
  setScene(`<div class="day-tag">${dayTag()} · ${b.route}</div><h2>${g.name} checks in</h2>
    <div class="res"><p class="line">${r.line}</p><div><span class="delta up">+€${fee}</span>${tip?`<span class="delta gold">tip +€${tip}</span>`:''}${deltaHTML({rep:r.rep,gear:r.gear,cash:r.cash&&r.cash<0?r.cash:0})}${r.morale?`<span class="delta ${r.morale>0?'up':'down'}">morale ${r.morale>0?'+':''}${r.morale}</span>`:''}</div></div>
    ${reviewsHTML(reviews)}
    <div class="actionbar"><button class="go" onclick="processNext()">Next</button></div>`);
}
function resolveRadio(ci){ const {g,b,ev}=S.radio; finalizeGuide(g,b, ev.choices[ci].run(g,b,S)); }

/* ---------------- end of day ---------------- */
function endOfDay(){
  // resolve non-trip assignments
  people().forEach(p=>{
    const t=p.task;
    if(t&&t.kind==='trip') return;
    if(t&&t.kind==='rest'){ if(p.isYou) S.energy=clamp(S.energy+55,0,100); else {p.fatigue=clamp(p.fatigue-45,0,100); p.morale=clamp(p.morale+8,0,100);} }
    else if(t&&t.kind==='train'){
      if(p.isYou){ S.guides.forEach(x=>{x.skill=clamp(x.skill+4,0,100); x.morale=clamp(x.morale+5,0,100);}); if(S.guides.length) S.dayReports.push({line:'You ran a training day — the whole team sharpened up.'}); }
      else { S.cash-=60; p.skill=clamp(p.skill+ri(8,12),0,100); p.morale=clamp(p.morale+6,0,100); p.fatigue=clamp(p.fatigue-10,0,100); S.dayReports.push({line:`${p.name} trained hard (−€60) and came back sharper.`}); }
    } else { // idle
      if(p.isYou) S.energy=clamp(S.energy+25,0,100); else {p.fatigue=clamp(p.fatigue-25,0,100); p.morale=clamp(p.morale+3,0,100);}
    }
  });
  const w=wages(); S.cash-=w; if(S.stats) S.stats.wagesPaid+=w; if(S.yearStats) S.yearStats.wages+=w;
  // quitting
  const quit=S.guides.filter(g=>g.morale<=0);
  quit.forEach(g=>note(`${g.name} resigned — morale gave out.`));
  S.guides=S.guides.filter(g=>g.morale>0);
  renderHUD();
  if(checkEnd()) return;
  showDailyReport(w, quit);
}
function showDailyReport(w, quit){
  const rows=S.dayReports.map(r=>`<div class="row"><span class="l">${r.line}</span>${r.earned!=null?`<span class="v pos">+€${r.earned}</span>`:''}</div>`).join('')
    || '<div class="row"><span class="l">A quiet day — no trips ran.</span><span class="v"></span></div>';
  const quitTxt = quit.length?`<div class="row"><span class="l" style="color:var(--danger)">${quit.map(g=>g.name).join(', ')} resigned.</span><span class="v"></span></div>`:'';
  setScene(`<div class="day-tag">${dayTag()} · Day's end</div><h2>The books</h2>
    <div class="ledger">${rows}${quitTxt}
      <div class="row"><span class="l">Wages paid</span><span class="v neg">−€${w}</span></div>
      <div class="row"><span class="l">In the bank</span><span class="v ${S.cash>=0?'pos':'neg'}">€${S.cash}</span></div>
      <div class="row"><span class="l">Reputation</span><span class="v">${S.rep}</span></div>
    </div>
    <div class="choices"><button class="opt primary" onclick="nextDay()"><span class="mark">☾</span><span class="b-main">On to tomorrow</span></button></div>`);
}

/* ---------------- endings ---------------- */
function checkEnd(){
  if(S.cash<0) return endGame('Bankrupt','The books are dust. One refund, one wage bill, one terrible decision — take your pick. The company has folded. Take a moment. Then roll a new idiot, slightly wiser.',false);
  if(S.rep<=5) return endGame('A ruined name','Word travels fast in small towns. The TripAdvisor reviews have become a genre of their own. The phone has stopped ringing. Reputation is the only currency that actually matters — try to remember that next time.',false);
  if(S.phase===1 && S.cash>=1500 && S.rep>=70){ enterPhase2(); return true; }
  if(S.phase===2 && !S.phase3Ready && S.cash>=5000 && S.rep>=70 && S.guides.length>=3){
    S.phase3Ready=true; S.phase3UnlockedYear=S.year;
    note('Milestone — your outfit is ready for Phase III: water and air. The expansion will open in a future season.');
    return false;
  }
  return false;
}
/* Cap a single rep-loss event so one bad day cannot insta-ruin a season.
   Apply this everywhere a runtime-computed rep delta is added — keeps the
   event content honest while bounding the worst case. */
function applyRep(delta){
  if(delta==null||delta===0) return 0;
  const capped = delta<0 ? Math.max(delta,-8) : delta;
  S.rep=clamp(S.rep+capped,0,100);
  return capped;
}
function endGame(title,verdict,win){
  clearSave();
  setScene(`<div class="end">
    <div class="day-tag" style="color:${win?'var(--sage)':'var(--danger)'}">${win?'Victory':'Game over'} · ${dayTag()}</div>
    <h2>${title}</h2><p class="verdict">${verdict}</p>
    <p style="font-family:'Spline Sans Mono',monospace;font-size:13px;color:var(--ink-dim)">€${S.cash} · ${S.rep} reputation · ${1+S.guides.length} on the team · ${S.day} days</p>
    <div class="choices"><button class="opt primary" onclick="renderProfile()"><span class="mark">↻</span><span class="b-main">${win?'Play again':'Try another season'}</span></button></div></div>`);
  return true;
}

/* ---------------- hiring ---------------- */
function openHire(){
  const cands=[0,1].map(()=>{ const skill=ri(40,70), wage=ri(28,52), fee=skill*3+ri(0,60);
    return {name:rnd(NAMES), skill, wage, fee, spec:rnd(SPECS)}; });
  S.cands=cands;
  setScene(`<div class="day-tag">${dayTag()} · Hiring</div><h2>Today's hopefuls</h2>

function fleetItemsFor(act){ return FLEET_ITEMS[act]||[]; }
function fleetCount(id){ return (S.fleet&&S.fleet[id])||0; }
function fleetCapacity(act){
  const items = fleetItemsFor(act);
  if(!items.length) return Infinity; // hiking and other non-fleet disciplines have no cap
  return items.reduce((cap, it) => Math.min(cap, fleetCount(it.id) * (it.capPer||1)), Infinity);
}
function buyFleet(id, act){
  const it = (FLEET_ITEMS[act]||[]).find(x=>x.id===id);
  if(!it || S.cash<it.cost) return;
  S.cash -= it.cost; S.fleet[id] = fleetCount(id)+1;
  note(`Bought a ${it.name.toLowerCase()} (−€${it.cost}).`);
  saveGame(); openShop();
}

/* ---------------- equipment quality tiers ----------------
   Every item comes in three qualities. Higher tiers cost more upfront but
   last many more trips before they break (durables) or are used up
   (consumables). S.owned tracks ONE instance per id at a time:
     S.owned = { water: {tier:'standard', trips:2}, firstaid: {...} }
   Each packed item decrements its trips counter when the trip completes;
   at 0 it breaks and is removed from S.owned. Re-buying any tier replaces
   and refills with a fresh full lifetime at that tier. */
const ITEM_TIERS=['basic','standard','pro'];
const TIER_MULT={
  basic:    {cost:0.5, life:0.5, label:'basic',    note:'cheap, short life'},
  standard: {cost:1.0, life:1.0, label:'standard', note:'reliable'},
  pro:      {cost:2.5, life:4.0, label:'pro',      note:'lasts and lasts'},
};
const ITEM_LIFETIME={  // trips at standard quality before wear-out / consumption
  water:4, snacks:4, sunscreen:8, repellent:8,
  firstaid:25, poles:50, map:80, shell:30, lamp:40,
  pfd:35, paddle:40, sprayskirt:25, drybag:50, bilgepump:60, towline:60, vhf:30,
  sparepaddle:60, paddleleash:20, cag:25, compass:80,
  // Canyoning — ropes wear with rappels; wetsuit takes immersion+sun; helmets eat knocks
  wetsuit:30, canyonHarness:50, canyonHelmet:60, rope:40, descender:80, throwline:60,
  canyonBag:50, canyonShoes:30, cowstails:60,
  // Rafting — throw-bag and pump last; bail bucket effectively forever
  raftThrow:60, raftPump:80, raftFlip:80, raftBail:120, raftSparePaddle:60,
  // Cycling — repair kit consumed with use; tubes are basically consumable; GPS lasts
  bikeRepair:40, bikeTubes:8, bikePump:60, bikeGPS:120,
};
function itemCost(id, tier){ return Math.round(ITEM_COST[id] * TIER_MULT[tier].cost); }
function itemLifetime(id, tier){ return Math.max(1, Math.round(ITEM_LIFETIME[id] * TIER_MULT[tier].life)); }
function ownedTier(id){ return S.owned && S.owned[id] ? S.owned[id].tier : null; }
function ownedTrips(id){ return S.owned && S.owned[id] ? S.owned[id].trips : 0; }
function ownsItem(id){ return ownedTrips(id) > 0; }
function freshOwned(id, tier){ return {tier, trips:itemLifetime(id, tier)}; }

function starStr(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }
function tierFor(score, tips){
  if(score>=8 || tips>=35) return 5;
  if(score>=3) return 4;
  if(score>=-1) return 3;
  if(score>=-7) return 2;
  return 1;
}
function makeReviews(score, tips, n){
  const base=tierFor(score,tips), out=[];
  for(let i=0;i<n;i++){
    let t=base; if(i>0 && chance(0.5)) t=clamp(base+(chance(0.5)?1:-1),1,5);
    out.push({stars:t, name:rnd(REVIEWERS), src:rnd(SOURCES), text:rnd(REVIEW_TIERS[t])});
  }
  return out;
}
