/* ---------------- personal interactive trip ---------------- */
function hasItem(id){ return S.loadout.includes(id); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function recommended(b,w){
  const act=b.activity||'hike';
  const t=b.tags||[];
  if(act==='seakayak'){
    const r=new Set(['water','pfd','paddle','drybag']);
    if(w.heat||t.includes('exposed')||t.includes('open-water')) r.add('sunscreen');
    if(t.includes('exposed')||t.includes('open-water')) { r.add('sprayskirt'); r.add('bilgepump'); }
    if(t.includes('open-water')||t.includes('remote')) { r.add('towline'); r.add('vhf'); r.add('sparepaddle'); }
    if(w.mist||t.includes('open-water')) r.add('compass');
    if(w.mist||w.storm||w.wind&&t.includes('open-water')) r.add('cag');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')) r.add('snacks');
    return r;
  }
  if(act==='canyon'){
    // Always: rope + harness + helmet + wetsuit. Throw-line and shoes as grade rises.
    const r=new Set(['water','wetsuit','canyonHarness','canyonHelmet','rope','canyonBag']);
    if(b.diff>=2||t.includes('river')) r.add('throwline');
    if(b.diff>=2||t.includes('technical')) r.add('descender');
    if(t.includes('technical')||t.includes('abseil')) r.add('cowstails');
    if(t.includes('technical')||t.includes('abseil')||t.includes('remote')) r.add('canyonShoes');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')||b.diff>=3) r.add('snacks');
    return r;
  }
  if(act==='raft'){
    // Throw-bag, pump+repair, spare paddle, flip line — the river guide's basics.
    const r=new Set(['water','raftThrow','raftPump','raftSparePaddle','raftFlip']);
    if(w.heat) r.add('sunscreen');
    if(b.diff>=2) r.add('raftBail');
    if(b.diff>=2||t.includes('remote')) r.add('firstaid');
    if(t.includes('long')) r.add('snacks');
    return r;
  }
  if(act==='cycle'){
    // Repair kit + tubes + pump always. GPS on long backcountry. Sun matters.
    const r=new Set(['water','bikeRepair','bikeTubes','bikePump']);
    if(w.heat||t.includes('exposed')) r.add('sunscreen');
    if(t.includes('backcountry')||t.includes('long')||t.includes('mountain')) r.add('bikeGPS');
    if(b.diff>=2||t.includes('long')) r.add('snacks');
    if(b.diff>=2||t.includes('mountain')) r.add('firstaid');
    return r;
  }
  if(act==='sup'){
    // SUP pump + spare fin always. Sun ALWAYS. Anchor for SUP-yoga. VHF for open water.
    const r=new Set(['water','sunscreen','supPump','supFin']);
    if(t.includes('eco')||t.includes('calm')) r.add('supAnchor');
    if(t.includes('open')||t.includes('exposed')) { r.add('vhf'); r.add('cag'); }
    if(b.diff>=2||t.includes('open')) r.add('firstaid');
    return r;
  }
  if(act==='climb'){
    // Rope + draws + belay device always. Slings + chalk + shoes as needed.
    const r=new Set(['water','rope','quickdraws','beladevice','climbChalk','firstaid']);
    if(t.includes('multi-pitch')||b.diff===3) r.add('slings');
    if(t.includes('multi-pitch')||t.includes('exposed')) r.add('climbShoesOwn');
    if(t.includes('long')||b.diff>=2) r.add('snacks');
    if(w.heat||t.includes('exposed')) r.add('sunscreen');
    return r;
  }
  // hiking
  const r=new Set(['water']);
  if(w.heat||t.includes('exposed')) r.add('sunscreen');
  if(t.includes('river')||t.includes('forest')||t.includes('gorge')) r.add('repellent');
  if(b.diff>=2||t.includes('rock')||t.includes('alpine')||t.includes('gorge')) r.add('poles');
  if(w.mist||w.storm||t.includes('remote')) r.add('map');
  if(w.mist||w.storm||w.wind||t.includes('alpine')) r.add('shell');
  if(b.diff>=2||t.includes('long')) r.add('snacks');
  if(b.diff>=3||t.includes('remote')) r.add('firstaid');
  if(t.includes('long')&&t.includes('alpine')) r.add('lamp');
  return r;
}
function conditionsLine(b,w){

    else if(t.includes('caves')) bits.push('sea caves and clear deep water');
    else if(t.includes('calm')) bits.push('glassy sheltered water');
    else if(t.includes('coast')) bits.push('coastal paddling under cliffs');
    if(t.includes('historical')) bits.push('old stone watching from above');

    if(w.heat) bits.push('a swimming-stop kind of heat');
    if(b.diff>=2) bits.push('lively water, real rapids');
    return bits.length ? cap(bits.join(', '))+'.' : 'A gentle river day.';
  }
  if(act==='cycle'){
    if(t.includes('mountain')) bits.push('a proper climb into chestnut forests');
    else if(t.includes('coast')) bits.push('coast road with tower villages and sea drops');
    else if(t.includes('backcountry')) bits.push('quiet backcountry lanes');
    if(t.includes('historical')) bits.push('ruins around every corner');
    if(t.includes('exposed')) bits.push('no shade on the open tarmac');
    if(w.heat) bits.push('a brutal midday sun on the road');
    if(w.wind) bits.push('a headwind that saps and steers');
    if(w.storm) bits.push('slick roads, no day for the long way');
    if(b.diff>=3||t.includes('long')) bits.push('a long day in the saddle');
    return bits.length ? cap(bits.join(', '))+'.' : 'A gentle pedal in fair weather.';
  }
  if(act==='sup'){

  if(bus>0) t.logs && t.logs.push(`The bus to the trailhead and back took €${bus} off the day.`);
  S.cash+=earned;
  S.energy=clamp(S.energy-(b.diff===3?36:b.diff===2?28:20)-(S.weather.drain||0),0,100);
  S.gear=clamp(S.gear-(6+b.diff*3),0,100);
  note(`${b.route}: fee €${fee}${tip?` + €${tip} tips`:''}.`);
  if(S.stats){ S.stats.earned+=earned; S.stats.fees+=fee; S.stats.tips+=tip; S.stats.tripsYou++; }
  if(S.yearStats){ S.yearStats.fees+=fee; S.yearStats.tips+=tip; S.yearStats.tripsYou++; }
  // Wear down each packed item by one trip; chef makes snacks last half-rate.
  // Alani's dodgy gear: a small chance per trip that a "questionable provenance"
  // item is recognised at the trailhead — instant breakage + reputation hit.
  const broken=[]; const dodgyExposed=[];
  (S.loadout||[]).forEach(id=>{
    if(!S.owned[id]) return;
    // The Mykonos chef (hero id) stretches snacks — even though her engine
    // tag is 'charmer' for the tip-and-rep model, the snacks-half-rate hook
    // identifies by heroId so both effects coexist.
    const skipWear = (S.you && S.you.heroId==='chef') && id==='snacks' && chance(0.5);
    if(!skipWear) S.owned[id].trips--;
    // Alani-only: dodgy items occasionally get spotted on the trail
    if(S.owned[id] && S.owned[id].dodgy && (S.you && S.you.heroId==='alani') && chance(ALANI_DODGY_EXPOSE_CHANCE)){
      dodgyExposed.push({id, tier:S.owned[id].tier});
      delete S.owned[id];
      const r = applyRep(-3); t.repDelta = (t.repDelta||0) + r;
      return;
    }
    if(S.owned[id] && S.owned[id].trips<=0){ broken.push({id, tier:S.owned[id].tier}); delete S.owned[id]; }
  });
  if(dodgyExposed.length){
    const names=dodgyExposed.map(x=>ITEMS[x.id].replace('&amp;','&')).join(', ');
    note(`A client recognised the ${names} — apparently it went missing from a clubhouse last spring. You returned it, smiling, and lost a little face (−3 rep).`);
    prepLine += ` A piece of your kit had a name carved on the underside, and it was not yours.`;
  }
  if(broken.length){
    const names=broken.map(x=>`${ITEMS[x.id].replace('&amp;','&')} (${x.tier})`).join(', ');
    note(`Gear gave out on the trail: ${names}. Re-buy at the shop.`);
    prepLine += ` ${broken.length===1?'Your '+ITEMS[broken[0].id].toLowerCase().replace('&amp;','&')+' finally gave up on this trip':'Several pieces of kit gave up on this trip'} — time for a shop run.`;
  }
  S.dayReports.push({line:`You guided the ${b.route}.`, earned});
  // Influencer — volatile fame (HEROES.md → influencer). A great trip spawns
  // an extra review and a small rep tick (the post takes off); a poor trip
  // gets a sharper rep hit (the post goes viral too).
  const isInfluencer = S.you && S.you.heroId==='influencer';
  const finalTier = tierFor(t.repDelta||0, tip);
  let reviewCount = 2;
  if(isInfluencer){
    if(finalTier >= 5){
      reviewCount = 3;
      const r = applyRep(2); t.repDelta = (t.repDelta||0) + r;
      note('Your trip made the Stories of three different accounts. The booking inbox pinged twice on the drive home.');
    } else if(finalTier <= 2){
      const r = applyRep(-3); t.repDelta = (t.repDelta||0) + r;
      note('Someone posted about you. The wrong someone. The clip got 40k views before lunch.');
    }
  }
  const reviews=makeReviews(t.repDelta||0, tip, reviewCount);
  renderHUD();
  if(checkEnd()) return;
  // Variant report cards (review good/bad, gear-damage) are pending an art
  // rework -- use the neutral ledger for every outcome for now.
  const reportAsset = 'report-blank';
  reportStage(reportAsset, `<p class="trip-title">Back at the trailhead</p>
    <div class="res">${t.logs.map(l=>`<p class="line">${l}</p>`).join('')}</div>
    ${prepLine?`<p class="report-note">${prepLine}</p>`:''}
    ${reviewsHTML(reviews)}
    <div class="ledger">
      <div class="row"><span class="l">Guiding fee</span><span class="v pos">+€${fee}</span></div>
      ${tip?`<div class="row"><span class="l">Tips</span><span class="v" style="color:var(--gold)">+€${tip}</span></div>`:'<div class="row"><span class="l">Tips</span><span class="v">€0</span></div>'}
    </div>
    <button class="scene-go" onclick="afterPlayerTrip()">${S.phase===2?'Carry on':'End the day'}</button>`,
    `${dayTag()} · Trip complete`);
}
function afterPlayerTrip(){ if(S.phase===2) processNext(); else nextDay(); }

/* ---------------- season transitions ----------------
   At the end of October (seasonDay=214) advanceDay fires enterOffSeason()
   which shows the Season Report, then drops into renderOffSeason() where
   the player spends winter weeks on cert school, infra, and roster moves
   before pressing through to spring (Year N+1). */
function enterOffSeason(){
  S.season='winter';
  if(S.yearStats) S.yearStats.endingCash = S.cash;
  S.winterWeeksUsed=0;
  S.bestRepEverThisYear = S.yearStats?.bestRep || S.rep;
  // Retainers: keeping guides costs money over winter
  const retainerPerGuide = 250;
  const retainer = S.guides.length * retainerPerGuide;
  S.cash -= retainer;
  if(S.stats) S.stats.retainersPaid = (S.stats.retainersPaid||0)+retainer;
  if(S.yearStats) S.yearStats.retainers = retainer;
  // Loan instalment — fleet-bootstrap debt is due each winter until paid off.
  // (M5) Interest accrues on the remaining balance BEFORE the instalment is
  //      taken. If the player can't cover the instalment, default fires with
  //      source-specific consequences (PHASE-ARCHITECTURE §15).
  let loanPaid = 0, loanInterest = 0, loanDefault = false;
  if(S.loan && S.loan.balance > 0){
    if(S.loan.interest && S.loan.interest>0){
      loanInterest = Math.round(S.loan.balance * S.loan.interest);
      S.loan.balance += loanInterest;
    }
    const due = Math.min(S.loan.perYear, S.loan.balance);
    if(S.cash >= due){
      loanPaid = due;
      S.cash -= loanPaid;
      S.loan.balance -= loanPaid;
      if(S.loan.balance <= 0){
        note(`Final loan instalment paid to ${S.loan.source} (−€${loanPaid}). The fleet is yours, free and clear.`);
        S.loan = null;
      } else {
        const intNote = loanInterest>0 ? ` (€${loanInterest} interest accrued first)` : '';
        note(`Loan instalment paid to ${S.loan.source} (−€${loanPaid})${intNote}. Balance: €${S.loan.balance}.`);
      }
    } else {
      // Can't pay → default this winter. Source decides what happens.
      loanDefault = true;
      S.loan.missed = (S.loan.missed||0) + 1;
      const src = loanSource(S.loan.sourceId);
      if(src.defaultConsequence) src.defaultConsequence(S);
      note(`Defaulted on the €${due} instalment to ${S.loan.source}. ${src.defaultLine}`);
    }
    if(S.yearStats){ S.yearStats.loan = loanPaid; S.yearStats.loanInterest = loanInterest; }
  }
  // Consumables decay over storage
  CON.forEach(id => { if(S.depot[id]) S.depot[id] = Math.floor(S.depot[id]/2); });
  note(`The season closed. Retainers paid (−€${retainer}). Consumable stock halved over winter.`);
  if(S.stats) S.stats.yearsCompleted = (S.stats.yearsCompleted||0)+1;
  renderSeasonReport();
}

  setScene(`<div class="end">

      ${ys.loan?`<div class="row"><span class="l">Loan instalment${S.loan?` · still owed €${S.loan.balance}`:' · paid off'}</span><span class="v neg">−€${ys.loan}</span></div>`:''}
      ${(S.loan && S.loan.missed)?`<div class="row"><span class="l" style="color:var(--danger)">Loan in default · ${S.loan.missed} missed</span><span class="v neg">€${S.loan.balance} owed</span></div>`:''}
      <div class="row"><span class="l"><b>Net for the year</b></span><span class="v ${net>=0?'pos':'neg'}"><b>${net>=0?'+':'−'}€${Math.abs(net)}</b></span></div>

    <div class="actionbar"><button class="go" onclick="renderOffSeason()">Move into winter <span class="gs">${WINTER_WEEKS} weeks of planning</span></button></div>
  </div>`);

function certCard(c, left, bestRep){
  const have = hasCert(c.id);
  const prereqOk = !c.prereq || hasCert(c.prereq);
  const repOk = bestRep >= c.repReq;
  const cashOk = S.cash >= c.cost;
  const weeksOk = c.weeks <= left;
  const can = !have && prereqOk && repOk && cashOk && weeksOk;
  let sub;
  if(have) sub = 'Certified — done.';
  else if(!prereqOk) sub = 'First earn ' + certName(c.prereq);
  else if(!repOk) sub = `Needs reputation ${c.repReq} (your peak this year was ${bestRep})`;
  else if(!cashOk) sub = `Need €${c.cost}`;
  else if(!weeksOk) sub = `Needs ${c.weeks} weeks, only ${left} left`;
  else sub = `€${c.cost} · ${c.weeks} weeks · ${c.effect}`;
  return `<button class="opt ${have?'':can?'primary':'disabled'}" onclick="${can?`enrollCertSchool('${c.id}')`:''}" ${have?'style="opacity:.55"':''}>
    <span class="mark">${have?'✓':c.weeks+'w'}</span><span class="b-main">${c.name}<span class="b-sub">${sub}</span></span></button>`;
}
function certSectionHeader(label, sub){
  return `<div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:14px 0 6px">${label}${sub?` <span style="color:var(--ink-faint);text-transform:none;letter-spacing:0;font-size:11px;font-style:italic">· ${sub}</span>`:''}</div>`;
}

  // discipline" (collapses L1 entries for disciplines you don't yet offer).

       <div class="team">${S.guides.map(g => `<div class="mate"><div class="who">

    : '';
  setScene(`<div class="day-tag">Year ${S.year} · Winter</div>

  paintForecast();

    <div class="actionbar"><button class="go" onclick="runDay()">Run the day <span class="gs">${tripsPlanned} trip(s) · ${4-availBookings()}/4 booked${gearShortfall().severe?' · short on kit':''}</span></button></div>`);
  paintForecast();
}
function gearShortfall(){
  const trips=people().filter(p=>p.task&&p.task.kind==='trip').map(p=>({p,b:S.bookings[p.task.bIdx]})).filter(t=>t.b);
  if(!trips.length) return {missing:{}, severe:false, total:0};
  const conS={}; CON.forEach(id=>conS[id]=S.depot[id]||0);
  const durS={}; DUR.forEach(id=>durS[id]=S.depot[id]||0);
  const missing={};
  trips.forEach(t=>{
    for(const id of [...recommended(t.b,S.weather)]){
      if(CON.includes(id)){ if(conS[id]>0)conS[id]--; else missing[id]=(missing[id]||0)+1; }
      else if(DUR.includes(id)){ if(durS[id]>0)durS[id]--; else missing[id]=(missing[id]||0)+1; }
    }
  });
  const total=Object.values(missing).reduce((a,b)=>a+b,0);
  const severe=(missing.water||0)>=2 || total>=4;
  return {missing, severe, total};
}
function gearSummary(){
  const con=CON.map(id=>{ const n=S.depot[id]||0; return `<span style="color:${n>0?'var(--ink-dim)':'var(--danger)'}">${ITEMS[id]} ×${n}</span>`; }).join(' · ');
  const dur=DUR.map(id=>`${ITEMS[id]} ${S.depot[id]||0}`).join(' · ');
  const sf=gearShortfall(); const missList=Object.keys(sf.missing);
  let warn='';
  if(missList.length){
    const parts=missList.map(id=>`${ITEMS[id]}${sf.missing[id]>1?` ×${sf.missing[id]}`:''}`);
    warn=`<div style="color:${sf.severe?'var(--danger)':'var(--gold)'};margin-top:4px">⚠ Short for today's plan: ${parts.join(', ')}.</div>`;
  }
  return `Depot — consumables: ${con}<br>reusable kits: ${dur}${warn}`;
}
function openDepot(){
  renderHUD();
  const rows=GEAR.map(it=>{
    const type=CON.includes(it.id)?'consumable':'reusable';
    const have=S.depot[it.id]||0, total=it.cost*it.batch, can=S.cash>=total;
    return `<button class="opt ${can?'':'disabled'}" onclick="${can?`buyGear('${it.id}')`:''}">
      <span class="mark">${have}</span><span class="b-main">${ITEMS[it.id]} <span style="color:var(--ink-faint);font-size:12px">· ${type}</span><span class="b-sub">In stock ${have} · buy ${it.batch} for €${total}${can?'':' — need more cash'}</span></span></button>`;
  }).join('');
  setScene(`<div class="day-tag">${dayTag()} · Gear depot</div>
    <h2>Stock the depot, again</h2>
    <p>Consumables are used up each trip; reusable kits stay, but only so many guides can carry them at once. Cash: <b style="color:var(--gold)">€${S.cash}</b>.</p>
    <div class="choices">${rows}
      ${packUpgradeOptP2()}
    </div>
    <div class="actionbar"><button class="go" onclick="renderAssign()">Done — back to planning</button></div>`);
}
function buyGear(id){
  const it=GEAR.find(x=>x.id===id); if(!it) return; const total=it.cost*it.batch;
  if(S.cash<total) return;
  S.cash-=total; S.depot[id]=(S.depot[id]||0)+it.batch; saveGame(); openDepot();
}
function packUpgradeOptP2(){
  const next=S.packSize<6?6:S.packSize<8?8:null;
  if(!next) return '';
  const cost=next===6?250:600, can=S.cash>=cost;
  return simpleOpt('◈', `Upgrade your own pack (${next} slots)`, can?`€${cost} · carry more on the trips you lead yourself`:`Need €${cost}`, !can, 'buyPackNow()');
}
function buyPackNow(){ const next=S.packSize<6?6:8, cost=next===6?250:600; if(S.cash<cost) return; S.cash-=cost; S.packSize=next; saveGame(); openDepot(); }
function availBookings(){ return S.bookings.filter((b,i)=>!b.cancelled && !takenBy(i)).length; }
function mateCard(p){
  const fresh = p.isYou? S.energy : (100-p.fatigue);
  const freshC = fresh>=50?'var(--sea)':fresh>=25?'var(--gold)':'var(--danger)';
  const moraleC = p.morale>=50?'var(--gold)':'var(--danger)';
  let taskTxt='Unassigned', taskCls='idle';
  if(p.task){ taskCls='';
    if(p.task.kind==='trip'){ const b=S.bookings[p.task.bIdx]; taskTxt='→ '+(b?b.route:'—'); }
    else if(p.task.kind==='rest') taskTxt='→ Resting';
    else if(p.task.kind==='train') taskTxt= p.isYou?'→ Training the team':'→ In training';
  }
  return `<div class="mate">
    <div class="who">
      <div class="nm">${p.name} <span class="spec">· ${p.spec}</span></div>
      <div class="task ${taskCls}">${taskTxt}</div>
      <div class="gauges">
        <div class="g"><div class="gl">Skill</div><div class="bar"><i style="width:${p.skill}%;background:var(--olive)"></i></div></div>
        <div class="g"><div class="gl">${p.isYou?'Energy':'Fresh'}</div><div class="bar"><i style="width:${clamp(fresh,0,100)}%;background:${freshC}"></i></div></div>
        ${p.isYou?'':`<div class="g"><div class="gl">Morale</div><div class="bar"><i style="width:${p.morale}%;background:${moraleC}"></i></div></div>`}
      </div>
    </div>
    <button class="assign" onclick="openChooser('${p.id}')">Assign</button>
  </div>`;
}
function openChooser(pid){
  const p=personById(pid);
  const opts=S.bookings.map((b,i)=>{
    const otherHas=takenBy(i)&&takenBy(i).id!==pid;
    const need=b.diff===3?45:b.diff===2?30:0;
    const tooTired = p.isYou ? S.energy<need : (100-p.fatigue) < (b.diff*12);
    const noCert = p.isYou && b.diff===3 && !hasCert('mountain');
    const dis=b.cancelled||otherHas||tooTired||noCert;
    const reason=b.cancelled?'Cancelled — storm':otherHas?('Assigned to '+takenBy(i).name):noCert?'You need the Mountain Leader cert':tooTired?'Too worn out for this':'';
    return optBooking(b,dis,reason,`assignTrip('${pid}',${i})`);
  }).join('');
  const trainSub = p.isYou?'Spend the day sharpening the whole team (free)':'Costs €60 · raises skill &amp; morale';
  setScene(`<div class="day-tag">${dayTag()} · Assigning</div>
    <h2>What should ${p.name} do today?</h2>
    <p>Pick a trip, or set ${p.isYou?'yourself':'them'} to rest or training.</p>
    <div class="choices">${opts}
      ${simpleOpt('~','Rest and recover','Restore freshness and lift morale', false, `assignTask('${pid}','rest')`)}
      ${simpleOpt('+', p.isYou?'Run a training day':'Send to training', trainSub, (!p.isYou&&S.cash<60), `assignTask('${pid}','train')`)}
      ${simpleOpt('·','Leave unassigned','No job today', false, `assignTask('${pid}',null)`)}
    </div>`);
}
function assignTrip(pid,i){ personById(pid).task={kind:'trip',bIdx:i}; renderAssign(); }
function assignTask(pid,kind){ personById(pid).task = kind?{kind}:null; renderAssign(); }

/* ---------------- running the day ---------------- */
function runDay(){
  const trips = people().filter(p=>p.task&&p.task.kind==='trip').map(p=>({p, b:S.bookings[p.task.bIdx]}));
  trips.sort((a,b)=> (a.p.isYou?1:0)-(b.p.isYou?1:0));
  allocateGear(trips);
  S.queue=trips;
  processNext();
}
function allocateGear(trips){
  const durFree={}; DUR.forEach(k=>durFree[k]=S.depot[k]||0);
  trips.forEach(t=>{
    const need=[...recommended(t.b,S.weather)];
    const cap = t.p.isYou ? S.packSize : 6;
    const got=[];
    for(const id of need){
      if(got.length>=cap) break;
      if(CON.includes(id)){ if((S.depot[id]||0)>0){ S.depot[id]--; got.push(id); } }
      else if(DUR.includes(id)){ if(durFree[id]>0){ durFree[id]--; got.push(id); } }
    }
    t.equipped=got;
    t.coverage = need.length ? got.length/need.length : 1;
  });
}
function processNext(){
  if(!S.queue||S.queue.length===0){ endOfDay(); return; }
  const job=S.queue.shift();
  if(job.p.isYou){ S._pendEquip=job.equipped||[]; beginTrip(job.b); }
  else runGuideTrip(job.p, job.b, job);
}
function gSkillCheck(g, base){ return chance(clamp(base + g.skill/250 - g.fatigue/300, 0.08, 0.95)); }
function runGuideTrip(g,b,job){
  const cov = job&&job.coverage!=null ? job.coverage : 1;
  const pRadio = clamp(0.18 + b.diff*0.07 + S.weather.risk*0.5 - g.skill/500 - (cov-0.5)*0.16, 0.04, 0.7);
  const pool = RADIO.filter(e=>e.when(b,S.weather));
  if(pool.length && chance(pRadio)){
    const ev=wpick(pool); S.radio={g,b,ev};
    setScene(`<div class="day-tag">${dayTag()} · ${b.route} · radio call</div>
      ${imgFor('scene-radio-crisis', {cls:'art art-scene', alt:'A guide on the radio, weather closing in'})}
      <h2>${ev.title(g,b)}</h2><p>${ev.text(g,b,S)}</p>
      <div class="choices">${ev.choices.map((c,i)=>`<button class="opt ${i===0?'primary':''}" onclick="resolveRadio(${i})">
        <span class="mark">${i+1}</span><span class="b-main">${typeof c.label==='function'?c.label(g,b):c.label}<span class="b-sub">${c.hint||''}</span></span></button>`).join('')}</div>`);
  } else {
    finalizeGuide(g,b, autoResolve(g,b,cov));
  }
}
function autoResolve(g,b,cov){
  cov = cov==null?1:cov;
  const p=clamp(0.45+g.skill/180 - b.diff*0.08 - S.weather.risk*0.6 - g.fatigue/250 + (cov-0.6)*0.35, 0.10, 0.97);
  if(chance(p)){
    if(chance(0.2)) return {line:`${g.name} ran the ${b.route} beautifully${cov>=0.99?', well-kitted and in command,':''} — the clients left glowing.`, payMul:1, rep:ri(2,4), morale:5, tips:20};
    return {line:`${g.name} ran the ${b.route} cleanly. A good day's work.`, payMul:1, rep:ri(1,3), morale:3};
  }
  return {line:`${cov<0.5?`Sent out short on kit, ${g.name}`:g.name} had a rough outing on the ${b.route} — a complaint or two came back.`, payMul:0.65, rep:-ri(2,5), morale:-5, cash:-10};
}
function finalizeGuide(g,b,r){
  const fee=Math.round(b.pay*(r.payMul!=null?r.payMul:1)), tip=(r.tips||0), earned=fee+tip;
  S.cash+=earned+(r.cash||0);
  applyRep(r.rep);
  if(r.gear) S.gear=clamp(S.gear+r.gear,0,100);
  g.morale=clamp(g.morale+(r.morale||0),0,100);
  g.fatigue=clamp(g.fatigue+(22+b.diff*5),0,100);
  if(S.stats){ S.stats.earned+=earned; S.stats.fees+=fee; S.stats.tips+=tip; S.stats.tripsGuides++; }
  if(S.yearStats){ S.yearStats.fees+=fee; S.yearStats.tips+=tip; S.yearStats.tripsGuides++; }
  S.dayReports.push({line:r.line, earned, rep:r.rep, tips:tip, cash:r.cash});
  const reviews=makeReviews((r.rep||0)+(r.morale||0)/2, tip, 1);
  renderHUD();
  if(checkEnd()) return;
  setScene(`<div class="day-tag">${dayTag()} · ${b.route}</div><h2>${g.name} checks in</h2>
    <div class="res"><p class="line">${r.line}</p><div><span class="delta up">+€${fee}</span>${tip?`<span class="delta gold">tip +€${tip}</span>`:''}${deltaHTML({rep:r.rep,gear:r.gear,cash:r.cash&&r.cash<0?r.cash:0})}${r.morale?`<span class="delta ${r.morale>0?'up':'down'}">morale ${r.morale>0?'+':''}${r.morale}</span>`:''}</div></div>
    ${reviewsHTML(reviews)}
    <div class="actionbar"><button class="go" onclick="processNext()">Next</button></div>`);
}
function resolveRadio(ci){ const {g,b,ev}=S.radio; finalizeGuide(g,b, ev.choices[ci].run(g,b,S)); }

/* ---------------- end of day ---------------- */
function endOfDay(){
  // resolve non-trip assignments
  people().forEach(p=>{
    const t=p.task;
    if(t&&t.kind==='trip') return;
    if(t&&t.kind==='rest'){ if(p.isYou) S.energy=clamp(S.energy+55,0,100); else {p.fatigue=clamp(p.fatigue-45,0,100); p.morale=clamp(p.morale+8,0,100);} }
    else if(t&&t.kind==='train'){
      if(p.isYou){ S.guides.forEach(x=>{x.skill=clamp(x.skill+4,0,100); x.morale=clamp(x.morale+5,0,100);}); if(S.guides.length) S.dayReports.push({line:'You ran a training day — the whole team sharpened up.'}); }
      else { S.cash-=60; p.skill=clamp(p.skill+ri(8,12),0,100); p.morale=clamp(p.morale+6,0,100); p.fatigue=clamp(p.fatigue-10,0,100); S.dayReports.push({line:`${p.name} trained hard (−€60) and came back sharper.`}); }
    } else { // idle
      if(p.isYou) S.energy=clamp(S.energy+25,0,100); else {p.fatigue=clamp(p.fatigue-25,0,100); p.morale=clamp(p.morale+3,0,100);}
    }
  });
  const w=wages(); S.cash-=w; if(S.stats) S.stats.wagesPaid+=w; if(S.yearStats) S.yearStats.wages+=w;
  // quitting
  const quit=S.guides.filter(g=>g.morale<=0);
  quit.forEach(g=>note(`${g.name} resigned — morale gave out.`));
  S.guides=S.guides.filter(g=>g.morale>0);
  renderHUD();
  if(checkEnd()) return;
  showDailyReport(w, quit);
}
function showDailyReport(w, quit){
  const rows=S.dayReports.map(r=>`<div class="row"><span class="l">${r.line}</span>${r.earned!=null?`<span class="v pos">+€${r.earned}</span>`:''}</div>`).join('')
    || '<div class="row"><span class="l">A quiet day — no trips ran.</span><span class="v"></span></div>';
  const quitTxt = quit.length?`<div class="row"><span class="l" style="color:var(--danger)">${quit.map(g=>g.name).join(', ')} resigned.</span><span class="v"></span></div>`:'';
  setScene(`<div class="day-tag">${dayTag()} · Day's end</div><h2>The books</h2>
    <div class="ledger">${rows}${quitTxt}
      <div class="row"><span class="l">Wages paid</span><span class="v neg">−€${w}</span></div>
      <div class="row"><span class="l">In the bank</span><span class="v ${S.cash>=0?'pos':'neg'}">€${S.cash}</span></div>
      <div class="row"><span class="l">Reputation</span><span class="v">${S.rep}</span></div>
    </div>
    <div class="choices"><button class="opt primary" onclick="nextDay()"><span class="mark">☾</span><span class="b-main">On to tomorrow</span></button></div>`);
}

/* ---------------- endings ---------------- */
function checkEnd(){
  if(S.cash<0) return endGame('Bankrupt','The books are dust. One refund, one wage bill, one terrible decision — take your pick. The company has folded. Take a moment. Then roll a new idiot, slightly wiser.',false);
  if(S.rep<=5) return endGame('A ruined name','Word travels fast in small towns. The TripAdvisor reviews have become a genre of their own. The phone has stopped ringing. Reputation is the only currency that actually matters — try to remember that next time.',false);
  // M7: Phase 1→2 transition is no longer automatic at €1500+rep70. The hire
  // is now a player choice offered by renderHireScene() in startDay() when
  // demand has been outgrowing one pair of legs.
  if(S.phase===2 && !S.phase3Ready && S.cash>=5000 && S.rep>=70 && S.guides.length>=3){
    S.phase3Ready=true; S.phase3UnlockedYear=S.year;
    note('Milestone — your outfit is ready for Phase III: water and air. The expansion will open in a future season.');
    return false;
  }
  return false;
}
/* Cap a single rep-loss event so one bad day cannot insta-ruin a season.
   Apply this everywhere a runtime-computed rep delta is added — keeps the
   event content honest while bounding the worst case. */
function applyRep(delta){
  if(delta==null||delta===0) return 0;
  const capped = delta<0 ? Math.max(delta,-8) : delta;
  S.rep=clamp(S.rep+capped,0,100);
  return capped;
}
function endGame(title,verdict,win){
  clearSave();
  setScene(`<div class="end">
    <div class="day-tag" style="color:${win?'var(--sage)':'var(--danger)'}">${win?'Victory':'Game over'} · ${dayTag()}</div>
    <h2>${title}</h2><p class="verdict">${verdict}</p>
    <p style="font-family:'Spline Sans Mono',monospace;font-size:13px;color:var(--ink-dim)">€${S.cash} · ${S.rep} reputation · ${1+S.guides.length} on the team · ${S.day} days</p>
    <div class="choices"><button class="opt primary" onclick="renderKitchen()"><span class="mark">↻</span><span class="b-main">${win?'Play again':'Try another season'}</span></button></div></div>`);
  return true;
}

/* Route accessibility — given the player's current transport, which routes
   can they actually reach today? Local is always free; near needs at least
   the bus (with an €8 fare); mid needs a moped+; far needs a car.
   Fleet disciplines (kayak/sup/cycle/raft) need a rack or trailer to take
   their kit out of the local zone — that gate lives in bookingLock(). */
const REGION_TIER = { local:0, near:1, mid:2, far:3 };
const TRANSPORT_NAMES = { 0:'bus', 1:'bus', 2:'moped', 3:'Hilux' };
function transportTier(){
  if(hasInfra('pickup')) return 3;
  if(hasInfra('moped'))  return 2;
  return 1;                              // bus is the floor — always available
}
function routeReachable(r){
  const tier = REGION_TIER[r.region || 'local'];
  return tier <= transportTier();
}
function busFee(b){
  if((b.region||'local')!=='near') return 0;
  if(hasInfra('moped') || hasInfra('pickup')) return 0;
  return 8;
}
// Which disciplines need a rack/trailer to move clients' equipment to regional routes?
const FLEET_NEEDS_RACK_OR_TRAILER = ['seakayak','sup','cycle'];
const FLEET_NEEDS_TRAILER_ONLY    = ['raft'];
function fleetTransportCap(activity){
  if(FLEET_NEEDS_TRAILER_ONLY.includes(activity)) return hasInfra('trailer') ? 99 : 0;
  if(FLEET_NEEDS_RACK_OR_TRAILER.includes(activity)){
    if(hasInfra('trailer')) return 99;
    if(hasInfra('rack'))    return 2;
    return 0;
  }
  return 99; // hike/climb/canyon have no fleet — kit fits in/on you
}
function fleetCapacityFor(b){
  const act = b.activity||'hike';
  const base = fleetCapacity(act);
  if(base===Infinity) return Infinity;
  if((b.region||'local')==='local') return base;     // boats live at the base
  return Math.min(base, fleetTransportCap(act));
}

function starStr(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }
function tierFor(score, tips){
  if(score>=8 || tips>=35) return 5;
  if(score>=3) return 4;
  if(score>=-1) return 3;
  if(score>=-7) return 2;
  return 1;
}
function makeReviews(score, tips, n){
  const base=tierFor(score,tips), out=[];
  for(let i=0;i<n;i++){
    let t=base; if(i>0 && chance(0.5)) t=clamp(base+(chance(0.5)?1:-1),1,5);
    out.push({stars:t, name:rnd(REVIEWERS), src:rnd(SOURCES), text:rnd(REVIEW_TIERS[t])});
  }
  return out;
}
function reviewsHTML(reviews){

}

     {label:'Improvise a field repair', hint:'Better odds with good kit',
      run:(b,S)=>chance(0.45+S.gear/200)
        ?{lines:['Cord, tape, and a calm head. The fix holds and the trip carries on smoothly.'], rep:4}
        :{lines:['The bodge does not hold and you lose half an hour fussing with it. Mildly embarrassing.'], rep:-5, gear:-8}},
     {label:'Cut the route short to be safe', hint:'Reduced fee',
      run:()=>({lines:['You shorten the loop rather than risk a failure higher up. Sensible, if a little flat.'], payMul:0.7, rep:-2})},
   ]},
  {id:'heat', w:1.6, when:(b,w)=>w.heat, title:'The midday furnace',
   text:()=>`The sun is merciless and the bottles are emptying fast. One of the party has gone quiet and red in the face.`,
   choices:[
     {label:'Add shade breaks and ration water', hint:'Far easier if you packed water', run:()=>({lines:[hasItem('water')?'With plenty of water in the pack, you slow the tempo, find shade, and keep everyone hydrated. Faultless.':'You slow the tempo and find shade, but with little water to spare it is a near thing.'], rep:hasItem('water')?5:2, energy:-6})},
     {label:'Push the pace to finish before the worst', hint:'Risk of heat exhaustion',
      run:(b,S)=>chance(0.6-(S.energy<40?0.15:0)+(hasItem('water')?0.12:0))
        ?{lines:['You read the timing right and beat the worst of the heat down to cooler ground.'], rep:4}
        :{lines:['It is too much — someone goes wobbly with heat exhaustion. You lose time getting them cooled and stable.'], rep:-8, cash:-40, energy:-10}},
   ]},
  {id:'nav', activities:['hike'], w:1.1, when:(b,w)=>w.mist||w.storm, title:'The path vanishes',
   text:()=>`The trail markers dissolve into the murk. The party looks to you — do you know the way from here, or not?`,
   choices:[
     {label:'Trust your knowledge of the mountain', hint:'A map &amp; compass makes this near-certain',
      run:()=>chance(0.66+(hasItem('map')?0.28:0)+(perkIs('navigator','shepherd','goatherd')?0.2:0))?{lines:[hasItem('map')?'You take a careful bearing with map and compass and bring them out exactly where you meant to.':'You read the land like a page and bring them out exactly where you meant to. Quietly impressive.'], rep:6}:{lines:['A wrong fork costs you a long, tiring backtrack. You get there — eventually.'], rep:-4, energy:-15}},
     {label:'Backtrack to the last sure marker', hint:'Safe, costs time', run:()=>({lines:['You retrace your steps to certainty before continuing. Cautious and correct.'], payMul:0.85, energy:-6})},
   ]},
  {id:'client', activities:['hike'], w:1.5, when:(b)=>b.ctype==='corporate', title:'The boss wants a shortcut',
   text:()=>`The team lead, eager to impress, points at an unmarked scramble. "Surely we can just cut up there? We're on a schedule."`,
   choices:[
     {label:'Hold your safety standards firmly', hint:'They may respect it',
      run:()=>chance(0.5)?{lines:['You explain, kindly but without budging. By the end, the lead is telling everyone how professional you were.'], rep:6}:{lines:['You refuse the shortcut. The lead sulks a little, but you sleep fine.'], rep:-2}},
     {label:'Take the shortcut to please the client', hint:'Tempting tip — real risk',
      run:(b)=>chance(0.55-b.diff*0.05)?{lines:['It works out, and the grateful lead slips you a generous tip for the bespoke route.'], rep:4, tips:45}:{lines:['The scramble turns sketchy fast. Nobody is hurt, but the spooked group blames you for indulging it.'], rep:-10, cash:-40, energy:-8}},
   ]},
  {id:'horses', activities:['hike'], w:1.1, when:(b)=>(b.tags||[]).includes('forest')||(b.tags||[]).includes('remote'), title:'Wild horses cross the path',
   text:()=>`A small herd of half-wild horses appears at the edge of the trees, snorts, and starts crossing the trail in front of you. Nobody moves.`,
   choices:[
     {label:'Hold the group quietly and let them pass', hint:'A free piece of magic', run:(b)=>({lines:['You whisper for stillness. The horses cross in their own time. Nobody breathes. It is exactly why people come on these trips.'], rep:6, tips:b.ctype==='photo'?40:20, energy:2})},
     {label:'Ease around them carefully', hint:'Stay on schedule', run:()=>({lines:['You loop the group wide around the herd, lose ten minutes, gain a story.'], rep:3, energy:-2})},
   ]},
  {id:'colleague', w:1.0, when:()=>true, title:'A fellow guide in trouble',
   text:()=>`You round a bend and find another guide kneeling beside a client with a clearly bad ankle, three hours from the road. They look up, exhausted, and ask if you can help.`,
   choices:[
     {label:'Stop and help — your group can wait', hint:'Doing right costs you time',
      run:(b,S)=>chance(0.7+(hasItem('firstaid')?0.15:0)+(perkIs('medic')?0.2:0))?{lines:['Between you, you splint and walk the casualty out. Your group is patient and your name goes around the local guides as someone who shows up.'], rep:8, energy:-15}:{lines:['It is a hard, slow rescue. You get them out, but your own day is ruined and your group is fed up.'], rep:2, cash:-30, energy:-22}},
     {label:'Lend gear and carry on', hint:'A pragmatic compromise', run:()=>({lines:['You hand over your first-aid kit and a pole, promise to call it in at the trailhead, and keep moving. They thank you. You feel a little odd about it all day.'], rep:1, gear:-4})},
     {label:'Wave and walk past', hint:'You are on the clock', run:()=>({lines:['You nod sympathetically and keep walking. Word gets around. Word always gets around.'], rep:-8})},
   ]},
  {id:'photoframe', activities:['hike'], w:1.4, when:(b)=>b.ctype==='photo', title:'The shot they came for',
   text:()=>`The photographers have stopped dead. The light has gone perfect. They are setting up tripods on the trail and asking, gently, for thirty minutes.`,
   choices:[
     {label:'Give them their thirty minutes', hint:'The whole reason they booked', run:()=>({lines:['You sit in the shade and let them work. They get the shot. You get a tip the size of half a fee.'], rep:5, tips:50, energy:5})},
     {label:'Give them ten, then push on', hint:'Compromise', run:()=>({lines:['You compromise. The shot is fine, not magic. They are politely disappointed.'], rep:1, tips:10})},
   ]},
  {id:'shrine', activities:['hike'], w:1.0, when:(b)=>(b.tags||[]).includes('historical')||(b.tags||[]).includes('forest'), title:'A roadside shrine',
   text:()=>`You pass one of the little blue-domed iron shrines that dot the country roads — a candle inside, a faded photo. The group slows and looks at you.`,
   choices:[
     {label:'Tell the story behind it', hint:'A small gift of context', run:(b)=>({lines:['You explain the custom. They listen with the patient attention people only ever give in the middle of nowhere. Lovely moment.'], rep:5, tips:b.ctype==='tourist'?20:10, energy:2})},
     {label:'Nod respectfully and walk on', hint:'Keep moving', run:()=>({lines:['You give it a respectful glance and keep going. The moment passes unmarked.'], rep:1})},
   ]},
  {id:'lostpair', activities:['hike'], w:0.9, when:(b)=>(b.tags||[]).includes('remote')||b.diff>=2, title:'A lost couple',
   text:()=>`Two hikers stagger up to you on the trail, no map, no water, no idea where they are. They were "trying to find Polylimnio" three hours ago. They are nowhere near Polylimnio.`,
   choices:[
     {need:'water', label:'Water, directions, and a clear plan', hint:'You are equipped for this', run:()=>({lines:['You hand over water, draw them a map on a napkin, and point them home. Their relief is comic.'], rep:6})},
     {label:'Walk them to the next junction yourself', hint:'A detour, but the right thing', run:()=>({lines:['You loop the group on a small detour and deliver the strays back to a path they know. Everyone feels good. You burn an hour.'], rep:5, energy:-8, payMul:0.92})},
     {label:'Point them at the path and carry on', hint:'Cold but quick', run:()=>({lines:['You give them a bearing and keep going. You think about them for the next mile.'], rep:-2})},
   ]},
  /* --- SEA KAYAK on-water events (DISCIPLINES.md § SEA KAYAKING → On-water events) --- */
  {id:'k-capsize', activities:['seakayak'], w:1.2, when:()=>true, title:'A capsize',
   text:()=>`A wobble, a yelp, and suddenly there is a head in the water and an upturned hull.`,
   choices:[
     {label:'Brace, recover, get them back aboard', hint:'PFD + tow-line make this much easier',
      run:(b,S)=>chance(0.55+(hasItem('pfd')?0.15:0)+(hasItem('towline')?0.1:0)+(perkIs('medic','captain')?0.15:0))
        ?{lines:['You are alongside before they have finished gasping, hull righted, paddler back aboard, dignity mostly intact.'], rep:6}
        :{lines:['The rescue is slower and colder than it should be; everyone is rattled.'], rep:-4, energy:-12}},
   ]},
  {id:'k-offshore', activities:['seakayak'], w:1.5, when:(b,w)=>w.wind||w.mist, title:'The offshore wind',
   text:()=>`The gap between you and the shore is widening, and it is not the shore that is moving.`,
   choices:[
     {need:'towline', label:'Raft up and tow the weakest back', hint:'Textbook, with the right kit',
      run:(b,S)=>chance(0.7+(perkIs('navigator','captain','shepherd','goatherd')?0.15:0))
        ?{lines:['You raft the group, clip the tow, and grind everyone back to the lee. Textbook.'], rep:7}
        :{lines:['You claw back to shelter eventually, soaked and white-knuckled.'], rep:-9, cash:-40, energy:-14}},
     {label:'Push on to the cave before it builds', hint:'Big reward if you read it right',
      run:(b,S)=>chance(0.45-S.weather.risk)
        ?{lines:['You make the lee of the cave with paddles flailing — a wild finish they will not forget.'], rep:8, tips:30}
        :{lines:['The wind beats you to it; you scrape into shelter wet, frightened, late.'], rep:-7, cash:-30, energy:-12}},
   ]},
  {id:'k-cave-seal', activities:['seakayak'], w:1.4, when:(b)=>(b.tags||[]).includes('caves'), title:'The cave, and the seal',
   text:()=>`You slip into the sea cave and the noise drops to a hush — and there, on a ledge, a monk seal watches you with frank disapproval.`,
   choices:[
     {label:'Hold the group silent and let it land', hint:'They will remember this one', run:(b)=>({lines:['Phones down, for once. Nobody breathes. This is the photo they will not get and the memory they will keep.'], rep:7, tips:b.ctype==='tourist'?35:25, energy:3})},
   ]},
  {id:'k-straggler', activities:['seakayak'], w:1.0, when:()=>true, title:'The straggler',
   text:()=>`One paddler is forty metres back and shrinking.`,
   choices:[
     {label:'Drop back and shepherd', hint:'Costs energy, keeps the group whole', run:()=>({lines:['You drop back, raft up, and coach them along. Slow, but everyone arrives.'], rep:3, energy:-6})},
     {label:'Push the pace', hint:'They will catch up. Probably.', run:()=>({lines:['You set a brisker line and trust they will find it. They mostly do.'], rep:-3, risk:0.06})},
   ]},
  {id:'k-gear', activities:['seakayak'], w:1.0, when:()=>true, title:'Gear at sea',
   text:()=>`${rnd(['A paddle splits in two','The skeg jams half-down','A spray-skirt blows clean off'])}. This wants dealing with, and the wind is not waiting.`,
   choices:[
     {need:'sparepaddle', label:'Field-fix it', hint:'Better odds with the right spare',
      run:(b,S)=>chance(0.55+S.gear/200)
        ?{lines:['Cord, tape, and a calm head. The fix holds and the trip carries on smoothly.'], rep:4}
        :{lines:['The bodge does not hold and you lose half an hour fussing with it on a rolling sea.'], rep:-5, gear:-8}},
     {label:'Cut the route short to be safe', hint:'A reduced fee', run:()=>({lines:['You shorten the line rather than risk a failure further from shore. Sensible, if a little flat.'], payMul:0.7, rep:-2})},
   ]},
  {id:'k-dolphins', activities:['seakayak'], w:1.2, when:()=>true, title:'Dolphins',
   text:()=>`A pod falls in alongside, riding the bows, and a whole boatload of adults forgets, completely, how to paddle.`,
   choices:[
     {label:'Stop and drift with them', hint:'A story for the year', run:()=>({lines:['You raft up and let it happen. Nobody will stop talking about this for a year.'], rep:7, tips:25, energy:3})},
   ]},
  {id:'k-jellies', activities:['seakayak'], w:1.0, when:(b)=>(b.tags||[]).includes('snorkel')||(b.tags||[]).includes('caves'), title:'Jellyfish at the swim stop',
   text:()=>`The snorkel spot you promised is, today, a slow purple galaxy of bells.`,
   choices:[
     {label:'Move the swim around the headland', hint:'Local knowledge wins', run:()=>({lines:['You shift the stop two coves on, to clear water. Smoothly done.'], rep:4, energy:-3})},
     {need:'firstaid', label:'Brave it and treat the odd sting', hint:'A few yelps, no real harm', run:()=>({lines:['A couple of yelps, a dab of treatment, and everyone lives. Just.'], rep:-2, risk:0.08})},
   ]},
  {id:'k-wake', activities:['seakayak'], w:1.0, when:()=>true, title:'The wake',
   text:()=>`A speedboat carves past far too close and the swell hits the group broadside.`,

      run:(b,S)=>chance(0.6+(hasItem('pfd')?0.1:0)+(perkIs('captain')?0.15:0))
        ?{lines:['You call the brace, they take it on the beam, and the boats stay upright. Textbook.'], rep:5}
        :{lines:['One goes over. A quick recovery, but the group’s nerves are shot for an hour.'], rep:-4, energy:-8}},
   ]},
  {id:'k-squall', activities:['seakayak'], w:1.3, when:(b,w)=>w.wind||w.mist||w.storm, title:'The squall',
   text:()=>`A line of dark, wind-torn water is racing across the bay toward you. Minutes, not hours.`,
   choices:[
     {label:'Raft up and run for the lee shore', hint:'Wet, fast, safe', run:()=>({lines:['You cluster the group, set a hard ferry-angle, and claw into the shelter of the point as it hits. Wet, fast, safe.'], payMul:0.8, rep:4})},
     {label:'Sprint for the planned landing', hint:'Big reward if you beat it',
      run:(b,S)=>chance(0.45-S.weather.risk)
        ?{lines:['You beat it by a paddle-length. The finish is heroic, the photos absurd.'], rep:8, tips:25}
        :{lines:['It catches you in the open. Everyone makes it; nobody is dry, or fond of you, when they do.'], rep:-10, cash:-40, energy:-14}},
   ]},
  {id:'k-fog', activities:['seakayak'], w:1.0, when:(b,w)=>w.mist, title:'Sea fog',
   text:()=>`The shore dissolves into grey and the group draws quiet and close.`,
   choices:[
     {need:'compass', label:'Shepherd in on a bearing', hint:'Quietly masterful',
      run:()=>chance(0.7+(hasItem('vhf')?0.1:0)+(perkIs('navigator','captain','shepherd','goatherd')?0.15:0))
        ?{lines:['You take a heading and bring them out of the murk dead on the beach. Quietly masterful.'], rep:6}
        :{lines:['You misread the set and pop out half a kilometre off. Mostly disguised as competence.'], rep:-2}},
     {label:'Feel your way along the coast', hint:'Slow, tense, eventually fine', run:()=>({lines:['A tense, disoriented hour clawing back to land.'], rep:-5, energy:-10})},
   ]},
  /* --- CANYON on-route events (DISCIPLINES.md § CANYONING → In-canyon events) --- */

   text:()=>`The pool you just swam is suddenly pushing, and the noise upstream has changed.`,

      run:(b,S)=>chance(0.55+(hasCert('canyonAdvanced')?0.2:hasCert('canyonLeader')?0.1:0))
        ?{lines:['You read it early, drive everyone up to a high ledge, and watch the canyon roar through where you would have been. Nobody breathes.'], rep:8}

   ]},
  {id:'ca-stuckrope', activities:['canyon'], w:1.0, when:(b)=>b.diff>=2, title:'The stuck rappel',

        :{lines:['A slow, frightening recovery. They are unhurt; their faith in you is dented.'], rep:-5, energy:-12}},
   ]},
  {id:'ca-chamber', activities:['canyon'], w:1.3, when:()=>true, title:'The hidden chamber',

   choices:[
     {label:'Hold it', hint:'A memory they will keep', run:()=>({lines:['Nobody speaks. A kingfisher cuts the light. This is the one they will describe badly to everyone they love for years.'], rep:7, tips:20})},
   ]},
  {id:'ca-cold', activities:['canyon'], w:1.0, when:()=>true, title:'The cold creeps in',

        :{lines:['A near-miss with hypothermia. You walk them out warm but the day is broken.'], rep:-6, cash:-30}},
     {label:'Push on, they will warm up moving', hint:'They will not warm up moving', run:()=>({lines:['They do not warm up moving. The day finishes early and a little frightened.'], rep:-5, energy:-8})},
   ]},
  {id:'ca-slick', activities:['canyon'], w:1.1, when:(b)=>b.diff>=2, title:'Slick rock',

     {label:'Splint and walk them out', hint:'First-aid + medic help',
      run:(b,S)=>chance(0.6+(hasItem('firstaid')?0.18:0)+(perkIs('medic')?0.2:0)+(hasCert('firstaid')?0.15:0))
        ?{lines:['You strap and walk them out yourself. Slow, careful, kind.'], rep:5, energy:-15}
        :{lines:['The walk-out is harder than you judged. They get there, but the day is a slog.'], rep:-3, energy:-22, cash:-20}},
     {label:'Call the rescue', hint:'Safe, expensive', run:()=>({lines:['Help arrives. Everyone is fine; the bill is not.'], cash:-90, rep:3, payMul:0.85})},
   ]},
  {id:'ca-rockfall', activities:['canyon'], w:0.8, when:(b)=>(b.tags||[]).includes('technical')||b.diff===3, title:'Rockfall in the slot',
   text:()=>`A clatter echoes from above and a fist of stone bounces past.`,
   choices:[
     {label:'Hold position and call clear', hint:'Helmets earn their keep',
      run:(b,S)=>chance(0.7+(hasItem('canyonHelmet')?0.15:0))
        ?{lines:['Helmets ring. Nobody is hit. You hustle them past the unstable wall.'], rep:2}
        :{lines:['A graze and a real fright. The mood is brittle the rest of the day.'], rep:-4, risk:0.06}},
   ]},

  {id:'ra-jumppool', activities:['raft'], w:1.1, when:(b,w)=>!w.storm, title:'The jump pool',

     {label:'Press on for the schedule', hint:'A clean exit, no magic', run:()=>({lines:['You push past the pool. A clean exit, on time, faintly disappointed.'], rep:-2})},

  {id:'ra-wrap', activities:['raft'], w:0.8, when:(b)=>b.diff>=2, title:'Wrapped raft',

        :{lines:['A long, cold, frightening extraction. The boat comes off; the day does not recover.'], rep:-8, energy:-14}},

  {id:'ra-dam', activities:['raft'], w:0.7, when:(b,w)=>!w.storm&&!w.mist, title:'A dam release',

   choices:[

     {label:'Miss the window', hint:'Run the thin section instead', run:()=>({lines:['You stick to the plan; the run is bony and shallow. Fine. Not the day it could have been.'], payMul:0.85})},
   ]},

     {label:'Improvise without a spare', hint:'A long faff', run:()=>({lines:['A long roadside faff with the wrong valve and a borrowed bottle of water. Eventually you ride.'], rep:-3, energy:-5})},

   text:()=>`You crest a rise and the whole gulf is laid out, then a long freewheel down into a village square.`,
   choices:[
     {label:'Stop and let them feel it', hint:'A free piece of magic', run:()=>({lines:['Bottles out, photos taken, then a kilometre of grinning freewheel into shade and coffee.'], rep:6, tips:15, energy:3})},
   ]},
  {id:'cy-heatwave', activities:['cycle'], w:1.0, when:(b,w)=>w.heat&&((b.tags||[]).includes('long')||(b.tags||[]).includes('mountain')), title:'Heatwave on the climb',

     {label:'Push the schedule', hint:'Heat exhaustion lurks', run:()=>({lines:['You push the schedule. Heat exhaustion catches them; everyone is rattled.'], rep:-8, cash:-40, energy:-10})},
   ]},
  {id:'cy-dogs', activities:['cycle'], w:1.0, when:()=>true, title:'The dog pack',

   choices:[
     {need:'bikeRepair', label:'Quick-link fix on the roadside', hint:'You came prepared',
      run:()=>chance(0.8)?{lines:['Out come the quick-links and a chain tool. Five minutes; you ride on, mildly pleased with yourself.'], rep:4}:{lines:['The fix does not hold; the bike sulks for the rest of the day. A long, slow finish.'], rep:-2, energy:-8}},
     {label:'Shuttle and absorb the dent', hint:'A long wait at the roadside', run:()=>({lines:['Phone, wait, van, ride home in defeat.'], rep:-3, energy:-8})},
   ]},
  /* --- SUP on-water events (DISCIPLINES.md § SUP) --- */
  {id:'sp-blown', activities:['sup'], w:1.4, when:(b,w)=>w.wind, title:'Blown offshore',

     {need:'towline', label:'Tow them back', hint:'You brought the line',
      run:(b,S)=>chance(0.75+(hasItem('vhf')?0.1:0))?{lines:['You sprint across, clip the line, and reel them back into the lee. Crisis, neatly handled.'], rep:5}:{lines:['You reach them but the tow snags; a slow, white-knuckled grind back to shore.'], rep:-2, energy:-8}},
     {label:'Sprint across and shepherd them in', hint:'Without a line', run:()=>({lines:['You sprint, you shout, you eventually corral them back. A genuine scare.'], rep:-8, energy:-10})},

   choices:[
     {label:'Hold the moment', hint:'The signature tour delivers', run:()=>({lines:['You raft the boards quietly. A heron lifts off the reeds. Pink, gold, mercury. Nobody breathes.'], rep:7, tips:25, energy:3})},

  {id:'sp-gust', activities:['sup'], w:1.1, when:(b,w)=>w.wind||w.mist, title:'The gust',

   choices:[
     {need:'towline', label:'Corral them downwind of you', hint:'Quick, calm', run:()=>({lines:['You drop downwind and rope them into a loose raft. The drift stops, dignity holds.'], rep:5})},
     {label:'Sprint between them, herd them in', hint:'Without the tow', run:()=>({lines:['You paddle yourself ragged keeping them off the open water. They make it. You ache.'], rep:-3, energy:-8})},

  {id:'sp-wake', activities:['sup'], w:0.9, when:()=>true, title:'The ferry wake',

  {id:'cl-send', activities:['climb'], w:1.4, when:()=>true, title:'The send',

  {id:'cl-crux', activities:['climb'], w:1.0, when:(b)=>b.diff>=2, title:'Stuck at the crux',

  {id:'cl-stormcrag', activities:['climb'], w:1.0, when:(b,w)=>w.storm||w.wind, title:'Storm on the crag',

   ]},
];

     {label:'Authorise a rescue callout', hint:'Safe · costs money',

  {id:'weather', w:1.5, when:(b,w)=>w.wind||w.storm||w.mist,

     {label:'Approve the detour', hint:'Possible tip — possible mess',
      run:(g,b)=>gSkillCheck(g,0.55)?{line:`${g.name} manages the detour expertly and the delighted group tips well.`, rep:4, tips:35, morale:3}:{line:`The detour goes wrong and ${g.name} is left smoothing over a rattled, unhappy group.`, rep:-8, morale:-6}},

     {label:'Have them turn the group back', hint:'Safe, reduced fee',
      run:(g,b)=>({line:`${g.name} turns the group back rather than risk it. Cautious and correct.`, payMul:0.7, rep:-2, morale:2})},
   ]},
